<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <pattern id="stip" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="5" r="1.2" fill="#22301F" fill-opacity="0.07"/>
      <circle cx="11" cy="12" r="0.9" fill="#22301F" fill-opacity="0.05"/>
    </pattern>
    <path id="spark" d="M0 -11 L2.6 -2.6 L11 0 L2.6 2.6 L0 11 L-2.6 2.6 L-11 0 L-2.6 -2.6 Z"/>
  </defs>

  <!-- warm sky -->
  <rect width="1280" height="720" fill="#F5EFE2"/>
  <circle cx="990" cy="150" r="92" fill="#E7DCC3" fill-opacity="0.8"/>
  <circle cx="990" cy="150" r="58" fill="#F5EFE2"/>

  <!-- distant park band -->
  <path d="M0 388 C160 366 340 380 520 372 C740 362 980 382 1280 366 L1280 420 L0 420 Z" fill="#A9C6A0" fill-opacity="0.55"/>
  <path d="M60 384 C120 356 200 356 250 380 Z" fill="#2F6B4A" fill-opacity="0.5"/>
  <path d="M1030 376 C1090 348 1180 350 1235 374 Z" fill="#2F6B4A" fill-opacity="0.5"/>

  <!-- ground -->
  <rect x="0" y="405" width="1280" height="315" fill="#E7DCC3"/>
  <rect x="0" y="405" width="1280" height="315" fill="url(#stip)"/>

  <!-- dune room ahead -->
  <path d="M300 430 C380 368 560 352 660 392 C720 416 740 430 750 434 L280 434 Z" fill="#E7DCC3"/>
  <path d="M300 430 C380 368 560 352 660 392 C720 416 740 430 750 434 L280 434 Z" fill="#F5EFE2" fill-opacity="0.6"/>
  <path d="M300 430 C380 368 560 352 660 392" fill="none" stroke="#22301F" stroke-opacity="0.25" stroke-width="2"/>
  <path d="M640 432 C700 386 830 376 910 408 C950 424 962 432 966 434 L630 434 Z" fill="#E7DCC3"/>
  <path d="M640 432 C700 386 830 376 910 408" fill="none" stroke="#22301F" stroke-opacity="0.2" stroke-width="2"/>
  <!-- embedded slide on far dune -->
  <path d="M505 372 C540 384 560 406 566 430" fill="none" stroke="#C05A32" stroke-width="12" stroke-linecap="round"/>
  <!-- rubber surfacing apron -->
  <path d="M330 434 C480 424 700 424 950 434 L960 452 C740 444 500 444 320 452 Z" fill="#C05A32" fill-opacity="0.4"/>

  <!-- shade sails over the room -->
  <path d="M355 300 L560 262 L495 392 Z" fill="#F5EFE2" fill-opacity="0.9"/>
  <path d="M355 300 L560 262 L495 392 Z" fill="none" stroke="#22301F" stroke-opacity="0.3" stroke-width="2"/>
  <path d="M520 322 L700 285 L650 405 Z" fill="#C05A32" fill-opacity="0.4"/>
  <path d="M520 322 L700 285 L650 405 Z" fill="none" stroke="#22301F" stroke-opacity="0.25" stroke-width="1.6"/>
  <g stroke="#22301F" stroke-opacity="0.6" stroke-width="3" stroke-linecap="round">
    <line x1="358" y1="300" x2="352" y2="434"/>
    <line x1="558" y1="264" x2="562" y2="430"/>
    <line x1="698" y1="287" x2="702" y2="432"/>
  </g>

  <!-- carousel glimpse, right of the room -->
  <g transform="translate(880,420)">
    <ellipse cx="0" cy="10" rx="58" ry="12" fill="#CFC0A0"/>
    <ellipse cx="0" cy="10" rx="58" ry="12" fill="none" stroke="#22301F" stroke-opacity="0.3"/>
    <line x1="0" y1="8" x2="0" y2="-48" stroke="#22301F" stroke-opacity="0.7" stroke-width="4"/>
    <ellipse cx="0" cy="-50" rx="46" ry="10" fill="#4E8FA8" fill-opacity="0.55"/>
  </g>

  <!-- ghaf trees flanking the entry -->
  <g transform="translate(230,430)">
    <path d="M0 0 C-2 -34 -8 -52 -20 -70 M0 0 C3 -38 10 -58 22 -74" fill="none" stroke="#22301F" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="-12" cy="-86" rx="62" ry="22" fill="#2F6B4A" fill-opacity="0.9"/>
    <ellipse cx="28" cy="-96" rx="46" ry="17" fill="#A9C6A0" fill-opacity="0.85"/>
    <ellipse cx="-42" cy="-98" rx="30" ry="12" fill="#A9C6A0" fill-opacity="0.7"/>
  </g>
  <g transform="translate(1090,436)">
    <path d="M0 0 C-2 -30 -7 -46 -17 -62 M0 0 C3 -33 9 -50 19 -66" fill="none" stroke="#22301F" stroke-width="4.5" stroke-linecap="round"/>
    <ellipse cx="-10" cy="-76" rx="54" ry="19" fill="#2F6B4A" fill-opacity="0.9"/>
    <ellipse cx="24" cy="-85" rx="40" ry="15" fill="#A9C6A0" fill-opacity="0.85"/>
  </g>

  <!-- the loop path, converging from the viewer -->
  <path d="M300 720 L556 436 L730 436 L1080 720 Z" fill="#CFC0A0"/>
  <path d="M300 720 L556 436 M730 436 L1080 720" stroke="#22301F" stroke-opacity="0.22" stroke-width="3" fill="none"/>
  <path d="M300 720 L556 436 L730 436 L1080 720 Z" fill="url(#stip)"/>
  <!-- pergola slat shadows raking across the path -->
  <g fill="#22301F" fill-opacity="0.09">
    <path d="M338 678 L1038 678 L1010 646 L366 646 Z"/>
    <path d="M394 616 L982 616 L960 590 L416 590 Z"/>
    <path d="M442 562 L934 562 L916 540 L460 540 Z"/>
    <path d="M482 518 L894 518 L880 500 L496 500 Z"/>
    <path d="M514 482 L862 482 L851 468 L525 468 Z"/>
  </g>

  <!-- pergola overhead: terracotta slats across the top of frame -->
  <g fill="#C05A32">
    <rect x="0" y="0" width="1280" height="26"/>
    <rect x="0" y="44" width="1280" height="20" fill-opacity="0.95"/>
    <rect x="0" y="80" width="1280" height="15" fill-opacity="0.9"/>
    <rect x="0" y="110" width="1280" height="11" fill-opacity="0.85"/>
    <rect x="0" y="134" width="1280" height="8" fill-opacity="0.8"/>
  </g>
  <g stroke="#22301F" stroke-opacity="0.35" stroke-width="2">
    <line x1="0" y1="26" x2="1280" y2="26"/><line x1="0" y1="64" x2="1280" y2="64"/>
  </g>
  <rect x="86" y="0" width="20" height="335" fill="#C05A32"/>
  <rect x="86" y="0" width="20" height="335" fill="#22301F" fill-opacity="0.25"/>
  <rect x="1176" y="0" width="20" height="335" fill="#C05A32"/>
  <rect x="1176" y="0" width="20" height="335" fill="#22301F" fill-opacity="0.25"/>

  <!-- figures on the path: family heading in -->
  <!-- wheelchair user, mid path -->
  <g transform="translate(636,560) scale(1.15)">
    <circle cx="0" cy="-42" r="6" fill="#22301F"/>
    <path d="M-5 -35 C4 -38 7 -30 5 -20 L5 -8 L14 -8 L14 -4 L2 -4 L-4 -18 Z" fill="#22301F"/>
    <circle cx="0" cy="6" r="14" fill="none" stroke="#22301F" stroke-width="3"/>
    <circle cx="0" cy="6" r="2.4" fill="#22301F"/>
    <circle cx="15" cy="13" r="4.6" fill="none" stroke="#22301F" stroke-width="2.4"/>
    <path d="M3 -6 L12 -1 L15 8" fill="none" stroke="#22301F" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- adult with child, left -->
  <g transform="translate(478,596)">
    <circle cx="0" cy="-58" r="7.5" fill="#22301F"/>
    <path d="M0 -49 C8 -49 10 -36 8 -22 L5 12 H1.8 L0 -8 L-1.8 12 H-5 L-8 -22 C-10 -36 -8 -49 0 -49 Z" fill="#22301F"/>
    <g transform="translate(26,10) scale(0.58)">
      <circle cx="0" cy="-58" r="8" fill="#22301F"/>
      <path d="M0 -48 C8 -48 10 -35 8 -21 L6 12 H2 L0 -7 L-2 12 H-6 L-8 -21 C-10 -35 -8 -48 0 -48 Z" fill="#22301F"/>
    </g>
    <path d="M8 -30 L20 -18" stroke="#22301F" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- running child, right -->
  <g transform="translate(806,570) scale(0.62)">
    <circle cx="4" cy="-56" r="8" fill="#22301F"/>
    <path d="M2 -46 C11 -47 13 -34 9 -22 L18 6 L13 8 L2 -12 L-10 10 L-15 7 L-6 -22 C-9 -35 -6 -45 2 -46 Z" fill="#22301F"/>
    <path d="M8 -38 L24 -30 M-2 -38 L-18 -26" stroke="#22301F" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- kids on the far dune for scale -->
  <g transform="translate(505,364) scale(0.34)" fill="#22301F">
    <circle cx="0" cy="-56" r="9"/>
    <path d="M0 -45 C9 -45 11 -32 9 -18 L6 14 H2 L0 -6 L-2 14 H-6 L-9 -18 C-11 -32 -9 -45 0 -45 Z"/>
  </g>
  <g transform="translate(560,424) scale(0.3)" fill="#22301F">
    <circle cx="0" cy="-56" r="9"/>
    <path d="M0 -45 C9 -45 11 -32 9 -18 L6 14 H2 L0 -6 L-2 14 H-6 L-9 -18 C-11 -32 -9 -45 0 -45 Z"/>
  </g>

  <!-- nabta sparkles -->
  <use href="#spark" transform="translate(930,232) scale(0.8)" fill="#7CC98F"/>
  <use href="#spark" transform="translate(285,318) scale(0.6)" fill="#7BC6DD"/>
  <use href="#spark" transform="translate(1130,520) scale(0.55)" fill="#7CC98F"/>
</svg>
