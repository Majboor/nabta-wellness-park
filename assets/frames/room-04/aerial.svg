    <circle cx="930" cy="74" r="6"/><circle cx="1100" cy="92" r="6"/>
  </g>

  <!-- shaded loop: figure-eight segment crossing the lower field -->
  <path d="M-40 640 C240 540 420 670 640 612 C900 545 1010 655 1320 575" fill="none" stroke="#CFC0A0" stroke-width="62"/>
  <path d="M-40 445 C260 565 520 490 762 596" fill="none" stroke="#CFC0A0" stroke-width="44" stroke-opacity="0.85"/>
  <path d="M-40 640 C240 540 420 670 640 612 C900 545 1010 655 1320 575" fill="none" stroke="#22301F" stroke-opacity="0.12" stroke-width="2" stroke-dasharray="4 10"/>
