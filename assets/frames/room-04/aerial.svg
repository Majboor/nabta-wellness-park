  <!-- desert ground -->
  <rect width="1280" height="720" fill="#E7DCC3"/>
  <rect width="1280" height="720" fill="#F5EFE2" fill-opacity="0.35"/>
  <rect width="1280" height="720" fill="url(#stip)"/>

  <!-- wadi bioswale along the top edge -->
  <path d="M0 105 C220 55 420 145 640 110 C880 70 1060 145 1280 100 L1280 0 L0 0 Z" fill="#CFC0A0" fill-opacity="0.45"/>
