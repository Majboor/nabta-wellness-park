  <g stroke="#C05A32" stroke-width="5" stroke-linecap="round" opacity="0.85">
    <line x1="70" y1="588" x2="112" y2="622"/><line x1="106" y1="576" x2="148" y2="610"/>
    <line x1="142" y1="566" x2="184" y2="600"/><line x1="178" y1="558" x2="220" y2="592"/>
    <line x1="980" y1="588" x2="1024" y2="616"/><line x1="1018" y1="580" x2="1062" y2="608"/>
    <line x1="1056" y1="572" x2="1100" y2="600"/><line x1="1094" y1="566" x2="1138" y2="594"/>
  </g>

  <!-- dune terraces (topographic play landform) -->
  <path d="M330 195 C470 130 720 145 835 235 C955 330 905 470 745 512 C560 558 360 522 292 402 C238 305 242 235 330 195 Z" fill="#E7DCC3"/>
  <path d="M330 195 C470 130 720 145 835 235 C955 330 905 470 745 512 C560 558 360 522 292 402 C238 305 242 235 330 195 Z" fill="none" stroke="#22301F" stroke-opacity="0.22" stroke-width="2"/>
  <path d="M380 235 C495 180 690 190 790 265 C880 335 845 445 715 478 C560 516 400 486 342 392 C300 318 308 268 380 235 Z" fill="#F5EFE2" fill-opacity="0.85"/>
  <path d="M380 235 C495 180 690 190 790 265 C880 335 845 445 715 478 C560 516 400 486 342 392 C300 318 308 268 380 235 Z" fill="none" stroke="#22301F" stroke-opacity="0.18" stroke-width="1.6"/>
  <path d="M440 280 C530 235 665 245 735 300 C800 352 770 425 665 448 C555 472 445 448 405 380 C375 328 385 305 440 280 Z" fill="#E7DCC3"/>
  <path d="M440 280 C530 235 665 245 735 300 C800 352 770 425 665 448 C555 472 445 448 405 380 C375 328 385 305 440 280 Z" fill="none" stroke="#22301F" stroke-opacity="0.16" stroke-width="1.4"/>

  <!-- rubber safety surfacing pools, warm tones -->
  <path d="M470 330 C540 292 640 300 690 342 C735 382 705 428 630 440 C550 452 470 432 448 388 C432 356 435 348 470 330 Z" fill="#C05A32" fill-opacity="0.5"/>
  <path d="M330 430 C380 400 460 408 490 440 C516 468 492 500 430 506 C368 512 318 494 312 466 C308 448 310 442 330 430 Z" fill="#C05A32" fill-opacity="0.32"/>
  <path d="M470 330 C540 292 640 300 690 342 C735 382 705 428 630 440 C550 452 470 432 448 388 C432 356 435 348 470 330 Z" fill="url(#stip)"/>

  <!-- embedded slides off the dune crest -->
  <path d="M560 320 C610 300 660 318 690 358 C712 388 705 415 680 430" fill="none" stroke="#C05A32" stroke-width="17" stroke-linecap="round"/>
  <path d="M540 315 C505 340 480 380 486 420" fill="none" stroke="#C05A32" stroke-width="14" stroke-linecap="round" stroke-opacity="0.85"/>
