  <g fill="#A9C6A0" fill-opacity="0.8">
    <circle cx="140" cy="92" r="9"/><circle cx="235" cy="60" r="7"/><circle cx="380" cy="88" r="10"/>
    <circle cx="540" cy="102" r="8"/><circle cx="700" cy="68" r="9"/><circle cx="860" cy="66" r="7"/>
    <circle cx="1010" cy="96" r="10"/><circle cx="1160" cy="86" r="8"/>
  </g>
  <g fill="#2F6B4A" fill-opacity="0.7">
