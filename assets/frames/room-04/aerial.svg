  <g stroke="#22301F" stroke-opacity="0.55" stroke-width="1.6">
    <path d="M500 350 L560 335 M505 365 L568 348 M512 380 L575 362 M520 395 L582 376"/>
    <path d="M500 350 L520 395 M520 345 L538 390 M540 340 L558 384 M560 335 L582 376"/>
  </g>
  <!-- transfer platforms -->
  <rect x="600" y="290" width="30" height="18" rx="4" fill="#F5EFE2" stroke="#22301F" stroke-opacity="0.3"/>
  <rect x="470" y="418" width="26" height="16" rx="4" fill="#F5EFE2" stroke="#22301F" stroke-opacity="0.3"/>

  <!-- wheelchair-accessible carousel -->
  <g transform="translate(905,330)">
    <circle r="52" fill="#CFC0A0"/>
    <circle r="52" fill="none" stroke="#22301F" stroke-opacity="0.3" stroke-width="2"/>
    <circle r="40" fill="#4E8FA8" fill-opacity="0.4"/>
    <g stroke="#22301F" stroke-opacity="0.5" stroke-width="2">
      <line x1="-40" y1="0" x2="40" y2="0"/><line x1="0" y1="-40" x2="0" y2="40"/>
      <line x1="-28" y1="-28" x2="28" y2="28"/><line x1="-28" y1="28" x2="28" y2="-28"/>
    </g>
    <circle r="6" fill="#C05A32"/>
    <path d="M-52 20 L-84 34 L-84 46 L-48 32 Z" fill="#CFC0A0"/>
  </g>

  <!-- family seating ring -->
  <path d="M400 545 A 300 220 0 0 0 900 480" fill="none" stroke="#22301F" stroke-opacity="0.45" stroke-width="6" stroke-dasharray="20 14" stroke-linecap="round"/>
  <g fill="#C05A32" fill-opacity="0.9">
    <rect x="430" y="548" width="26" height="9" rx="4" transform="rotate(14 443 552)"/>
    <rect x="560" y="572" width="26" height="9" rx="4" transform="rotate(4 573 576)"/>
    <rect x="700" y="566" width="26" height="9" rx="4" transform="rotate(-8 713 570)"/>
    <rect x="830" y="528" width="26" height="9" rx="4" transform="rotate(-18 843 532)"/>
  </g>

  <!-- shade sails with cast shadows -->
  <path d="M472 268 L640 232 L580 372 Z" fill="#22301F" fill-opacity="0.1"/>
  <path d="M455 250 L625 215 L565 355 Z" fill="#F5EFE2" fill-opacity="0.85"/>
  <path d="M455 250 L625 215 L565 355 Z" fill="none" stroke="#22301F" stroke-opacity="0.25" stroke-width="1.6"/>
  <path d="M615 300 L760 262 L722 398 Z" fill="#22301F" fill-opacity="0.1"/>
  <path d="M600 285 L745 248 L707 383 Z" fill="#C05A32" fill-opacity="0.42"/>
  <path d="M600 285 L745 248 L707 383 Z" fill="none" stroke="#22301F" stroke-opacity="0.22" stroke-width="1.4"/>

  <!-- ghaf clusters -->
  <g>
    <ellipse cx="255" cy="270" rx="46" ry="20" fill="#22301F" fill-opacity="0.1"/>
    <circle cx="235" cy="250" r="34" fill="#2F6B4A" fill-opacity="0.9"/>
    <circle cx="272" cy="238" r="26" fill="#A9C6A0" fill-opacity="0.85"/>
    <circle cx="212" cy="232" r="20" fill="#A9C6A0" fill-opacity="0.7"/>
  </g>
  <g>
    <ellipse cx="1075" cy="480" rx="52" ry="22" fill="#22301F" fill-opacity="0.1"/>
    <circle cx="1055" cy="458" r="38" fill="#2F6B4A" fill-opacity="0.9"/>
    <circle cx="1098" cy="444" r="28" fill="#A9C6A0" fill-opacity="0.85"/>
    <circle cx="1030" cy="436" r="20" fill="#A9C6A0" fill-opacity="0.7"/>
  </g>
  <g>
    <ellipse cx="180" cy="560" rx="40" ry="18" fill="#22301F" fill-opacity="0.1"/>
    <circle cx="165" cy="542" r="28" fill="#2F6B4A" fill-opacity="0.85"/>
    <circle cx="196" cy="530" r="20" fill="#A9C6A0" fill-opacity="0.8"/>
  </g>

  <!-- people from above: dot heads with shoulder ellipses -->
  <g fill="#22301F">
    <g><ellipse cx="590" cy="360" rx="6" ry="4"/><circle cx="590" cy="358" r="3"/></g>
    <g><ellipse cx="655" cy="410" rx="5" ry="3.4"/><circle cx="655" cy="408" r="2.5"/></g>
    <g><ellipse cx="520" cy="400" rx="5" ry="3.4"/><circle cx="520" cy="398" r="2.5"/></g>
    <g><ellipse cx="470" cy="560" rx="6" ry="4"/><circle cx="470" cy="558" r="3"/></g>
    <g><ellipse cx="760" cy="560" rx="6" ry="4"/><circle cx="760" cy="558" r="3"/></g>
    <g><ellipse cx="350" cy="620" rx="6" ry="4"/><circle cx="350" cy="618" r="3"/></g>
    <g><ellipse cx="392" cy="612" rx="4.4" ry="3"/><circle cx="392" cy="610" r="2.2"/></g>
  </g>
  <!-- wheelchair user from above: head dot inside wheel ring, on carousel ramp -->
  <g transform="translate(838,364)">
    <circle r="8" fill="none" stroke="#22301F" stroke-width="2.4"/>
    <circle r="3" fill="#22301F"/>
  </g>

  <!-- nabta sparkles -->
  <use href="#spark" x="0" y="0" transform="translate(985,170)" fill="#7CC98F"/>
  <use href="#spark" x="0" y="0" transform="translate(150,410) scale(0.7)" fill="#7BC6DD"/>
  <use href="#spark" x="0" y="0" transform="translate(700,660) scale(0.6)" fill="#7CC98F"/>
</svg>
