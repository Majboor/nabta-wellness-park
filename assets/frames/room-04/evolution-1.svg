<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <pattern id="stip" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="5" r="1.2" fill="#22301F" fill-opacity="0.06"/>
      <circle cx="11" cy="12" r="0.9" fill="#22301F" fill-opacity="0.04"/>
    </pattern>
    <path id="spark" d="M0 -11 L2.6 -2.6 L11 0 L2.6 2.6 L0 11 L-2.6 2.6 L-11 0 L-2.6 -2.6 Z"/>
  </defs>

  <!-- opening day: bright bare light -->
  <rect width="1280" height="720" fill="#F5EFE2"/>
  <circle cx="1000" cy="140" r="84" fill="#E7DCC3" fill-opacity="0.8"/>
  <circle cx="1000" cy="140" r="50" fill="#F5EFE2"/>

  <!-- distant band: thin new planting line -->
  <path d="M0 392 C260 378 640 386 1280 372 L1280 414 L0 414 Z" fill="#A9C6A0" fill-opacity="0.3"/>

  <!-- ground -->
  <rect x="0" y="404" width="1280" height="316" fill="#E7DCC3"/>
  <rect x="0" y="404" width="1280" height="316" fill="url(#stip)"/>

  <!-- fresh rubber surfacing apron, crisp and bright -->
  <path d="M200 560 C380 512 720 508 960 546 C1080 566 1100 596 1040 622 C860 656 400 658 260 624 C180 604 160 574 200 560 Z" fill="#C05A32" fill-opacity="0.55"/>

  <!-- the play dune, freshly sculpted -->
  <path d="M240 560 C300 430 430 340 590 332 C730 326 830 400 855 490 C872 538 862 560 850 566 L230 566 Z" fill="#E7DCC3"/>
  <path d="M240 560 C300 430 430 340 590 332 C730 326 830 400 855 490" fill="none" stroke="#22301F" stroke-opacity="0.3" stroke-width="3"/>
  <path d="M320 560 C365 470 460 402 575 396 C640 392 690 416 720 454 L720 560 Z" fill="#F5EFE2" fill-opacity="0.75"/>
  <!-- embedded slide -->
  <path d="M595 344 C650 366 690 414 704 470 C712 505 706 532 690 548" fill="none" stroke="#C05A32" stroke-width="18" stroke-linecap="round"/>
  <path d="M595 344 C650 366 690 414 704 470 C712 505 706 532 690 548" fill="none" stroke="#F5EFE2" stroke-width="4" stroke-opacity="0.5"/>
  <!-- transfer platform -->
  <rect x="540" y="334" width="48" height="13" rx="5" fill="#F5EFE2" stroke="#22301F" stroke-opacity="0.35" stroke-width="2"/>
  <rect x="520" y="356" width="40" height="11" rx="5" fill="#E7DCC3" stroke="#22301F" stroke-opacity="0.3" stroke-width="2"/>
  <!-- climbing net -->
  <g stroke="#22301F" stroke-opacity="0.55" stroke-width="2.2" fill="none">
    <path d="M368 560 C378 496 416 438 486 402"/>
    <path d="M412 560 C420 504 452 452 514 414"/>
    <path d="M364 526 L506 410 M384 484 L528 418 M414 446 L514 414"/>
  </g>

  <!-- shade sails (installed day one) -->
  <path d="M300 180 L620 120 L530 330 Z" fill="#F5EFE2" fill-opacity="0.92"/>
  <path d="M300 180 L620 120 L530 330 Z" fill="none" stroke="#22301F" stroke-opacity="0.3" stroke-width="2.4"/>
  <path d="M580 200 L860 150 L780 350 Z" fill="#C05A32" fill-opacity="0.42"/>
  <path d="M580 200 L860 150 L780 350 Z" fill="none" stroke="#22301F" stroke-opacity="0.25" stroke-width="2"/>
  <g stroke="#22301F" stroke-opacity="0.6" stroke-width="4" stroke-linecap="round">
    <line x1="302" y1="182" x2="292" y2="500"/>
    <line x1="618" y1="122" x2="628" y2="440"/>
    <line x1="858" y1="152" x2="866" y2="470"/>
  </g>
  <ellipse cx="470" cy="600" rx="150" ry="20" fill="#22301F" fill-opacity="0.06"/>

  <!-- carousel, right -->
  <g transform="translate(1060,556)">
    <ellipse cx="0" cy="14" rx="82" ry="17" fill="#CFC0A0"/>
    <ellipse cx="0" cy="14" rx="82" ry="17" fill="none" stroke="#22301F" stroke-opacity="0.35" stroke-width="2.4"/>
    <ellipse cx="0" cy="9" rx="70" ry="13" fill="#4E8FA8" fill-opacity="0.4"/>
    <line x1="0" y1="9" x2="0" y2="-72" stroke="#22301F" stroke-opacity="0.75" stroke-width="4.5"/>
    <ellipse cx="0" cy="-74" rx="64" ry="13" fill="#C05A32" fill-opacity="0.9"/>
  </g>

  <!-- ghaf saplings, newly staked -->
  <g transform="translate(150,570)">
    <ellipse cx="0" cy="4" rx="26" ry="7" fill="#CFC0A0"/>
    <path d="M0 0 C-1 -18 -2 -28 -5 -38 M0 0 C1 -20 3 -30 6 -40" fill="none" stroke="#22301F" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="-2" cy="-46" rx="20" ry="9" fill="#2F6B4A" fill-opacity="0.85"/>
    <ellipse cx="10" cy="-52" rx="13" ry="6" fill="#A9C6A0" fill-opacity="0.85"/>
    <line x1="-16" y1="2" x2="-6" y2="-30" stroke="#22301F" stroke-opacity="0.5" stroke-width="2"/>
    <line x1="16" y1="2" x2="6" y2="-30" stroke="#22301F" stroke-opacity="0.5" stroke-width="2"/>
  </g>
  <g transform="translate(872,428)">
    <ellipse cx="0" cy="3" rx="20" ry="5" fill="#CFC0A0"/>
    <path d="M0 0 C-1 -14 -2 -22 -4 -30 M0 0 C1 -15 2 -24 5 -32" fill="none" stroke="#22301F" stroke-width="2.4" stroke-linecap="round"/>
    <ellipse cx="-1" cy="-37" rx="15" ry="7" fill="#2F6B4A" fill-opacity="0.85"/>
    <ellipse cx="8" cy="-42" rx="10" ry="5" fill="#A9C6A0" fill-opacity="0.85"/>
    <line x1="-12" y1="1" x2="-4" y2="-24" stroke="#22301F" stroke-opacity="0.5" stroke-width="1.8"/>
    <line x1="12" y1="1" x2="4" y2="-24" stroke="#22301F" stroke-opacity="0.5" stroke-width="1.8"/>
  </g>
  <g transform="translate(1200,588)">
    <ellipse cx="0" cy="4" rx="26" ry="7" fill="#CFC0A0"/>
    <path d="M0 0 C-1 -18 -3 -28 -6 -38 M0 0 C1 -20 3 -32 7 -42" fill="none" stroke="#22301F" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="-2" cy="-48" rx="21" ry="9" fill="#2F6B4A" fill-opacity="0.85"/>
    <ellipse cx="11" cy="-54" rx="13" ry="6" fill="#A9C6A0" fill-opacity="0.85"/>
    <line x1="-17" y1="2" x2="-6" y2="-32" stroke="#22301F" stroke-opacity="0.5" stroke-width="2"/>
    <line x1="17" y1="2" x2="6" y2="-32" stroke="#22301F" stroke-opacity="0.5" stroke-width="2"/>
  </g>

  <!-- loop path foreground -->
  <path d="M0 640 C300 610 900 610 1280 632 L1280 720 L0 720 Z" fill="#CFC0A0"/>
  <path d="M0 640 C300 610 900 610 1280 632" fill="none" stroke="#22301F" stroke-opacity="0.2" stroke-width="3"/>
  <path d="M0 640 C300 610 900 610 1280 632 L1280 720 L0 720 Z" fill="url(#stip)"/>

  <!-- family seating ring, new -->
  <path d="M340 654 A 380 130 0 0 1 940 646" fill="none" stroke="#C05A32" stroke-width="15" stroke-linecap="round"/>
  <path d="M340 654 A 380 130 0 0 1 940 646" fill="none" stroke="#22301F" stroke-opacity="0.3" stroke-width="2.5"/>

  <!-- sparse first visitors: one parent, one child -->
  <g transform="translate(560,620)">
    <circle cx="0" cy="-56" r="7.5" fill="#22301F"/>
    <path d="M0 -47 C8 -47 10 -34 8 -20 L5 14 H1.8 L0 -6 L-1.8 14 H-5 L-8 -20 C-10 -34 -8 -47 0 -47 Z" fill="#22301F"/>
  </g>
  <g transform="translate(640,556) scale(0.55)" fill="#22301F">
    <circle cx="4" cy="-56" r="8"/>
    <path d="M2 -46 C11 -47 13 -34 9 -22 L18 6 L13 8 L2 -12 L-10 10 L-15 7 L-6 -22 C-9 -35 -6 -45 2 -46 Z"/>
    <path d="M8 -38 L24 -30 M-2 -38 L-18 -26" stroke="#22301F" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- nabta sparkles -->
  <use href="#spark" transform="translate(720,90) scale(0.8)" fill="#7CC98F"/>
  <use href="#spark" transform="translate(180,300) scale(0.6)" fill="#7BC6DD"/>
  <use href="#spark" transform="translate(1120,360) scale(0.55)" fill="#7CC98F"/>
</svg>
