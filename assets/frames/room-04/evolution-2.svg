    <ellipse cx="15" cy="-64" rx="20" ry="8" fill="#A9C6A0" fill-opacity="0.85"/>
  </g>
  <g transform="translate(1200,588)">
    <ellipse cx="4" cy="5" rx="44" ry="9" fill="#22301F" fill-opacity="0.08"/>
    <path d="M0 0 C-2 -30 -6 -46 -13 -62 M0 0 C2 -34 7 -52 15 -68" fill="none" stroke="#22301F" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="-4" cy="-77" rx="42" ry="16" fill="#2F6B4A" fill-opacity="0.9"/>
    <ellipse cx="21" cy="-87" rx="28" ry="11" fill="#A9C6A0" fill-opacity="0.85"/>
  </g>
