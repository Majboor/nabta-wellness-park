    <path d="M0 0 C-2 -28 -5 -44 -12 -60 M0 0 C2 -32 6 -50 14 -66" fill="none" stroke="#22301F" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="-4" cy="-74" rx="40" ry="15" fill="#2F6B4A" fill-opacity="0.9"/>
    <ellipse cx="20" cy="-84" rx="27" ry="10" fill="#A9C6A0" fill-opacity="0.85"/>
  </g>
  <g transform="translate(872,428)">
    <ellipse cx="3" cy="4" rx="32" ry="7" fill="#22301F" fill-opacity="0.08"/>
    <path d="M0 0 C-2 -22 -4 -34 -9 -46 M0 0 C2 -24 5 -38 11 -50" fill="none" stroke="#22301F" stroke-width="3.2" stroke-linecap="round"/>
