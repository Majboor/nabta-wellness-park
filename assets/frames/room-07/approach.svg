<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <pattern id="stipB" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="1.2" fill="#22301F" opacity="0.07"/>
      <circle cx="12" cy="13" r="1" fill="#22301F" opacity="0.05"/>
    </pattern>
    <linearGradient id="skyB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5EFE2"/>
      <stop offset="1" stop-color="#E7DCC3"/>
    </linearGradient>
    <g id="sparkB">
      <path d="M0,-9 L2.2,-2.2 L9,0 L2.2,2.2 L0,9 L-2.2,2.2 L-9,0 L-2.2,-2.2 Z"/>
    </g>
    <g id="ghafB">
      <path d="M0,0 C-3,-30 -9,-60 -4,-96 C-2,-112 4,-120 2,-136" fill="none" stroke="#22301F" stroke-width="9" stroke-linecap="round"/>
      <path d="M-4,-96 C-26,-112 -44,-124 -58,-146" fill="none" stroke="#22301F" stroke-width="6" stroke-linecap="round"/>
      <path d="M-2,-110 C22,-126 40,-134 56,-154" fill="none" stroke="#22301F" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="-56" cy="-166" rx="66" ry="30" fill="#2F6B4A" opacity="0.85"/>
      <ellipse cx="42" cy="-180" rx="76" ry="34" fill="#2F6B4A" opacity="0.8"/>
      <ellipse cx="-6" cy="-198" rx="62" ry="28" fill="#A9C6A0" opacity="0.75"/>
      <ellipse cx="70" cy="-158" rx="36" ry="18" fill="#A9C6A0" opacity="0.6"/>
    </g>
    <g id="walkerB">
      <circle cx="0" cy="-46" r="7" fill="#22301F"/>
      <path d="M-6,-38 C-8,-20 -7,-8 -5,0 L-1,0 L0,-16 L2,0 L6,0 C8,-10 7,-24 5,-38 Z" fill="#22301F"/>
    </g>
    <g id="childB">
      <circle cx="0" cy="-30" r="5.5" fill="#22301F"/>
      <path d="M-4,-24 C-6,-12 -5,-4 -3,0 L0,-10 L3,0 C5,-6 5,-14 4,-24 Z" fill="#22301F"/>
    </g>
  </defs>

  <!-- sky and ground -->
  <rect width="1280" height="360" fill="url(#skyB)"/>
  <rect y="340" width="1280" height="380" fill="#E7DCC3"/>

  <!-- distant grove line on horizon -->
  <g opacity="0.5">
    <ellipse cx="150" cy="336" rx="130" ry="26" fill="#2F6B4A"/>
    <ellipse cx="420" cy="330" rx="110" ry="22" fill="#A9C6A0"/>
    <ellipse cx="1020" cy="332" rx="150" ry="26" fill="#2F6B4A"/>
    <ellipse cx="1220" cy="328" rx="110" ry="22" fill="#A9C6A0"/>
  </g>

  <!-- lawn bands -->
  <path d="M0,360 C300,344 700,376 1280,352 L1280,470 C860,500 420,458 0,486 Z" fill="#A9C6A0" opacity="0.5"/>
  <path d="M0,486 C420,458 860,500 1280,470 L1280,560 C820,592 440,548 0,584 Z" fill="#A9C6A0" opacity="0.3"/>

  <!-- receding spur path into the groves -->
  <path d="M540,720 C560,600 600,470 634,352 L668,352 C720,470 790,600 830,720 Z" fill="#CFC0A0"/>
  <path d="M572,720 C592,610 622,500 646,400" fill="none" stroke="#F5EFE2" stroke-width="6" opacity="0.5"/>
  <!-- dappled canopy shadow on path -->
  <g fill="#22301F" opacity="0.1">
    <ellipse cx="620" cy="640" rx="90" ry="22"/>
    <ellipse cx="700" cy="560" rx="70" ry="17"/>
    <ellipse cx="640" cy="470" rx="52" ry="13"/>
    <ellipse cx="660" cy="408" rx="36" ry="9"/>
  </g>

  <!-- grove entry threshold: two ghaf trees framing the path -->
  <g transform="translate(430,430) scale(1.05)"><use href="#ghafB"/></g>
  <g transform="translate(880,446) scale(1.2)"><use href="#ghafB" transform="scale(-1,1)"/></g>
  <!-- deeper trees -->
  <g transform="translate(300,392) scale(0.7)" opacity="0.85"><use href="#ghafB"/></g>
  <g transform="translate(1040,398) scale(0.75)" opacity="0.85"><use href="#ghafB" transform="scale(-1,1)"/></g>
  <g transform="translate(700,372) scale(0.5)" opacity="0.8"><use href="#ghafB"/></g>

  <!-- planted pocket edges (shrubs) -->
  <g fill="#2F6B4A" opacity="0.75">
    <ellipse cx="330" cy="470" rx="70" ry="24"/>
    <ellipse cx="210" cy="500" rx="86" ry="28"/>
    <ellipse cx="980" cy="486" rx="80" ry="26"/>
    <ellipse cx="1130" cy="520" rx="96" ry="30"/>
  </g>
  <g fill="#A9C6A0" opacity="0.7">
    <ellipse cx="290" cy="458" rx="44" ry="16"/>
    <ellipse cx="1020" cy="474" rx="50" ry="17"/>
    <ellipse cx="150" cy="488" rx="46" ry="16"/>
  </g>

  <!-- glimpse of picnic table inside grove ahead -->
  <g transform="translate(770,430)">
    <rect x="-34" y="-14" width="68" height="9" rx="4" fill="#C05A32"/>
    <rect x="-26" y="-5" width="7" height="18" fill="#22301F" opacity="0.8"/>
    <rect x="19" y="-5" width="7" height="18" fill="#22301F" opacity="0.8"/>
    <rect x="-42" y="0" width="24" height="6" rx="3" fill="#C05A32" opacity="0.85"/>
    <rect x="18" y="0" width="24" height="6" rx="3" fill="#C05A32" opacity="0.85"/>
  </g>

  <!-- drinking fountain at the threshold -->
  <g transform="translate(520,540)">
    <rect x="-11" y="-58" width="22" height="58" rx="6" fill="#C05A32"/>
    <ellipse cx="0" cy="-58" rx="15" ry="6" fill="#F5EFE2"/>
    <path d="M-4,-62 C-2,-70 4,-72 7,-66" fill="none" stroke="#4E8FA8" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="8" cy="-63" r="2.4" fill="#4E8FA8"/>
    <ellipse cx="2" cy="4" rx="24" ry="6" fill="#22301F" opacity="0.12"/>
  </g>

  <!-- family walking in: two adults, two kids -->
  <g transform="translate(640,600) scale(1.35)"><use href="#walkerB"/></g>
  <g transform="translate(672,596) scale(1.3)"><use href="#walkerB"/></g>
  <g transform="translate(704,606) scale(1.2)"><use href="#childB"/></g>
  <g transform="translate(612,470) scale(0.9)" opacity="0.9"><use href="#childB"/></g>
  <ellipse cx="660" cy="606" rx="52" ry="8" fill="#22301F" opacity="0.12"/>

  <!-- picnic basket carried detail -->
  <rect x="682" y="560" width="16" height="11" rx="3" fill="#C05A32"/>
  <path d="M684,560 C686,552 694,552 696,560" fill="none" stroke="#22301F" stroke-width="2"/>

  <!-- foreground pergola slat shadows sweeping the walk -->
  <g stroke="#C05A32" stroke-width="10" opacity="0.28">
    <line x1="60" y1="700" x2="330" y2="636"/>
    <line x1="130" y1="716" x2="400" y2="652"/>
    <line x1="940" y1="648" x2="1240" y2="700"/>
    <line x1="1000" y1="632" x2="1280" y2="676"/>
  </g>

  <!-- sparkles -->
  <use href="#sparkB" transform="translate(220,120)" fill="#7CC98F" opacity="0.9"/>
  <use href="#sparkB" transform="translate(1100,150) scale(0.8)" fill="#7BC6DD" opacity="0.9"/>
  <use href="#sparkB" transform="translate(760,240) scale(0.6)" fill="#F5EFE2"/>
  <use href="#sparkB" transform="translate(950,560) scale(0.7)" fill="#7CC98F" opacity="0.8"/>

  <!-- texture + warm wash -->
  <rect width="1280" height="720" fill="url(#stipB)"/>
  <rect width="1280" height="720" fill="#C05A32" opacity="0.045"/>
</svg>
