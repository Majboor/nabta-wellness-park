<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <pattern id="stipG" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="1.2" fill="#22301F" opacity="0.07"/>
      <circle cx="12" cy="13" r="1" fill="#22301F" opacity="0.05"/>
    </pattern>
    <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5EFE2"/>
      <stop offset="1" stop-color="#E7DCC3"/>
    </linearGradient>
    <g id="sparkG">
      <path d="M0,-9 L2.2,-2.2 L9,0 L2.2,2.2 L0,9 L-2.2,2.2 L-9,0 L-2.2,-2.2 Z"/>
    </g>
    <g id="sitG">
      <circle cx="0" cy="-30" r="6.5" fill="#22301F"/>
      <path d="M-7,-23 C-9,-12 -8,-5 -7,0 L7,0 C8,-7 8,-14 6,-23 Z" fill="#22301F"/>
    </g>
    <g id="gsitG">
      <circle cx="0" cy="-26" r="6.5" fill="#22301F"/>
      <path d="M-8,-19 C-11,-8 -13,-1 -14,2 L14,2 C11,-5 10,-12 7,-19 Z" fill="#22301F"/>
    </g>
  </defs>

  <!-- sky and ground -->
  <rect width="1280" height="360" fill="url(#skyG)"/>
  <rect y="340" width="1280" height="380" fill="#E7DCC3"/>
  <path d="M0,352 C340,338 840,368 1280,346 L1280,560 C860,590 420,556 0,584 Z" fill="#A9C6A0" opacity="0.5"/>

  <!-- loop path band across foreground -->
  <path d="M0,650 C320,626 760,668 1280,636 L1280,720 L0,720 Z" fill="#CFC0A0"/>
  <path d="M0,650 C320,626 760,668 1280,636" fill="none" stroke="#22301F" stroke-width="4" opacity="0.08"/>

  <!-- YEAR 5: full dappled canopy, five mature ghaf/sidr -->
  <!-- tree 1 -->
  <g>
    <path d="M150,470 C142,400 158,340 140,250" fill="none" stroke="#22301F" stroke-width="14" stroke-linecap="round"/>
    <path d="M146,360 C112,320 88,296 70,254" fill="none" stroke="#22301F" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="110" cy="210" rx="150" ry="66" fill="#2F6B4A" opacity="0.85"/>
    <ellipse cx="40" cy="250" rx="100" ry="44" fill="#A9C6A0" opacity="0.6"/>
  </g>
  <!-- tree 2 -->
  <g>
    <path d="M380,460 C374,396 386,340 372,240" fill="none" stroke="#22301F" stroke-width="13" stroke-linecap="round"/>
    <ellipse cx="380" cy="190" rx="160" ry="70" fill="#2F6B4A" opacity="0.82"/>
    <ellipse cx="440" cy="230" rx="104" ry="44" fill="#A9C6A0" opacity="0.6"/>
  </g>
  <!-- tree 3 -->
  <g>
    <path d="M640,450 C634,390 648,330 632,230" fill="none" stroke="#22301F" stroke-width="14" stroke-linecap="round"/>
    <path d="M638,340 C674,300 700,278 718,240" fill="none" stroke="#22301F" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="660" cy="176" rx="170" ry="72" fill="#2F6B4A" opacity="0.85"/>
    <ellipse cx="590" cy="222" rx="110" ry="46" fill="#A9C6A0" opacity="0.62"/>
  </g>
  <!-- tree 4 -->
  <g>
    <path d="M900,460 C906,398 892,338 908,244" fill="none" stroke="#22301F" stroke-width="13" stroke-linecap="round"/>
    <ellipse cx="910" cy="192" rx="158" ry="68" fill="#2F6B4A" opacity="0.82"/>
    <ellipse cx="850" cy="234" rx="100" ry="42" fill="#A9C6A0" opacity="0.6"/>
  </g>
  <!-- tree 5 -->
  <g>
    <path d="M1150,470 C1158,404 1142,344 1160,250" fill="none" stroke="#22301F" stroke-width="14" stroke-linecap="round"/>
    <path d="M1154,360 C1192,322 1216,300 1234,262" fill="none" stroke="#22301F" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="1180" cy="204" rx="150" ry="66" fill="#2F6B4A" opacity="0.85"/>
    <ellipse cx="1240" cy="248" rx="94" ry="40" fill="#A9C6A0" opacity="0.6"/>
  </g>
  <!-- canopy bridge: crowns knitting together -->
  <ellipse cx="510" cy="150" rx="130" ry="44" fill="#2F6B4A" opacity="0.6"/>
  <ellipse cx="780" cy="146" rx="120" ry="40" fill="#2F6B4A" opacity="0.6"/>
  <ellipse cx="1040" cy="160" rx="110" ry="38" fill="#2F6B4A" opacity="0.55"/>
  <ellipse cx="250" cy="164" rx="110" ry="38" fill="#2F6B4A" opacity="0.55"/>

  <!-- heavy dappled light on lawn -->
  <g fill="#F5EFE2" opacity="0.55">
    <ellipse cx="260" cy="520" rx="80" ry="16"/>
    <ellipse cx="540" cy="560" rx="100" ry="20"/>
    <ellipse cx="820" cy="520" rx="76" ry="15"/>
    <ellipse cx="1080" cy="570" rx="96" ry="19"/>
    <ellipse cx="120" cy="600" rx="70" ry="15"/>
  </g>
  <g fill="#2F6B4A" opacity="0.13">
    <ellipse cx="400" cy="540" rx="90" ry="17"/>
    <ellipse cx="700" cy="590" rx="110" ry="20"/>
    <ellipse cx="960" cy="540" rx="80" ry="15"/>
    <ellipse cx="360" cy="668" rx="120" ry="18"/>
    <ellipse cx="900" cy="676" rx="130" ry="18"/>
  </g>

  <!-- lush understorey shrub pockets -->
  <g fill="#2F6B4A" opacity="0.8">
    <ellipse cx="70" cy="452" rx="80" ry="26"/>
    <ellipse cx="520" cy="440" rx="66" ry="20"/>
    <ellipse cx="1010" cy="446" rx="70" ry="22"/>
    <ellipse cx="1230" cy="460" rx="76" ry="24"/>
  </g>
  <g fill="#A9C6A0" opacity="0.7">
    <ellipse cx="180" cy="444" rx="46" ry="14"/>
    <ellipse cx="760" cy="440" rx="52" ry="15"/>
    <ellipse cx="1120" cy="440" rx="44" ry="13"/>
  </g>
  <g fill="#7CC98F" opacity="0.55">
    <ellipse cx="320" cy="446" rx="30" ry="10"/>
    <ellipse cx="870" cy="444" rx="30" ry="10"/>
  </g>

  <!-- picnic table with family -->
  <g transform="translate(420,548)">
    <ellipse cx="0" cy="42" rx="150" ry="16" fill="#22301F" opacity="0.1"/>
    <rect x="-110" y="-16" width="220" height="15" rx="7" fill="#C05A32"/>
    <rect x="-80" y="-1" width="12" height="44" fill="#22301F" opacity="0.85"/>
    <rect x="68" y="-1" width="12" height="44" fill="#22301F" opacity="0.85"/>
    <rect x="-140" y="12" width="58" height="9" rx="4" fill="#C05A32" opacity="0.9"/>
    <rect x="82" y="12" width="58" height="9" rx="4" fill="#C05A32" opacity="0.9"/>
    <circle cx="-30" cy="-21" r="10" fill="#F5EFE2"/>
    <circle cx="26" cy="-22" r="11" fill="#F5EFE2"/>
    <circle cx="26" cy="-22" r="5.5" fill="#7CC98F" opacity="0.8"/>
    <use href="#sitG" transform="translate(-104,8) scale(1.1)"/>
    <use href="#sitG" transform="translate(102,8) scale(1.1)"/>
    <use href="#sitG" transform="translate(50,5) scale(0.8)"/>
  </g>

  <!-- majlis ground seating -->
  <g transform="translate(920,592)">
    <ellipse cx="0" cy="12" rx="130" ry="22" fill="#C05A32" opacity="0.5"/>
    <ellipse cx="-70" cy="4" rx="20" ry="9" fill="#F5EFE2"/>
    <ellipse cx="72" cy="6" rx="20" ry="9" fill="#F5EFE2"/>
    <ellipse cx="-16" cy="22" rx="20" ry="9" fill="#F5EFE2"/>
    <use href="#gsitG" transform="translate(-64,0)"/>
    <use href="#gsitG" transform="translate(66,2) scale(-1,1)"/>
    <ellipse cx="4" cy="12" rx="15" ry="5.5" fill="#C05A32"/>
  </g>

  <!-- drinking fountain -->
  <g transform="translate(660,540)">
    <rect x="-10" y="-52" width="20" height="52" rx="5" fill="#C05A32"/>
    <ellipse cx="0" cy="-52" rx="13" ry="5" fill="#F5EFE2"/>
    <path d="M-3,-56 C-1,-63 4,-65 7,-60" fill="none" stroke="#4E8FA8" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="2" cy="3" rx="20" ry="5" fill="#22301F" opacity="0.12"/>
  </g>

  <!-- kid on lawn -->
  <g transform="translate(760,510)">
    <circle cx="0" cy="-28" r="5.5" fill="#22301F"/>
    <path d="M-4,-22 C-6,-11 -4,-6 -8,0 L-4,1 L1,-9 L6,0 L10,-2 C5,-9 5,-16 3,-22 Z" fill="#22301F"/>
  </g>

  <!-- sparkles -->
  <use href="#sparkG" transform="translate(240,110)" fill="#7CC98F" opacity="0.9"/>
  <use href="#sparkG" transform="translate(1060,120) scale(0.8)" fill="#7BC6DD" opacity="0.9"/>
  <use href="#sparkG" transform="translate(650,90) scale(0.6)" fill="#F5EFE2"/>

  <!-- texture + warm wash -->
  <rect width="1280" height="720" fill="url(#stipG)"/>
  <rect width="1280" height="720" fill="#C05A32" opacity="0.045"/>
</svg>
