<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <pattern id="stipC" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="1.2" fill="#22301F" opacity="0.07"/>
      <circle cx="12" cy="13" r="1" fill="#22301F" opacity="0.05"/>
    </pattern>
    <linearGradient id="skyC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5EFE2"/>
      <stop offset="1" stop-color="#E7DCC3"/>
    </linearGradient>
    <g id="sparkC">
      <path d="M0,-9 L2.2,-2.2 L9,0 L2.2,2.2 L0,9 L-2.2,2.2 L-9,0 L-2.2,-2.2 Z"/>
    </g>
    <g id="sitterC">
      <circle cx="0" cy="-34" r="7.5" fill="#22301F"/>
      <path d="M-8,-26 C-10,-14 -9,-6 -8,0 L8,0 C9,-8 9,-16 7,-26 Z" fill="#22301F"/>
    </g>
    <g id="groundSitC">
      <circle cx="0" cy="-30" r="7.5" fill="#22301F"/>
      <path d="M-9,-22 C-12,-10 -14,-2 -16,2 L16,2 C13,-6 11,-14 8,-22 Z" fill="#22301F"/>
    </g>
    <g id="runKidC">
      <circle cx="0" cy="-34" r="6" fill="#22301F"/>
      <path d="M-4,-27 C-6,-16 -4,-10 -10,-2 L-5,0 L1,-12 L8,-1 L12,-4 C6,-12 6,-20 4,-27 Z" fill="#22301F"/>
      <path d="M-4,-24 L-14,-18" stroke="#22301F" stroke-width="3" stroke-linecap="round"/>
      <path d="M3,-24 L12,-28" stroke="#22301F" stroke-width="3" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- sky glimpse and ground -->
  <rect width="1280" height="320" fill="url(#skyC)"/>
  <rect y="300" width="1280" height="420" fill="#E7DCC3"/>
  <path d="M0,310 C340,296 820,326 1280,304 L1280,430 C880,452 420,428 0,446 Z" fill="#A9C6A0" opacity="0.45"/>

  <!-- full ghaf/sidr canopy overhead -->
  <g>
    <ellipse cx="120" cy="60" rx="300" ry="120" fill="#2F6B4A" opacity="0.85"/>
    <ellipse cx="520" cy="10" rx="340" ry="130" fill="#2F6B4A" opacity="0.8"/>
    <ellipse cx="960" cy="50" rx="330" ry="125" fill="#2F6B4A" opacity="0.85"/>
    <ellipse cx="1260" cy="10" rx="240" ry="110" fill="#2F6B4A" opacity="0.8"/>
    <ellipse cx="320" cy="90" rx="220" ry="80" fill="#A9C6A0" opacity="0.55"/>
    <ellipse cx="760" cy="70" rx="240" ry="85" fill="#A9C6A0" opacity="0.5"/>
    <ellipse cx="1140" cy="110" rx="180" ry="65" fill="#A9C6A0" opacity="0.5"/>
    <!-- sun gaps -->
    <ellipse cx="620" cy="120" rx="60" ry="24" fill="#F5EFE2" opacity="0.65"/>
    <ellipse cx="230" cy="150" rx="40" ry="16" fill="#F5EFE2" opacity="0.5"/>
    <ellipse cx="1010" cy="140" rx="46" ry="18" fill="#F5EFE2" opacity="0.55"/>
  </g>

  <!-- trunks -->
  <g stroke="#22301F" stroke-linecap="round" fill="none">
    <path d="M150,470 C142,380 156,300 138,190" stroke-width="16"/>
    <path d="M144,330 C110,290 84,260 66,220" stroke-width="9"/>
    <path d="M1100,500 C1112,400 1092,320 1116,200" stroke-width="18"/>
    <path d="M1104,360 C1150,320 1176,290 1196,240" stroke-width="10"/>
    <path d="M660,360 C656,310 664,270 654,220" stroke-width="9" opacity="0.9"/>
  </g>

  <!-- dappled light pools on lawn -->
  <g fill="#F5EFE2" opacity="0.55">
    <ellipse cx="300" cy="520" rx="80" ry="18"/>
    <ellipse cx="560" cy="600" rx="110" ry="24"/>
    <ellipse cx="880" cy="540" rx="90" ry="20"/>
    <ellipse cx="440" cy="470" rx="56" ry="13"/>
    <ellipse cx="1030" cy="640" rx="120" ry="26"/>
    <ellipse cx="150" cy="640" rx="90" ry="22"/>
  </g>
  <g fill="#2F6B4A" opacity="0.12">
    <ellipse cx="420" cy="560" rx="90" ry="20"/>
    <ellipse cx="760" cy="620" rx="120" ry="26"/>
    <ellipse cx="980" cy="480" rx="70" ry="15"/>
  </g>

  <!-- planted pocket edge behind -->
  <g fill="#2F6B4A" opacity="0.8">
    <ellipse cx="80" cy="420" rx="110" ry="34"/>
    <ellipse cx="330" cy="404" rx="90" ry="26"/>
    <ellipse cx="1200" cy="420" rx="130" ry="36"/>
    <ellipse cx="960" cy="400" rx="86" ry="24"/>
  </g>
  <g fill="#A9C6A0" opacity="0.7">
    <ellipse cx="200" cy="400" rx="60" ry="18"/>
    <ellipse cx="1060" cy="396" rx="64" ry="18"/>
    <ellipse cx="620" cy="392" rx="70" ry="16"/>
  </g>

  <!-- picnic table with family (weekend gathering) -->
  <g transform="translate(430,540)">
    <ellipse cx="0" cy="52" rx="180" ry="20" fill="#22301F" opacity="0.1"/>
    <rect x="-130" y="-20" width="260" height="18" rx="8" fill="#C05A32"/>
    <rect x="-96" y="-2" width="14" height="52" fill="#22301F" opacity="0.85"/>
    <rect x="82" y="-2" width="14" height="52" fill="#22301F" opacity="0.85"/>
    <rect x="-166" y="14" width="70" height="10" rx="5" fill="#C05A32" opacity="0.9"/>
    <rect x="96" y="14" width="70" height="10" rx="5" fill="#C05A32" opacity="0.9"/>
    <!-- spread: plates and dishes, no BBQ -->
    <circle cx="-58" cy="-24" r="12" fill="#F5EFE2"/>
    <circle cx="-6" cy="-26" r="14" fill="#F5EFE2"/>
    <circle cx="-6" cy="-26" r="7" fill="#7CC98F" opacity="0.8"/>
    <circle cx="52" cy="-24" r="11" fill="#F5EFE2"/>
    <rect x="18" y="-34" width="10" height="14" rx="3" fill="#7BC6DD"/>
    <rect x="-36" y="-33" width="9" height="12" rx="3" fill="#4E8FA8"/>
    <!-- seated family -->
    <use href="#sitterC" transform="translate(-120,10) scale(1.15)"/>
    <use href="#sitterC" transform="translate(-70,6) scale(1.1)"/>
    <use href="#sitterC" transform="translate(120,10) scale(1.2)"/>
    <use href="#sitterC" transform="translate(66,6) scale(0.85)"/>
  </g>

  <!-- majlis ground seating pocket -->
  <g transform="translate(920,600)">
    <ellipse cx="0" cy="14" rx="170" ry="30" fill="#C05A32" opacity="0.5"/>
    <ellipse cx="0" cy="14" rx="120" ry="20" fill="#E7DCC3" opacity="0.7"/>
    <ellipse cx="-96" cy="4" rx="26" ry="12" fill="#F5EFE2"/>
    <ellipse cx="96" cy="6" rx="26" ry="12" fill="#F5EFE2"/>
    <ellipse cx="-30" cy="30" rx="26" ry="12" fill="#F5EFE2"/>
    <use href="#groundSitC" transform="translate(-88,0) scale(1.15)"/>
    <use href="#groundSitC" transform="translate(90,2) scale(1.1) scale(-1,1)"/>
    <use href="#groundSitC" transform="translate(10,-8) scale(0.95)"/>
    <!-- tea tray -->
    <ellipse cx="4" cy="18" rx="20" ry="7" fill="#C05A32"/>
    <rect x="-3" y="4" width="7" height="10" rx="2" fill="#F5EFE2"/>
  </g>

  <!-- kids running on the lawn between -->
  <use href="#runKidC" transform="translate(680,500) scale(1.05)"/>
  <use href="#runKidC" transform="translate(740,516) scale(0.95) scale(-1,1)"/>
  <ellipse cx="706" cy="506" rx="46" ry="7" fill="#22301F" opacity="0.1"/>

  <!-- drinking fountain -->
  <g transform="translate(210,560)">
    <rect x="-12" y="-64" width="24" height="64" rx="6" fill="#C05A32"/>
    <ellipse cx="0" cy="-64" rx="16" ry="6" fill="#F5EFE2"/>
    <path d="M-4,-68 C-2,-77 5,-79 8,-72" fill="none" stroke="#4E8FA8" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="9" cy="-69" r="2.5" fill="#4E8FA8"/>
    <ellipse cx="2" cy="4" rx="26" ry="6" fill="#22301F" opacity="0.12"/>
  </g>

  <!-- foreground grass tufts and leaf fall -->
  <g stroke="#2F6B4A" stroke-width="3" stroke-linecap="round" opacity="0.7" fill="none">
    <path d="M60,700 C64,684 60,676 66,664"/>
    <path d="M74,702 C76,688 82,680 80,668"/>
    <path d="M1220,690 C1224,674 1220,666 1226,654"/>
    <path d="M1236,694 C1238,680 1244,672 1242,660"/>
  </g>
  <g fill="#A9C6A0" opacity="0.8">
    <ellipse cx="500" cy="300" rx="5" ry="2.4" transform="rotate(24 500 300)"/>
    <ellipse cx="840" cy="260" rx="5" ry="2.4" transform="rotate(-18 840 260)"/>
    <ellipse cx="360" cy="340" rx="4" ry="2" transform="rotate(40 360 340)"/>
  </g>

  <!-- sparkles -->
  <use href="#sparkC" transform="translate(620,160)" fill="#F5EFE2"/>
  <use href="#sparkC" transform="translate(260,220) scale(0.7)" fill="#7CC98F" opacity="0.9"/>
  <use href="#sparkC" transform="translate(1010,190) scale(0.8)" fill="#7BC6DD" opacity="0.9"/>
  <use href="#sparkC" transform="translate(760,420) scale(0.6)" fill="#7CC98F" opacity="0.8"/>

  <!-- texture + warm wash -->
  <rect width="1280" height="720" fill="url(#stipC)"/>
  <rect width="1280" height="720" fill="#C05A32" opacity="0.045"/>
</svg>
