      <path d="M-8,-20 C-9,-8 -8,-2 -6,2 L14,4 L14,8 L-10,7 C-13,0 -12,-12 -8,-20 Z"/>
    </g>
  </defs>

  <!-- ink night sky -->
  <rect x="0" y="0" width="1280" height="720" fill="#22301F"/>
  <rect x="0" y="0" width="1280" height="300" fill="#4E8FA8" fill-opacity="0.12"/>
  <rect x="0" y="240" width="1280" height="100" fill="#22301F" fill-opacity="0.4"/>
  <!-- moon -->
  <circle cx="220" cy="104" r="34" fill="#F5EFE2" fill-opacity="0.95"/>
  <circle cx="232" cy="96" r="30" fill="#22301F" fill-opacity="0.28"/>
  <!-- stars -->
  <g fill="#F5EFE2">
    <circle cx="90" cy="60" r="2"/><circle cx="340" cy="48" r="1.6"/><circle cx="470" cy="110" r="2.1"/>
    <circle cx="600" cy="52" r="1.5"/><circle cx="760" cy="96" r="2"/><circle cx="905" cy="44" r="1.6"/>
    <circle cx="1060" cy="86" r="2.2"/><circle cx="1180" cy="140" r="1.6"/><circle cx="1240" cy="52" r="2"/>
    <circle cx="530" cy="180" r="1.4" fill-opacity="0.8"/><circle cx="820" cy="176" r="1.4" fill-opacity="0.8"/>
    <circle cx="150" cy="200" r="1.4" fill-opacity="0.7"/><circle cx="1120" cy="210" r="1.4" fill-opacity="0.7"/>
  </g>
  <use href="#sparkN" transform="translate(680,120) scale(0.8)" fill="#F5EFE2"/>
  <use href="#sparkN" transform="translate(1010,150) scale(0.5)" fill="#7BC6DD"/>
  <use href="#sparkN" transform="translate(390,150) scale(0.45)" fill="#7CC98F"/>

  <!-- rim canopy, black against the sky -->
  <ellipse cx="120" cy="316" rx="150" ry="46" fill="#22301F"/>
  <ellipse cx="420" cy="308" rx="180" ry="40" fill="#22301F"/>
  <ellipse cx="820" cy="312" rx="200" ry="44" fill="#22301F"/>
  <ellipse cx="1180" cy="318" rx="170" ry="48" fill="#22301F"/>
  <ellipse cx="420" cy="308" rx="180" ry="40" fill="#2F6B4A" fill-opacity="0.3"/>
  <ellipse cx="820" cy="312" rx="200" ry="44" fill="#2F6B4A" fill-opacity="0.3"/>

  <!-- CINEMA SCREEN on the far rim -->
  <ellipse cx="640" cy="330" rx="360" ry="200" fill="url(#screenGlow)"/>
  <g>
    <rect x="500" y="196" width="10" height="150" fill="#22301F"/>
    <rect x="770" y="196" width="10" height="150" fill="#22301F"/>
    <rect x="508" y="204" width="264" height="140" rx="6" fill="#F5EFE2"/>
    <rect x="516" y="212" width="248" height="124" rx="4" fill="#7BC6DD" fill-opacity="0.4"/>
    <rect x="516" y="286" width="248" height="50" rx="4" fill="#E7DCC3" fill-opacity="0.6"/>
    <circle cx="590" cy="256" r="18" fill="#F5EFE2" fill-opacity="0.9"/>
    <path d="M660,320 C700,290 730,270 758,240 L764,252 C740,282 706,304 668,330 Z" fill="#4E8FA8" fill-opacity="0.35"/>
  </g>
  <!-- glow spill on rim path -->
  <path d="M0,340 C300,326 980,326 1280,340 L1280,358 C980,346 300,346 0,358 Z" fill="#CFC0A0" fill-opacity="0.4"/>
  <ellipse cx="640" cy="380" rx="330" ry="60" fill="#F5EFE2" fill-opacity="0.12"/>

  <!-- string lights swooping across the lawn -->
  <g>
    <rect x="80" y="236" width="7" height="130" fill="#22301F"/>
    <rect x="1196" y="240" width="7" height="130" fill="#22301F"/>
    <path d="M84,246 C300,320 520,330 640,326" stroke="#22301F" stroke-width="2.4" fill="none"/>
    <path d="M640,326 C760,330 980,322 1200,250" stroke="#22301F" stroke-width="2.4" fill="none"/>
    <path d="M84,262 C340,368 900,368 1200,266" stroke="#22301F" stroke-width="2.4" fill="none"/>
    <g fill="#F5EFE2">
      <circle cx="150" cy="272" r="4"/><circle cx="230" cy="292" r="4"/><circle cx="320" cy="308" r="4"/>
      <circle cx="420" cy="318" r="4"/><circle cx="530" cy="324" r="4"/><circle cx="750" cy="328" r="4"/>
      <circle cx="870" cy="322" r="4"/><circle cx="980" cy="310" r="4"/><circle cx="1080" cy="292" r="4"/><circle cx="1150" cy="272" r="4"/>
    </g>
    <g fill="#7CC98F">
      <circle cx="190" cy="300" r="3.4"/><circle cx="360" cy="340" r="3.4"/><circle cx="560" cy="356" r="3.4"/>
      <circle cx="760" cy="356" r="3.4"/><circle cx="950" cy="338" r="3.4"/><circle cx="1110" cy="298" r="3.4"/>
    </g>
    <g fill="#E7DCC3">
      <circle cx="270" cy="322" r="3.2"/><circle cx="460" cy="350" r="3.2"/><circle cx="660" cy="358" r="3.2"/>
      <circle cx="860" cy="350" r="3.2"/><circle cx="1040" cy="318" r="3.2"/>
    </g>
  </g>

  <!-- night lawn bowl -->
  <path d="M0,358 C300,346 980,346 1280,358 L1280,720 L0,720 Z" fill="#2F6B4A" fill-opacity="0.55"/>
  <path d="M0,392 C320,362 960,362 1280,392 L1280,720 L0,720 Z" fill="#22301F" fill-opacity="0.45"/>
  <path d="M0,470 C340,420 940,420 1280,470 L1280,720 L0,720 Z" fill="#22301F" fill-opacity="0.35"/>
  <path d="M0,358 C300,346 980,346 1280,358 L1280,720 L0,720 Z" fill="url(#stipN)"/>
  <!-- screen light pooling down the bowl -->
  <path d="M508,344 L772,344 L960,700 L320,700 Z" fill="#F5EFE2" fill-opacity="0.09"/>
  <ellipse cx="640" cy="520" rx="330" ry="110" fill="#7BC6DD" fill-opacity="0.08"/>

  <!-- kiosk carts glowing at the rim -->
  <g transform="translate(120,318)">
    <rect x="0" y="0" width="52" height="30" rx="4" fill="#C05A32"/>
    <rect x="6" y="7" width="40" height="12" rx="2" fill="#F5EFE2" fill-opacity="0.85"/>
    <rect x="-6" y="-11" width="64" height="11" rx="5" fill="#E7DCC3" fill-opacity="0.7"/>
    <circle cx="11" cy="33" r="5.5" fill="#22301F"/><circle cx="41" cy="33" r="5.5" fill="#22301F"/>
    <ellipse cx="26" cy="44" rx="40" ry="8" fill="#F5EFE2" fill-opacity="0.12"/>
  </g>
  <g transform="translate(1092,320)">
    <rect x="0" y="0" width="52" height="30" rx="4" fill="#C05A32"/>
    <rect x="6" y="7" width="40" height="12" rx="2" fill="#F5EFE2" fill-opacity="0.85"/>
    <rect x="-6" y="-11" width="64" height="11" rx="5" fill="#E7DCC3" fill-opacity="0.7"/>
    <circle cx="11" cy="33" r="5.5" fill="#22301F"/><circle cx="41" cy="33" r="5.5" fill="#22301F"/>
    <ellipse cx="26" cy="44" rx="40" ry="8" fill="#F5EFE2" fill-opacity="0.12"/>
  </g>

  <!-- audience: blankets and seated silhouettes facing the screen -->
  <g>
    <path d="M540,470 L660,462 L688,502 L560,510 Z" fill="#C05A32" fill-opacity="0.5"/>
    <path d="M760,500 L880,492 L908,538 L784,546 Z" fill="#E7DCC3" fill-opacity="0.35"/>
    <path d="M350,510 L460,502 L486,548 L364,556 Z" fill="#7CC98F" fill-opacity="0.3"/>
    <path d="M560,560 L700,552 L732,606 L586,614 Z" fill="#C05A32" fill-opacity="0.4"/>
    <path d="M840,580 L960,572 L990,624 L866,632 Z" fill="#7BC6DD" fill-opacity="0.25"/>
  </g>
  <g>
    <use href="#seatedN" transform="translate(586,478) scale(0.85)"/>
    <use href="#seatedN" transform="translate(630,474) scale(0.85) scale(-1,1)"/>
    <use href="#seatedN" transform="translate(806,508) scale(0.9)"/>
    <use href="#seatedN" transform="translate(852,504) scale(0.9) scale(-1,1)"/>
    <use href="#seatedN" transform="translate(398,518) scale(0.9)"/>
    <use href="#seatedN" transform="translate(612,572)"/>
    <use href="#seatedN" transform="translate(662,568) scale(-1,1)"/>
    <use href="#seatedN" transform="translate(890,590) scale(1.05)"/>
    <use href="#seatedN" transform="translate(470,600) scale(1.1)"/>
    <use href="#seatedN" transform="translate(760,630) scale(1.15)"/>
  </g>
  <!-- kid standing, backlit by the screen -->
  <g fill="#22301F" transform="translate(320,470) scale(0.6)">
    <circle cx="0" cy="-48" r="8.5"/>
    <path d="M-6,-40 L-16,4 L-9,4 L0,-20 L9,4 L16,4 L6,-40 Z"/>
  </g>

  <!-- edge trees leaning into frame, ink on ink -->
  <use href="#ghafN" transform="translate(90,420) scale(1.9)"/>
  <use href="#ghafN" transform="translate(1210,440) scale(2.2)"/>

  <!-- foreground grass, catching the glow -->
  <g stroke="#A9C6A0" stroke-width="3" stroke-linecap="round" stroke-opacity="0.4">
    <path d="M120,700 C124,684 122,676 118,668"/>
    <path d="M640,712 C644,698 642,690 638,684"/>
    <path d="M1130,702 C1134,686 1132,678 1128,670"/>
  </g>
</svg>
