<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <pattern id="stipN" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="6" r="1.5" fill="#22301F" fill-opacity="0.25"/>
      <circle cx="14" cy="14" r="1.1" fill="#22301F" fill-opacity="0.18"/>
    </pattern>
    <path id="sparkN" d="M0,-10 L2.2,-2.2 L10,0 L2.2,2.2 L0,10 L-2.2,2.2 L-10,0 L-2.2,-2.2 Z"/>
    <radialGradient id="screenGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F5EFE2" stop-opacity="0.5"/>
      <stop offset="0.55" stop-color="#F5EFE2" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F5EFE2" stop-opacity="0"/>
    </radialGradient>
    <g id="ghafN">
      <path d="M-5,0 L-3,-64 L3,-64 L5,0 Z" fill="#22301F"/>
      <path d="M-3,-60 C-22,-70 -36,-62 -46,-76" stroke="#22301F" stroke-width="3.5" fill="none"/>
      <path d="M3,-60 C20,-72 34,-64 44,-78" stroke="#22301F" stroke-width="3.5" fill="none"/>
      <ellipse cx="0" cy="-94" rx="66" ry="22" fill="#22301F"/>
      <ellipse cx="-28" cy="-104" rx="38" ry="14" fill="#2F6B4A" fill-opacity="0.55"/>
      <ellipse cx="30" cy="-88" rx="34" ry="12" fill="#2F6B4A" fill-opacity="0.4"/>
    </g>
    <g id="seatedN" fill="#22301F">
