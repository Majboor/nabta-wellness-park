<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <pattern id="stipA" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="1.2" fill="#22301F" fill-opacity="0.07"/>
      <circle cx="12" cy="12" r="1" fill="#22301F" fill-opacity="0.05"/>
    </pattern>
    <pattern id="stipG" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="6" r="1.4" fill="#2F6B4A" fill-opacity="0.14"/>
      <circle cx="14" cy="13" r="1.1" fill="#22301F" fill-opacity="0.06"/>
    </pattern>
    <path id="sparkA" d="M0,-10 L2.2,-2.2 L10,0 L2.2,2.2 L0,10 L-2.2,2.2 L-10,0 L-2.2,-2.2 Z"/>
    <g id="ghafTop">
      <circle r="16" fill="#2F6B4A"/>
      <circle cx="-9" cy="-5" r="10" fill="#A9C6A0" fill-opacity="0.75"/>
      <circle cx="8" cy="6" r="9" fill="#A9C6A0" fill-opacity="0.55"/>
    </g>
  </defs>

  <!-- sky band -->
  <rect x="0" y="0" width="1280" height="720" fill="#F5EFE2"/>
  <rect x="0" y="0" width="1280" height="120" fill="#7BC6DD" fill-opacity="0.16"/>
  <rect x="0" y="70" width="1280" height="50" fill="#F5EFE2" fill-opacity="0.6"/>
  <circle cx="1080" cy="62" r="34" fill="#F5EFE2"/>
  <circle cx="1080" cy="62" r="26" fill="#E7DCC3" fill-opacity="0.8"/>
  <!-- distant city haze -->
  <g fill="#22301F" fill-opacity="0.12">
    <rect x="60" y="88" width="26" height="32"/>
    <rect x="100" y="76" width="18" height="44"/>
    <rect x="150" y="94" width="34" height="26"/>
    <rect x="230" y="82" width="20" height="38"/>
    <rect x="1180" y="86" width="24" height="34"/>
    <rect x="1130" y="96" width="30" height="24"/>
  </g>

  <!-- ground plane -->
  <rect x="0" y="120" width="1280" height="600" fill="#E7DCC3"/>
  <rect x="0" y="120" width="1280" height="600" fill="url(#stipA)"/>
  <ellipse cx="640" cy="470" rx="620" ry="290" fill="#F5EFE2" fill-opacity="0.5"/>

  <!-- wadi bioswale ribbon -->
  <path d="M-20,560 C220,520 340,600 560,588 C780,576 900,640 1300,600 L1300,720 L-20,720 Z" fill="#CFC0A0" fill-opacity="0.5"/>
  <path d="M-20,584 C230,548 360,618 580,606 C800,594 930,652 1300,622" fill="none" stroke="#4E8FA8" stroke-width="20" stroke-opacity="0.8" stroke-linecap="round"/>
  <path d="M-20,584 C230,548 360,618 580,606 C800,594 930,652 1300,622" fill="none" stroke="#7BC6DD" stroke-width="6" stroke-opacity="0.6"/>

  <!-- figure-eight shaded loop -->
  <g fill="none" stroke-linecap="round">
    <path d="M330,390 C330,270 560,240 640,330 C720,420 950,390 950,470 C950,560 720,590 640,500 C560,410 330,510 330,390 Z" stroke="#CFC0A0" stroke-width="34"/>
    <path d="M330,390 C330,270 560,240 640,330 C720,420 950,390 950,470 C950,560 720,590 640,500 C560,410 330,510 330,390 Z" stroke="#22301F" stroke-width="34" stroke-opacity="0.05"/>
    <path d="M330,390 C330,270 560,240 640,330 C720,420 950,390 950,470 C950,560 720,590 640,500 C560,410 330,510 330,390 Z" stroke="#F5EFE2" stroke-width="4" stroke-opacity="0.5" stroke-dasharray="2 26"/>
  </g>

  <!-- event lawn: bowl-shaped green heart inside eastern loop -->
  <ellipse cx="790" cy="440" rx="190" ry="118" fill="#2F6B4A"/>
  <ellipse cx="790" cy="440" rx="190" ry="118" fill="url(#stipG)"/>
  <ellipse cx="790" cy="446" rx="150" ry="90" fill="#A9C6A0" fill-opacity="0.45"/>
  <ellipse cx="790" cy="452" rx="104" ry="60" fill="#7CC98F" fill-opacity="0.3"/>
  <ellipse cx="790" cy="458" rx="58" ry="32" fill="#A9C6A0" fill-opacity="0.5"/>

  <!-- second (west) meadow cell -->
  <ellipse cx="470" cy="392" rx="120" ry="76" fill="#A9C6A0" fill-opacity="0.55"/>
  <ellipse cx="470" cy="396" rx="82" ry="50" fill="#2F6B4A" fill-opacity="0.25"/>

  <!-- kiosk cart pads at lawn rim -->
  <g>
    <rect x="668" y="330" width="26" height="18" rx="3" fill="#C05A32"/>
    <rect x="880" y="348" width="26" height="18" rx="3" fill="#C05A32"/>
    <rect x="912" y="500" width="26" height="18" rx="3" fill="#C05A32" fill-opacity="0.85"/>
    <rect x="676" y="528" width="26" height="18" rx="3" fill="#CFC0A0"/>
    <rect x="620" y="430" width="24" height="16" rx="3" fill="#CFC0A0"/>
  </g>

  <!-- terracotta pergola slats along the loop -->
  <g fill="#C05A32">
    <g transform="translate(600,300) rotate(24)"><rect x="0" y="0" width="70" height="6"/><rect x="0" y="10" width="70" height="6"/><rect x="0" y="20" width="70" height="6"/></g>
    <g transform="translate(880,540) rotate(-18)"><rect x="0" y="0" width="70" height="6"/><rect x="0" y="10" width="70" height="6"/><rect x="0" y="20" width="70" height="6"/></g>
    <g transform="translate(340,470) rotate(-40)"><rect x="0" y="0" width="60" height="6"/><rect x="0" y="10" width="60" height="6"/><rect x="0" y="20" width="60" height="6"/></g>
  </g>

  <!-- ghaf groves edging the lawn -->
  <g>
    <use href="#ghafTop" transform="translate(640,352)"/>
    <use href="#ghafTop" transform="translate(672,300) scale(0.8)"/>
    <use href="#ghafTop" transform="translate(950,392) scale(0.9)"/>
    <use href="#ghafTop" transform="translate(986,440) scale(0.75)"/>
    <use href="#ghafTop" transform="translate(940,520) scale(0.85)"/>
    <use href="#ghafTop" transform="translate(640,540) scale(0.9)"/>
    <use href="#ghafTop" transform="translate(600,480) scale(0.7)"/>
    <use href="#ghafTop" transform="translate(420,320) scale(0.85)"/>
    <use href="#ghafTop" transform="translate(370,350) scale(0.7)"/>
    <use href="#ghafTop" transform="translate(470,470) scale(0.8)"/>
    <use href="#ghafTop" transform="translate(540,420) scale(0.6)"/>
    <use href="#ghafTop" transform="translate(300,430) scale(0.75)"/>
    <use href="#ghafTop" transform="translate(760,320) scale(0.65)"/>
    <use href="#ghafTop" transform="translate(860,560) scale(0.7)"/>
    <use href="#ghafTop" transform="translate(200,250) scale(0.8)"/>
    <use href="#ghafTop" transform="translate(1080,300) scale(0.8)"/>
    <use href="#ghafTop" transform="translate(1130,470) scale(0.9)"/>
    <use href="#ghafTop" transform="translate(150,520) scale(0.9)"/>
  </g>

  <!-- tiny people on the lawn and loop -->
  <g fill="#22301F">
    <circle cx="770" cy="430" r="3.2"/><circle cx="810" cy="452" r="3.2"/><circle cx="748" cy="468" r="3"/>
    <circle cx="836" cy="420" r="3"/><circle cx="792" cy="490" r="3"/><circle cx="716" cy="446" r="2.8"/>
    <circle cx="560" cy="278" r="2.8"/><circle cx="906" cy="418" r="2.8"/><circle cx="470" cy="530" r="2.8"/>
    <circle cx="430" cy="382" r="2.8"/><circle cx="640" cy="512" r="2.8"/>
  </g>
  <!-- picnic blanket dots -->
  <g>
    <rect x="758" y="422" width="16" height="11" rx="2" fill="#C05A32" fill-opacity="0.8" transform="rotate(8 766 427)"/>
    <rect x="812" y="460" width="16" height="11" rx="2" fill="#F5EFE2" fill-opacity="0.9" transform="rotate(-6 820 465)"/>
    <rect x="742" y="472" width="14" height="10" rx="2" fill="#7CC98F" fill-opacity="0.7"/>
  </g>

  <!-- nabta sparkles -->
  <g fill="#7CC98F">
    <use href="#sparkA" transform="translate(1010,180) scale(0.9)"/>
    <use href="#sparkA" transform="translate(250,170) scale(0.6)"/>
  </g>
  <use href="#sparkA" transform="translate(920,620) scale(0.7)" fill="#C05A32" fill-opacity="0.8"/>
  <use href="#sparkA" transform="translate(120,340) scale(0.5)" fill="#7BC6DD"/>
</svg>
