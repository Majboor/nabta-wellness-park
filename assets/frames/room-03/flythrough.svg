<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <pattern id="stipD" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="1.2" fill="#22301F" fill-opacity="0.06"/>
      <circle cx="12" cy="12" r="1" fill="#22301F" fill-opacity="0.05"/>
    </pattern>
    <pattern id="stipDG" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="6" r="1.4" fill="#2F6B4A" fill-opacity="0.15"/>
      <circle cx="14" cy="13" r="1.1" fill="#22301F" fill-opacity="0.06"/>
    </pattern>
    <path id="sparkD" d="M0,-10 L2.2,-2.2 L10,0 L2.2,2.2 L0,10 L-2.2,2.2 L-10,0 L-2.2,-2.2 Z"/>
    <g id="ghafD">
      <path d="M-3,0 L-2,-30 L2,-30 L3,0 Z" fill="#22301F"/>
      <ellipse cx="0" cy="-44" rx="34" ry="13" fill="#2F6B4A"/>
      <ellipse cx="-14" cy="-50" rx="20" ry="8" fill="#A9C6A0" fill-opacity="0.7"/>
      <ellipse cx="15" cy="-41" rx="17" ry="7" fill="#A9C6A0" fill-opacity="0.5"/>
      <ellipse cx="6" cy="4" rx="26" ry="7" fill="#22301F" fill-opacity="0.12"/>
    </g>
  </defs>

  <!-- tilted horizon: drone banking over the loop -->
  <rect x="0" y="0" width="1280" height="720" fill="#F5EFE2"/>
  <path d="M0,150 L1280,70 L1280,0 L0,0 Z" fill="#7BC6DD" fill-opacity="0.16"/>
  <path d="M0,195 L1280,110 L1280,70 L0,150 Z" fill="#E7DCC3" fill-opacity="0.6"/>
  <circle cx="180" cy="76" r="36" fill="#F5EFE2"/>
  <circle cx="180" cy="76" r="27" fill="#E7DCC3" fill-opacity="0.9"/>
  <!-- distant skyline haze on the tilt -->
  <g fill="#22301F" fill-opacity="0.1">
    <rect x="880" y="96" width="20" height="34" transform="rotate(-3 890 113)"/>
    <rect x="930" y="82" width="16" height="44" transform="rotate(-3 938 104)"/>
    <rect x="1010" y="90" width="26" height="30" transform="rotate(-3 1023 105)"/>
    <rect x="1120" y="74" width="18" height="40" transform="rotate(-3 1129 94)"/>
  </g>

  <!-- ground sweeping up-right -->
  <path d="M0,195 L1280,110 L1280,720 L0,720 Z" fill="#E7DCC3"/>
  <path d="M0,195 L1280,110 L1280,720 L0,720 Z" fill="url(#stipD)"/>
  <path d="M0,320 C420,250 900,230 1280,200 L1280,720 L0,720 Z" fill="#F5EFE2" fill-opacity="0.45"/>

  <!-- wadi bioswale crossing the frame -->
  <path d="M-20,300 C260,296 420,340 640,330 C880,318 1050,270 1300,250" fill="none" stroke="#CFC0A0" stroke-width="44" stroke-opacity="0.55" stroke-linecap="round"/>
  <path d="M-20,300 C260,296 420,340 640,330 C880,318 1050,270 1300,250" fill="none" stroke="#4E8FA8" stroke-width="16" stroke-opacity="0.85" stroke-linecap="round"/>
  <path d="M-20,300 C260,296 420,340 640,330 C880,318 1050,270 1300,250" fill="none" stroke="#7BC6DD" stroke-width="5" stroke-opacity="0.6"/>

  <!-- figure-eight loop, foreshortened by the bank -->
  <g fill="none" stroke-linecap="round">
    <path d="M180,470 C160,380 420,330 560,380 C700,430 1000,340 1090,420 C1170,492 950,600 760,560 C570,520 200,560 180,470 Z" stroke="#CFC0A0" stroke-width="40"/>
    <path d="M180,470 C160,380 420,330 560,380 C700,430 1000,340 1090,420 C1170,492 950,600 760,560 C570,520 200,560 180,470 Z" stroke="#22301F" stroke-width="40" stroke-opacity="0.05"/>
    <path d="M180,470 C160,380 420,330 560,380 C700,430 1000,340 1090,420 C1170,492 950,600 760,560 C570,520 200,560 180,470 Z" stroke="#F5EFE2" stroke-width="4" stroke-opacity="0.5" stroke-dasharray="2 30"/>
  </g>

  <!-- event lawn bowl, camera diving toward it -->
  <g transform="rotate(-6 800 480)">
    <ellipse cx="800" cy="480" rx="260" ry="130" fill="#2F6B4A"/>
    <ellipse cx="800" cy="480" rx="260" ry="130" fill="url(#stipDG)"/>
    <ellipse cx="800" cy="488" rx="205" ry="98" fill="#A9C6A0" fill-opacity="0.45"/>
    <ellipse cx="800" cy="496" rx="140" ry="64" fill="#7CC98F" fill-opacity="0.3"/>
    <ellipse cx="800" cy="502" rx="76" ry="34" fill="#A9C6A0" fill-opacity="0.5"/>
  </g>

  <!-- market stalls dotted on the lawn rim -->
  <g>
    <rect x="622" y="392" width="30" height="20" rx="3" fill="#C05A32" transform="rotate(-6 637 402)"/>
    <rect x="668" y="380" width="30" height="20" rx="3" fill="#E7DCC3" transform="rotate(-6 683 390)"/>
    <rect x="964" y="380" width="30" height="20" rx="3" fill="#C05A32" transform="rotate(-6 979 390)"/>
    <rect x="1006" y="560" width="30" height="20" rx="3" fill="#C05A32" fill-opacity="0.9" transform="rotate(-6 1021 570)"/>
    <rect x="660" y="566" width="30" height="20" rx="3" fill="#CFC0A0" transform="rotate(-6 675 576)"/>
  </g>

  <!-- pergola slat runs along the loop -->
  <g fill="#C05A32">
    <g transform="translate(430,352) rotate(12)"><rect width="90" height="7"/><rect y="12" width="90" height="7"/><rect y="24" width="90" height="7"/></g>
    <g transform="translate(880,586) rotate(-10)"><rect width="90" height="7"/><rect y="12" width="90" height="7"/><rect y="24" width="90" height="7"/></g>
    <g transform="translate(150,520) rotate(-30)"><rect width="70" height="6"/><rect y="10" width="70" height="6"/><rect y="20" width="70" height="6"/></g>
  </g>
  <g fill="#22301F" fill-opacity="0.12">
    <g transform="translate(436,392) rotate(12)"><rect width="90" height="26"/></g>
    <g transform="translate(884,620) rotate(-10)"><rect width="90" height="22"/></g>
  </g>

  <!-- ghaf groves -->
  <use href="#ghafD" transform="translate(560,400) scale(1.3)"/>
  <use href="#ghafD" transform="translate(620,362) scale(1)"/>
  <use href="#ghafD" transform="translate(1060,420) scale(1.2)"/>
  <use href="#ghafD" transform="translate(1110,470) scale(0.95)"/>
  <use href="#ghafD" transform="translate(1010,590) scale(1.15)"/>
  <use href="#ghafD" transform="translate(590,590) scale(1.25)"/>
  <use href="#ghafD" transform="translate(320,420) scale(1.1)"/>
  <use href="#ghafD" transform="translate(260,500) scale(0.95)"/>
  <use href="#ghafD" transform="translate(390,560) scale(1.05)"/>
  <use href="#ghafD" transform="translate(120,260) scale(0.8)"/>
  <use href="#ghafD" transform="translate(1200,220) scale(0.7)"/>
  <use href="#ghafD" transform="translate(900,240) scale(0.75)"/>
  <use href="#ghafD" transform="translate(60,640) scale(1.6)"/>
  <use href="#ghafD" transform="translate(1230,660) scale(1.5)"/>

  <!-- tiny people on lawn and loop -->
  <g fill="#22301F">
    <circle cx="760" cy="460" r="3.4"/><circle cx="820" cy="486" r="3.4"/><circle cx="732" cy="506" r="3.2"/>
    <circle cx="876" cy="448" r="3.2"/><circle cx="800" cy="530" r="3"/><circle cx="690" cy="474" r="3"/>
    <circle cx="470" cy="370" r="3"/><circle cx="940" cy="576" r="3"/><circle cx="240" cy="470" r="3"/>
  </g>
  <g>
    <rect x="746" y="452" width="17" height="12" rx="2" fill="#C05A32" fill-opacity="0.8" transform="rotate(-6 754 458)"/>
    <rect x="826" y="494" width="17" height="12" rx="2" fill="#F5EFE2" transform="rotate(-6 834 500)"/>
    <rect x="716" y="510" width="15" height="11" rx="2" fill="#7CC98F" fill-opacity="0.7"/>
  </g>

  <!-- drone motion streaks -->
  <g stroke="#F5EFE2" stroke-opacity="0.7" stroke-width="5" stroke-linecap="round">
    <path d="M60,120 L200,111"/>
    <path d="M90,160 L260,149"/>
    <path d="M40,200 L170,192"/>
  </g>

  <!-- sparkles -->
  <use href="#sparkD" transform="translate(1120,160) scale(0.9)" fill="#7CC98F"/>
  <use href="#sparkD" transform="translate(340,120) scale(0.6)" fill="#7BC6DD"/>
  <use href="#sparkD" transform="translate(480,660) scale(0.7)" fill="#C05A32" fill-opacity="0.85"/>
</svg>
