<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <pattern id="stipE1" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="6" r="1.5" fill="#2F6B4A" fill-opacity="0.1"/>
      <circle cx="14" cy="14" r="1.1" fill="#22301F" fill-opacity="0.05"/>
    </pattern>
    <pattern id="stipE1S" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="1.2" fill="#22301F" fill-opacity="0.06"/>
    </pattern>
    <path id="sparkE1" d="M0,-10 L2.2,-2.2 L10,0 L2.2,2.2 L0,10 L-2.2,2.2 L-10,0 L-2.2,-2.2 Z"/>
    <!-- opening day: staked ghaf sapling -->
    <g id="treeE1">
      <path d="M-2.5,0 L-1.5,-34 L1.5,-34 L2.5,0 Z" fill="#22301F"/>
      <path d="M-1.5,-30 C-8,-36 -12,-33 -16,-39" stroke="#22301F" stroke-width="2" fill="none"/>
      <path d="M1.5,-30 C7,-37 11,-34 15,-40" stroke="#22301F" stroke-width="2" fill="none"/>
      <ellipse cx="0" cy="-44" rx="18" ry="8" fill="#2F6B4A"/>
      <ellipse cx="-7" cy="-48" rx="10" ry="5" fill="#A9C6A0" fill-opacity="0.7"/>
      <!-- support stakes + tie -->
      <path d="M-14,0 L-6,-26" stroke="#C05A32" stroke-width="3"/>
      <path d="M14,0 L6,-26" stroke="#C05A32" stroke-width="3"/>
      <path d="M-6,-26 L6,-26" stroke="#22301F" stroke-width="1.6"/>
      <!-- watering basin -->
      <ellipse cx="0" cy="2" rx="16" ry="4.5" fill="#E7DCC3"/>
      <ellipse cx="0" cy="2" rx="16" ry="4.5" fill="none" stroke="#CFC0A0" stroke-width="2"/>
      <ellipse cx="4" cy="4" rx="14" ry="3.5" fill="#22301F" fill-opacity="0.08"/>
    </g>
  </defs>

  <!-- sky -->
  <rect x="0" y="0" width="1280" height="720" fill="#F5EFE2"/>
  <rect x="0" y="0" width="1280" height="190" fill="#7BC6DD" fill-opacity="0.13"/>
  <rect x="0" y="170" width="1280" height="130" fill="#E7DCC3" fill-opacity="0.5"/>
  <circle cx="1020" cy="120" r="42" fill="#F5EFE2"/>
  <circle cx="1020" cy="120" r="32" fill="#E7DCC3" fill-opacity="0.9"/>

  <!-- OPENING DAY: thin nursery rows behind the rim, mostly open horizon -->
  <ellipse cx="120" cy="368" rx="180" ry="20" fill="#2F6B4A" fill-opacity="0.16"/>
  <ellipse cx="400" cy="364" rx="200" ry="16" fill="#2F6B4A" fill-opacity="0.13"/>
  <ellipse cx="700" cy="366" rx="210" ry="18" fill="#2F6B4A" fill-opacity="0.15"/>
  <ellipse cx="1020" cy="367" rx="190" ry="17" fill="#2F6B4A" fill-opacity="0.13"/>
  <ellipse cx="560" cy="370" rx="240" ry="10" fill="#A9C6A0" fill-opacity="0.3"/>

  <!-- rim loop path: freshly laid -->
  <path d="M0,392 C300,378 980,378 1280,392 L1280,412 C980,400 300,400 0,412 Z" fill="#CFC0A0"/>
  <path d="M0,392 C300,378 980,378 1280,392 L1280,412 C980,400 300,400 0,412 Z" fill="url(#stipE1S)"/>

  <!-- pergola on the rim, right: new timber, no vines yet -->
  <g>
    <rect x="952" y="322" width="10" height="76" fill="#C05A32"/>
    <rect x="1122" y="322" width="10" height="76" fill="#C05A32"/>
    <rect x="938" y="312" width="208" height="9" fill="#C05A32"/>
    <g fill="#C05A32">
      <rect x="946" y="300" width="14" height="8"/><rect x="972" y="299" width="14" height="8"/><rect x="998" y="298" width="14" height="8"/>
      <rect x="1024" y="298" width="14" height="8"/><rect x="1050" y="298" width="14" height="8"/><rect x="1076" y="299" width="14" height="8"/><rect x="1102" y="300" width="14" height="8"/>
    </g>
    <rect x="944" y="398" width="196" height="10" fill="#22301F" fill-opacity="0.1"/>
  </g>

  <!-- kiosk cart pad, left rim: pad poured, cart just arrived -->
  <g transform="translate(200,368)">
    <rect x="-8" y="26" width="76" height="8" rx="3" fill="#CFC0A0"/>
    <rect x="0" y="0" width="52" height="28" rx="4" fill="#C05A32" fill-opacity="0.9"/>
    <rect x="-6" y="-10" width="64" height="10" rx="5" fill="#E7DCC3"/>
    <circle cx="11" cy="31" r="5" fill="#22301F"/><circle cx="41" cy="31" r="5" fill="#22301F"/>
  </g>

  <!-- bowl lawn: young turf in strips, sandy patches showing -->
  <path d="M0,412 C300,400 980,400 1280,412 L1280,720 L0,720 Z" fill="#E7DCC3"/>
  <path d="M0,412 C300,400 980,400 1280,412 L1280,720 L0,720 Z" fill="#A9C6A0" fill-opacity="0.55"/>
  <path d="M0,448 C320,414 960,414 1280,448 L1280,720 L0,720 Z" fill="#A9C6A0" fill-opacity="0.4"/>
  <path d="M0,530 C340,478 940,478 1280,530 L1280,720 L0,720 Z" fill="#2F6B4A" fill-opacity="0.12"/>
  <path d="M0,412 C300,400 980,400 1280,412 L1280,720 L0,720 Z" fill="url(#stipE1)"/>
  <!-- fresh turf roll seams -->
  <g stroke="#E7DCC3" stroke-width="4" stroke-opacity="0.8" fill="none">
    <path d="M0,470 C340,436 940,436 1280,470"/>
    <path d="M0,545 C340,498 940,498 1280,545"/>
    <path d="M0,632 C340,576 940,576 1280,632"/>
  </g>
  <!-- bare sand patches -->
  <ellipse cx="320" cy="620" rx="90" ry="20" fill="#E7DCC3" fill-opacity="0.9"/>
  <ellipse cx="880" cy="500" rx="70" ry="14" fill="#E7DCC3" fill-opacity="0.8"/>
  <ellipse cx="1080" cy="660" rx="110" ry="24" fill="#E7DCC3" fill-opacity="0.85"/>

  <!-- rim trees: staked saplings at the same five stations -->
  <use href="#treeE1" transform="translate(150,404) scale(1.5)"/>
  <use href="#treeE1" transform="translate(330,400) scale(1.3)"/>
  <use href="#treeE1" transform="translate(560,402) scale(1.45)"/>
  <use href="#treeE1" transform="translate(760,400) scale(1.25)"/>
  <use href="#treeE1" transform="translate(1240,406) scale(1.55)"/>

  <!-- first visitors -->
  <g fill="#22301F">
    <g transform="translate(470,520)">
      <circle cx="0" cy="-46" r="8"/>
      <path d="M-7,-38 C-9,-16 -8,0 -6,22 L-2,22 L0,-6 L2,-6 L4,22 L8,22 C9,0 8,-16 7,-38 Z"/>
    </g>
    <g transform="translate(900,470) scale(0.6)">
      <circle cx="0" cy="-46" r="8"/>
      <path d="M-7,-38 C-9,-16 -8,0 -6,22 L-2,22 L0,-6 L2,-6 L4,22 L8,22 C9,0 8,-16 7,-38 Z"/>
    </g>
  </g>
  <!-- lone opening-day picnic blanket -->
  <path d="M668,564 L760,556 L784,596 L688,604 Z" fill="#C05A32" fill-opacity="0.55"/>

  <!-- sparkles -->
  <use href="#sparkE1" transform="translate(880,180) scale(0.85)" fill="#7CC98F"/>
  <use href="#sparkE1" transform="translate(420,150) scale(0.55)" fill="#7BC6DD"/>
  <use href="#sparkE1" transform="translate(1150,600) scale(0.7)" fill="#C05A32" fill-opacity="0.85"/>
</svg>
