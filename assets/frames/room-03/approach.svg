  <path d="M420,720 C480,600 520,520 610,452 L680,452 C620,520 600,600 580,720 Z" fill="#CFC0A0"/>
  <path d="M420,720 C480,600 520,520 610,452 L680,452 C620,520 600,600 580,720 Z" fill="url(#stipB)"/>
  <path d="M760,720 C880,620 1010,560 1180,520 L1280,520 L1280,610 C1080,620 940,668 860,720 Z" fill="#CFC0A0" fill-opacity="0.9"/>
