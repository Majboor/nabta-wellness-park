  <rect x="0" y="180" width="1280" height="120" fill="#E7DCC3" fill-opacity="0.55"/>
  <circle cx="985" cy="130" r="46" fill="#F5EFE2"/>
  <circle cx="985" cy="130" r="36" fill="#E7DCC3" fill-opacity="0.9"/>

  <!-- distant edge canopy across the lawn -->
  <g>
    <ellipse cx="140" cy="330" rx="140" ry="42" fill="#2F6B4A" fill-opacity="0.5"/>
    <ellipse cx="380" cy="322" rx="150" ry="38" fill="#2F6B4A" fill-opacity="0.42"/>
    <ellipse cx="900" cy="326" rx="170" ry="40" fill="#2F6B4A" fill-opacity="0.45"/>
    <ellipse cx="1160" cy="334" rx="150" ry="44" fill="#2F6B4A" fill-opacity="0.5"/>
    <ellipse cx="640" cy="336" rx="180" ry="30" fill="#A9C6A0" fill-opacity="0.5"/>
  </g>

  <!-- bowl lawn opening ahead -->
  <rect x="0" y="352" width="1280" height="368" fill="#E7DCC3"/>
  <path d="M0,364 C300,340 980,340 1280,364 L1280,470 C980,428 300,428 0,470 Z" fill="#A9C6A0"/>
  <path d="M0,398 C320,368 960,368 1280,398 L1280,452 C960,416 320,416 0,452 Z" fill="#2F6B4A" fill-opacity="0.55"/>
  <path d="M330,384 C500,372 780,372 950,384 C800,378 480,378 330,384 Z" fill="#7CC98F" fill-opacity="0.5"/>

