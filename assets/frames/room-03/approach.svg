  <path d="M0,470 L420,720 L0,720 Z" fill="#E7DCC3"/>
  <path d="M0,470 L420,720 L0,720 Z" fill="url(#stipB)"/>
  <path d="M680,452 L1280,520 L1280,470 Z" fill="#E7DCC3" fill-opacity="0.7"/>
  <path d="M580,720 L760,720 L700,470 L660,470 Z" fill="#A9C6A0" fill-opacity="0.6"/>

  <!-- pergola slat shadows raking the path -->
