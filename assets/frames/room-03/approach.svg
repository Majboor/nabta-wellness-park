    <path d="M456,640 L608,640 L604,622 L462,622 Z"/>
    <path d="M474,596 L600,596 L597,582 L480,582 Z"/>
    <path d="M492,558 L594,558 L592,547 L497,547 Z"/>
    <path d="M508,526 L590,526 L588,517 L512,517 Z"/>
  </g>

