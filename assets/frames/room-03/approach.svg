      <path d="M-2,-56 C-20,-64 -34,-58 -40,-70" stroke="#22301F" stroke-width="3" fill="none"/>
      <path d="M2,-56 C18,-66 30,-60 38,-72" stroke="#22301F" stroke-width="3" fill="none"/>
