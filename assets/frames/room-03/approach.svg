      <circle cx="12" cy="12" r="1" fill="#22301F" fill-opacity="0.05"/>
    </pattern>
    <pattern id="stipBG" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="7" r="1.6" fill="#2F6B4A" fill-opacity="0.16"/>
      <circle cx="15" cy="15" r="1.2" fill="#22301F" fill-opacity="0.06"/>
    </pattern>
    <path id="sparkB" d="M0,-10 L2.2,-2.2 L10,0 L2.2,2.2 L0,10 L-2.2,2.2 L-10,0 L-2.2,-2.2 Z"/>
    <g id="ghafSide">
