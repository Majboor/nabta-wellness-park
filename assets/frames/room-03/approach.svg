    <rect x="150" y="0" width="10" height="470" fill="#22301F" fill-opacity="0.18"/>
    <rect x="1104" y="0" width="26" height="520" fill="#C05A32"/>
    <rect x="1104" y="0" width="10" height="520" fill="#22301F" fill-opacity="0.18"/>
