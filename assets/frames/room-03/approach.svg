    <circle cx="12" cy="38" r="6" fill="#22301F"/>
    <circle cx="46" cy="38" r="6" fill="#22301F"/>
  </g>

  <!-- ink people walking toward the lawn -->
  <g fill="#22301F">
    <g transform="translate(560,530)">
      <circle cx="0" cy="-46" r="8"/>
      <path d="M-7,-38 C-9,-16 -8,0 -6,22 L-2,22 L-1,-6 L2,-6 L4,22 L8,22 C9,0 8,-16 7,-38 Z"/>
    </g>
    <g transform="translate(608,548) scale(1.12)">
      <circle cx="0" cy="-46" r="8"/>
      <path d="M-7,-38 C-10,-16 -8,0 -8,22 L-3,22 L-1,-4 L2,-4 L6,22 L10,22 C9,-2 8,-16 7,-38 Z"/>
      <path d="M6,-34 L20,-20 L18,-14 L4,-26 Z"/>
    </g>
    <g transform="translate(505,492) scale(0.72)">
      <circle cx="0" cy="-46" r="8"/>
      <path d="M-7,-38 C-9,-16 -8,0 -6,22 L-2,22 L0,-6 L2,-6 L4,22 L8,22 C9,0 8,-16 7,-38 Z"/>
    </g>
    <g transform="translate(700,430) scale(0.42)">
      <circle cx="0" cy="-46" r="8"/>
      <path d="M-7,-38 C-9,-16 -8,0 -6,22 L-2,22 L0,-6 L2,-6 L4,22 L8,22 C9,0 8,-16 7,-38 Z"/>
    </g>
    <g transform="translate(760,426) scale(0.38)">
      <circle cx="0" cy="-46" r="8"/>
      <path d="M-7,-38 C-9,-16 -8,0 -6,22 L-2,22 L0,-6 L2,-6 L4,22 L8,22 C9,0 8,-16 7,-38 Z"/>
    </g>
  </g>

  <!-- sparkles -->
  <use href="#sparkB" transform="translate(910,250) scale(0.9)" fill="#7CC98F"/>
  <use href="#sparkB" transform="translate(360,270) scale(0.6)" fill="#7BC6DD"/>
  <use href="#sparkB" transform="translate(1200,640) scale(0.7)" fill="#C05A32" fill-opacity="0.85"/>
</svg>
