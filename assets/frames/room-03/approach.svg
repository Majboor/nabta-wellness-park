      <path d="M0,86 L1280,64 L1280,86 L0,110 Z" fill-opacity="0.95"/>
      <path d="M0,142 L1280,116 L1280,136 L0,164 Z" fill-opacity="0.9"/>
      <path d="M0,196 L1280,166 L1280,184 L0,216 Z" fill-opacity="0.85"/>
    </g>
    <g fill="#22301F" fill-opacity="0.2">
      <path d="M0,44 L1280,28 L1280,34 L0,52 Z"/>
      <path d="M0,102 L1280,80 L1280,86 L0,110 Z"/>
      <path d="M0,156 L1280,130 L1280,136 L0,164 Z"/>
      <path d="M0,208 L1280,178 L1280,184 L0,216 Z"/>
    </g>
