    <ellipse cx="700" cy="560" rx="96" ry="26" fill="#F5EFE2" stroke="#22301F" stroke-width="2.5"/>
    <rect x="690" y="582" width="20" height="80" fill="#22301F" opacity="0.85"/>
    <g fill="#22301F">
