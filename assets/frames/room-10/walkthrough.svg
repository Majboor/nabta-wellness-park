  <g>
    <path d="M1190,640 L1266,640 L1256,720 L1200,720 Z" fill="#C05A32"/>
    <path d="M1226,640 C1224,606 1230,586 1228,566" stroke="#22301F" stroke-width="5" fill="none"/>
    <circle cx="1228" cy="556" r="34" fill="#A9C6A0" opacity="0.9"/>
    <circle cx="1210" cy="542" r="22" fill="#2F6B4A" opacity="0.6"/>
    <circle cx="1248" cy="544" r="20" fill="#2F6B4A" opacity="0.5"/>
  </g>

  <!-- nabta sparkles -->
  <use href="#sparkC" transform="translate(966,220) scale(1.1)" fill="#F5EFE2" opacity="0.95"/>
  <use href="#sparkC" transform="translate(420,230) scale(0.8)" fill="#C05A32" opacity="0.8"/>
  <use href="#sparkC" transform="translate(560,600) scale(0.7)" fill="#2F6B4A" opacity="0.55"/>
