    <circle cx="153" cy="282" r="44" fill="#A9C6A0" opacity="0.85"/>
    <circle cx="130" cy="266" r="28" fill="#2F6B4A" opacity="0.5"/>
    <circle cx="180" cy="268" r="26" fill="#2F6B4A" opacity="0.4"/>
  </g>
  <g>
    <rect x="1090" y="310" width="7" height="62" rx="3" fill="#22301F" opacity="0.8"/>
    <circle cx="1093" cy="292" r="40" fill="#A9C6A0" opacity="0.85"/>
    <circle cx="1114" cy="276" r="26" fill="#2F6B4A" opacity="0.5"/>
  </g>
  <!-- bioswale glimpse -->
