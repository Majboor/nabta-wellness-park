    <circle cx="1093" cy="292" r="40" fill="#2F6B4A" opacity="0.7"/>
    <circle cx="1114" cy="276" r="26" fill="#22301F" opacity="0.6"/>
  </g>
  <!-- bioswale catching moonlight -->
  <path d="M900,404 C980,396 1080,398 1160,406 C1200,410 1250,410 1280,406 L1280,424 C1180,430 1000,428 900,420 Z" fill="#4E8FA8" opacity="0.7"/>
  <path d="M940,410 C1010,404 1100,406 1170,412" stroke="#7BC6DD" stroke-width="3" fill="none" opacity="0.8"/>

  <!-- low planter wall -->
  <rect x="0" y="418" width="1280" height="26" fill="#E7DCC3" opacity="0.35"/>
  <line x1="0" y1="418" x2="1280" y2="418" stroke="#22301F" stroke-width="2.5" opacity="0.8"/>
  <g fill="#2F6B4A" opacity="0.8">
    <ellipse cx="240" cy="416" rx="26" ry="10"/>
    <ellipse cx="640" cy="414" rx="30" ry="11"/>
    <ellipse cx="980" cy="416" rx="24" ry="9"/>
  </g>

  <!-- terrace floor, dim -->
  <rect y="440" width="1280" height="280" fill="#CFC0A0"/>
  <rect y="440" width="1280" height="280" fill="#22301F" opacity="0.55"/>
  <rect y="440" width="1280" height="280" fill="url(#stipN)"/>
