      <path d="M590,489 C617,493 626,522 626,570 L554,570 C554,522 564,493 590,489 Z"/>
      <path d="M617,516 L654,540" stroke="#22301F" stroke-width="9" stroke-linecap="round"/>
      <circle cx="812" cy="464" r="20"/>
      <path d="M812,483 C838,487 847,516 847,566 L776,566 C776,516 786,487 812,483 Z"/>
      <path d="M786,512 L750,536" stroke="#22301F" stroke-width="9" stroke-linecap="round"/>
