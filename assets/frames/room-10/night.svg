<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <linearGradient id="skyN" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22301F"/>
      <stop offset="0.7" stop-color="#22301F"/>
      <stop offset="1" stop-color="#4E8FA8"/>
    </linearGradient>
    <radialGradient id="glowN" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F5EFE2" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#F5EFE2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowW" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C05A32" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#C05A32" stop-opacity="0"/>
    </radialGradient>
    <pattern id="stipN" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="5" r="1.1" fill="#22301F" opacity="0.2"/>
      <circle cx="11" cy="12" r="0.9" fill="#22301F" opacity="0.15"/>
    </pattern>
    <path id="sparkN" d="M0,-9 C0.8,-2.6 2.6,-0.8 9,0 C2.6,0.8 0.8,2.6 0,9 C-0.8,2.6 -2.6,0.8 -9,0 C-2.6,-0.8 -0.8,-2.6 0,-9 Z"/>
  </defs>

  <!-- night sky between pergola slats -->
  <rect width="1280" height="400" fill="url(#skyN)"/>
  <g fill="#F5EFE2">
    <circle cx="480" cy="30" r="1.6" opacity="0.9"/>
    <circle cx="700" cy="48" r="1.3" opacity="0.7"/>
    <circle cx="820" cy="24" r="1.5" opacity="0.8"/>
  </g>

  <!-- view beyond: lawn and trees in night tones -->
  <path d="M0,360 C220,336 520,330 760,346 C980,360 1160,352 1280,340 L1280,420 L0,420 Z" fill="#2F6B4A" opacity="0.6"/>
  <path d="M0,388 C240,366 540,362 780,374 C1000,386 1180,378 1280,368 L1280,430 L0,430 Z" fill="#22301F" opacity="0.55"/>
  <g opacity="0.85">
    <rect x="150" y="300" width="7" height="70" rx="3" fill="#22301F"/>
    <circle cx="153" cy="282" r="44" fill="#2F6B4A" opacity="0.7"/>
    <circle cx="130" cy="266" r="28" fill="#22301F" opacity="0.6"/>
  </g>
  <g opacity="0.85">
