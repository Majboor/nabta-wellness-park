      <circle cx="530" cy="163" r="12" fill="url(#glowN)"/>
      <circle cx="615" cy="171" r="12" fill="url(#glowN)"/>
      <circle cx="700" cy="171" r="12" fill="url(#glowN)"/>
      <circle cx="785" cy="162" r="12" fill="url(#glowN)"/>
      <circle cx="862" cy="145" r="12" fill="url(#glowN)"/>
    </g>
    <g fill="#F5EFE2">
      <circle cx="450" cy="146" r="4.5"/><circle cx="530" cy="163" r="4.5"/><circle cx="615" cy="171" r="4.5"/>
      <circle cx="700" cy="171" r="4.5"/><circle cx="785" cy="162" r="4.5"/><circle cx="862" cy="145" r="4.5"/>
    </g>
  </g>

  <!-- foreground table with couple, candle-lit -->
