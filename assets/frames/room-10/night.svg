    <ellipse cx="700" cy="560" rx="96" ry="26" fill="#E7DCC3" stroke="#22301F" stroke-width="2.5"/>
    <ellipse cx="700" cy="560" rx="96" ry="26" fill="#C05A32" opacity="0.2"/>
    <rect x="690" y="582" width="20" height="80" fill="#22301F"/>
    <circle cx="700" cy="548" r="16" fill="url(#glowW)"/>
