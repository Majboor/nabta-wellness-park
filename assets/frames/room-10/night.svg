    <rect x="360" y="60" width="18" height="384" fill="#C05A32"/>
    <rect x="360" y="60" width="18" height="384" fill="#22301F" opacity="0.45"/>
    <rect x="900" y="76" width="18" height="368" fill="#C05A32"/>
    <rect x="900" y="76" width="18" height="368" fill="#22301F" opacity="0.45"/>
    <path d="M0,52 L1280,86 L1280,110 L0,74 Z" fill="#C05A32"/>
    <path d="M0,52 L1280,86 L1280,110 L0,74 Z" fill="#22301F" opacity="0.4"/>
    <g fill="#C05A32">
      <path d="M0,0 L1280,20 L1280,52 L0,28 Z" opacity="0.8"/>
      <path d="M0,88 L1280,124 L1280,150 L0,112 Z" opacity="0.7"/>
