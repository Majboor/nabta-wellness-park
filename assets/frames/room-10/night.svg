    <rect x="652" y="534" width="16" height="19" rx="3" fill="#C05A32"/>
    <rect x="732" y="530" width="16" height="19" rx="3" fill="#7BC6DD"/>
  </g>

  <!-- jogger with coffee, evening lap done -->
  <g fill="#22301F">
    <circle cx="1080" cy="470" r="15"/>
    <path d="M1080,484 C1096,488 1100,508 1097,534 L1064,534 C1061,508 1066,488 1080,484 Z"/>
    <path d="M1070,534 L1052,592 M1091,534 L1108,586" stroke="#22301F" stroke-width="9" stroke-linecap="round"/>
    <path d="M1094,498 L1118,486" stroke="#22301F" stroke-width="8" stroke-linecap="round"/>
    <rect x="1114" y="474" width="13" height="16" rx="3" fill="#C05A32"/>
  </g>

  <!-- foreground potted ghaf, silhouetted -->
  <g>
    <path d="M1190,640 L1266,640 L1256,720 L1200,720 Z" fill="#C05A32"/>
    <path d="M1190,640 L1266,640 L1256,720 L1200,720 Z" fill="#22301F" opacity="0.4"/>
    <path d="M1226,640 C1224,606 1230,586 1228,566" stroke="#22301F" stroke-width="5" fill="none"/>
    <circle cx="1228" cy="556" r="34" fill="#2F6B4A" opacity="0.85"/>
    <circle cx="1210" cy="542" r="22" fill="#22301F" opacity="0.6"/>
  </g>

  <!-- nabta sparkles, brighter at night -->
  <use href="#sparkN" transform="translate(966,220) scale(1.2)" fill="#F5EFE2" opacity="0.95"/>
  <use href="#sparkN" transform="translate(420,230) scale(0.9)" fill="#7BC6DD" opacity="0.85"/>
  <use href="#sparkN" transform="translate(560,610) scale(0.7)" fill="#7CC98F" opacity="0.8"/>
</svg>
