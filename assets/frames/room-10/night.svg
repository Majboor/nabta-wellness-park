  <ellipse cx="180" cy="500" rx="320" ry="120" fill="url(#glowW)"/>
  <ellipse cx="660" cy="560" rx="300" ry="110" fill="url(#glowN)" opacity="0.5"/>

  <!-- kiosk counter, glowing interior -->
  <g>
    <path d="M0,180 L340,214 L340,470 L0,500 Z" fill="#E7DCC3" opacity="0.5"/>
