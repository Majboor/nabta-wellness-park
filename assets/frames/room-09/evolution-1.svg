<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <path id="sparkle" d="M0 -14 C2.5 -4 4 -2.5 14 0 C4 2.5 2.5 4 0 14 C-2.5 4 -4 2.5 -14 0 C-4 -2.5 -2.5 -4 0 -14 Z"/>
    <pattern id="stipple" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="6" r="1.6" fill="#22301F" fill-opacity="0.12"/>
      <circle cx="17" cy="14" r="1.3" fill="#22301F" fill-opacity="0.10"/>
      <circle cx="9" cy="21" r="1.5" fill="#22301F" fill-opacity="0.08"/>
    </pattern>
    <pattern id="leafdots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="8" r="2.4" fill="#A9C6A0" fill-opacity="0.55"/>
      <circle cx="20" cy="18" r="2.0" fill="#2F6B4A" fill-opacity="0.35"/>
      <circle cx="12" cy="25" r="1.8" fill="#7CC98F" fill-opacity="0.30"/>
    </pattern>
  </defs>

  <!-- opening day: bright, open, newly planted -->
  <rect width="1280" height="720" fill="#F5EFE2"/>
  <rect y="320" width="1280" height="130" fill="#E7DCC3" fill-opacity="0.5"/>

  <!-- freshly shaped earth berm, still mostly bare -->
  <path d="M-20 480 C180 400 440 378 640 380 C880 382 1120 410 1300 480 L1300 720 L-20 720 Z" fill="#CFC0A0"/>
  <path d="M-20 480 C180 400 440 378 640 380 C880 382 1120 410 1300 480 L1300 560 L-20 560 Z" fill="url(#stipple)"/>
  <path d="M-20 490 C220 424 520 404 800 412 C1000 420 1180 448 1300 490 L1300 560 L-20 560 Z" fill="#A9C6A0" fill-opacity="0.25"/>

  <!-- ground -->
  <rect y="548" width="1280" height="172" fill="#E7DCC3"/>
  <rect y="548" width="1280" height="172" fill="url(#stipple)"/>
  <path d="M-20 720 L1300 720 L1300 668 C1000 644 300 644 -20 668 Z" fill="#CFC0A0"/>

  <!-- side enclosure planting: young whips at the edges -->
  <g>
    <ellipse cx="60" cy="540" rx="70" ry="26" fill="#A9C6A0" fill-opacity="0.5"/>
    <path d="M60 540 L60 470" stroke="#22301F" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="60" cy="462" rx="22" ry="16" fill="#2F6B4A" fill-opacity="0.8"/>
  </g>
  <g>
    <ellipse cx="1220" cy="540" rx="70" ry="26" fill="#A9C6A0" fill-opacity="0.5"/>
    <path d="M1220 540 L1220 466" stroke="#22301F" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="1220" cy="458" rx="24" ry="17" fill="#2F6B4A" fill-opacity="0.8"/>
  </g>

  <!-- the ghaf: a young sapling with support stakes -->
  <g>
    <path d="M640 560 C638 520 636 490 632 462 M640 560 C643 522 648 494 656 468" stroke="#22301F" stroke-width="7" fill="none" stroke-linecap="round"/>
    <line x1="616" y1="560" x2="628" y2="486" stroke="#C05A32" stroke-width="4" stroke-linecap="round"/>
    <line x1="666" y1="560" x2="654" y2="486" stroke="#C05A32" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="642" cy="440" rx="52" ry="30" fill="#2F6B4A"/>
    <ellipse cx="622" cy="430" rx="24" ry="15" fill="#A9C6A0" fill-opacity="0.7"/>
    <ellipse cx="642" cy="440" rx="52" ry="30" fill="url(#leafdots)"/>
  </g>
  <ellipse cx="656" cy="562" rx="60" ry="10" fill="#22301F" fill-opacity="0.12"/>

  <!-- still basin, already full on day one -->
  <ellipse cx="640" cy="612" rx="336" ry="50" fill="#CFC0A0"/>
  <ellipse cx="640" cy="610" rx="320" ry="42" fill="#4E8FA8"/>
  <ellipse cx="640" cy="610" rx="320" ry="42" fill="#7BC6DD" fill-opacity="0.3"/>
  <g opacity="0.3">
    <ellipse cx="642" cy="620" rx="44" ry="12" fill="#2F6B4A"/>
    <path d="M640 592 L640 616" stroke="#22301F" stroke-width="5" stroke-linecap="round"/>
  </g>
  <ellipse cx="770" cy="598" rx="110" ry="9" fill="#F5EFE2" fill-opacity="0.45"/>

  <!-- new fragrant beds: sparse plugs in open sand -->
  <g>
    <ellipse cx="220" cy="546" rx="130" ry="34" fill="#E7DCC3"/>
    <ellipse cx="220" cy="546" rx="130" ry="34" fill="url(#stipple)"/>
    <circle cx="170" cy="540" r="9" fill="#2F6B4A"/>
    <circle cx="230" cy="552" r="7" fill="#A9C6A0"/>
    <circle cx="280" cy="538" r="8" fill="#2F6B4A"/>
    <circle cx="200" cy="558" r="5" fill="#7CC98F" fill-opacity="0.7"/>
  </g>
  <g>
    <ellipse cx="1060" cy="546" rx="130" ry="34" fill="#E7DCC3"/>
    <ellipse cx="1060" cy="546" rx="130" ry="34" fill="url(#stipple)"/>
    <circle cx="1010" cy="540" r="8" fill="#2F6B4A"/>
    <circle cx="1074" cy="552" r="9" fill="#A9C6A0"/>
    <circle cx="1122" cy="538" r="7" fill="#2F6B4A"/>
    <circle cx="1044" cy="558" r="5" fill="#7CC98F" fill-opacity="0.7"/>
  </g>

  <!-- bench with back and arm rests, one seated figure -->
  <g>
    <rect x="252" y="486" width="132" height="10" rx="4" fill="#22301F"/>
    <rect x="252" y="438" width="8" height="54" rx="3" fill="#22301F"/>
    <rect x="376" y="438" width="8" height="54" rx="3" fill="#22301F"/>
    <rect x="255" y="438" width="126" height="7" rx="3" fill="#22301F" fill-opacity="0.85"/>
    <rect x="258" y="496" width="7" height="34" fill="#22301F"/>
    <rect x="371" y="496" width="7" height="34" fill="#22301F"/>
    <rect x="252" y="457" width="132" height="6" rx="3" fill="#C05A32" fill-opacity="0.8"/>
  </g>
  <g fill="#22301F">
    <path d="M306 486 L306 436 C306 425 322 422 327 431 L330 486 Z"/>
    <circle cx="316" cy="415" r="11"/>
    <path d="M308 486 L308 514 L315 514 L316 490 L323 490 L325 514 L332 514 L331 486 Z"/>
  </g>

  <!-- open sun, light shade only -->
  <ellipse cx="420" cy="686" rx="220" ry="18" fill="#22301F" fill-opacity="0.06"/>

  <!-- nabta sparkles, sparing -->
  <use href="#sparkle" transform="translate(170 140) scale(1.0)" fill="#7CC98F"/>
  <use href="#sparkle" transform="translate(1090 200) scale(0.8)" fill="#7BC6DD"/>
</svg>
