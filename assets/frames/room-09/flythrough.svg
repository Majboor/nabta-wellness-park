<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <path id="sparkle" d="M0 -14 C2.5 -4 4 -2.5 14 0 C4 2.5 2.5 4 0 14 C-2.5 4 -4 2.5 -14 0 C-4 -2.5 -2.5 -4 0 -14 Z"/>
    <pattern id="stipple" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="6" r="1.6" fill="#22301F" fill-opacity="0.12"/>
      <circle cx="17" cy="14" r="1.3" fill="#22301F" fill-opacity="0.10"/>
      <circle cx="9" cy="21" r="1.5" fill="#22301F" fill-opacity="0.08"/>
    </pattern>
    <pattern id="leafdots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="8" r="2.4" fill="#A9C6A0" fill-opacity="0.55"/>
      <circle cx="20" cy="18" r="2.0" fill="#2F6B4A" fill-opacity="0.35"/>
      <circle cx="12" cy="25" r="1.8" fill="#7CC98F" fill-opacity="0.30"/>
    </pattern>
  </defs>

  <!-- high sky band -->
  <rect width="1280" height="720" fill="#F5EFE2"/>
  <rect y="120" width="1280" height="60" fill="#E7DCC3" fill-opacity="0.5"/>

  <!-- distant park at horizon: loop, pergolas, ghaf line -->
  <rect y="150" width="1280" height="40" fill="#E7DCC3"/>
  <g>
    <ellipse cx="140" cy="158" rx="52" ry="16" fill="#2F6B4A" fill-opacity="0.7"/>
    <ellipse cx="320" cy="152" rx="66" ry="18" fill="#2F6B4A" fill-opacity="0.6"/>
    <ellipse cx="560" cy="156" rx="58" ry="15" fill="#2F6B4A" fill-opacity="0.7"/>
    <ellipse cx="860" cy="150" rx="70" ry="18" fill="#2F6B4A" fill-opacity="0.6"/>
    <ellipse cx="1120" cy="156" rx="60" ry="16" fill="#2F6B4A" fill-opacity="0.7"/>
    <rect x="700" y="150" width="120" height="10" rx="4" fill="#C05A32" fill-opacity="0.75"/>
    <rect x="420" y="154" width="90" height="8" rx="4" fill="#C05A32" fill-opacity="0.6"/>
  </g>

  <!-- ground plane receding -->
  <rect y="180" width="1280" height="540" fill="#E7DCC3"/>
  <rect y="180" width="1280" height="540" fill="url(#stipple)"/>
  <!-- wadi bioswale drifting past on the right -->
  <path d="M1280 220 C1120 280 1060 400 1120 540 C1160 630 1230 680 1280 700 Z" fill="#CFC0A0"/>
  <path d="M1280 250 C1150 300 1100 400 1150 530 C1185 615 1245 665 1280 680 Z" fill="#4E8FA8" fill-opacity="0.5"/>
  <path d="M1280 250 C1150 300 1100 400 1150 530 C1185 615 1245 665 1280 680 Z" fill="#7BC6DD" fill-opacity="0.2"/>
  <!-- shade loop path sweeping toward the room -->
  <path d="M1040 180 C900 260 760 300 560 316 C400 328 280 360 210 420" fill="none" stroke="#CFC0A0" stroke-width="34" stroke-linecap="round"/>
  <path d="M1040 180 C900 260 760 300 560 316 C400 328 280 360 210 420" fill="none" stroke="#22301F" stroke-opacity="0.05" stroke-width="34" stroke-linecap="round"/>

  <!-- the quiet room from a slow high drift: berm ring in perspective -->
  <ellipse cx="560" cy="470" rx="480" ry="200" fill="#CFC0A0" fill-opacity="0.9"/>
  <ellipse cx="560" cy="470" rx="480" ry="200" fill="url(#stipple)"/>
  <ellipse cx="560" cy="462" rx="424" ry="168" fill="#A9C6A0" fill-opacity="0.6"/>
  <ellipse cx="560" cy="456" rx="372" ry="140" fill="#2F6B4A" fill-opacity="0.45"/>
  <ellipse cx="560" cy="456" rx="372" ry="140" fill="url(#leafdots)"/>
  <!-- berm rim highlight on the sun side -->
  <path d="M180 470 C240 372 400 320 560 316 C420 340 300 400 240 500 Z" fill="#F5EFE2" fill-opacity="0.35"/>

  <!-- interior clearing -->
  <ellipse cx="560" cy="466" rx="304" ry="106" fill="#F5EFE2"/>
  <ellipse cx="560" cy="466" rx="304" ry="106" fill="url(#stipple)"/>
  <!-- inner loop path -->
  <ellipse cx="560" cy="466" rx="206" ry="70" fill="none" stroke="#CFC0A0" stroke-width="18"/>

  <!-- still basin catching the sky -->
  <ellipse cx="560" cy="470" rx="132" ry="44" fill="#CFC0A0"/>
  <ellipse cx="560" cy="468" rx="118" ry="37" fill="#4E8FA8"/>
  <ellipse cx="560" cy="468" rx="118" ry="37" fill="#7BC6DD" fill-opacity="0.3"/>
  <ellipse cx="528" cy="460" rx="54" ry="12" fill="#F5EFE2" fill-opacity="0.4"/>

  <!-- fragrant beds -->
  <ellipse cx="384" cy="410" rx="76" ry="28" fill="#A9C6A0" fill-opacity="0.85"/>
  <ellipse cx="384" cy="410" rx="76" ry="28" fill="url(#leafdots)"/>
  <ellipse cx="736" cy="428" rx="66" ry="24" fill="#A9C6A0" fill-opacity="0.85"/>
  <ellipse cx="736" cy="428" rx="66" ry="24" fill="url(#leafdots)"/>
  <ellipse cx="620" cy="540" rx="80" ry="22" fill="#7CC98F" fill-opacity="0.4"/>

  <!-- the single ghaf with long soft shadow -->
  <ellipse cx="600" cy="428" rx="150" ry="34" fill="#22301F" fill-opacity="0.16"/>
  <path d="M478 430 C474 402 466 378 450 356 M478 430 C484 400 494 378 512 360" stroke="#22301F" stroke-width="8" fill="none" stroke-linecap="round"/>
  <g>
    <ellipse cx="480" cy="338" rx="112" ry="54" fill="#2F6B4A"/>
    <ellipse cx="420" cy="322" rx="50" ry="28" fill="#2F6B4A"/>
    <ellipse cx="540" cy="318" rx="48" ry="26" fill="#A9C6A0" fill-opacity="0.65"/>
    <ellipse cx="470" cy="330" rx="50" ry="24" fill="#7CC98F" fill-opacity="0.35"/>
    <ellipse cx="480" cy="338" rx="112" ry="54" fill="url(#leafdots)"/>
  </g>

  <!-- benches (small, in perspective) and one seated figure -->
  <g fill="#22301F">
    <rect x="700" y="486" width="34" height="8" rx="3"/>
    <rect x="702" y="478" width="30" height="4" rx="2" fill-opacity="0.8"/>
    <rect x="452" y="512" width="34" height="8" rx="3"/>
    <rect x="454" y="504" width="30" height="4" rx="2" fill-opacity="0.8"/>
  </g>
  <g fill="#22301F">
    <circle cx="717" cy="470" r="5"/>
    <path d="M712 476 L722 476 L723 488 L711 488 Z"/>
  </g>

  <!-- entry path threading the berm gap toward SE -->
  <path d="M860 560 C920 600 980 650 1010 720" fill="none" stroke="#CFC0A0" stroke-width="26" stroke-linecap="round"/>

  <!-- drifting shade wash -->
  <path d="M120 620 C360 560 800 560 1060 630 L1060 720 L120 720 Z" fill="#22301F" fill-opacity="0.07"/>

  <!-- nabta sparkles, sparing -->
  <use href="#sparkle" transform="translate(960 90) scale(1.1)" fill="#7CC98F"/>
  <use href="#sparkle" transform="translate(520 456) scale(0.6)" fill="#F5EFE2"/>
  <use href="#sparkle" transform="translate(210 240) scale(0.8)" fill="#7BC6DD" fill-opacity="0.9"/>
</svg>
