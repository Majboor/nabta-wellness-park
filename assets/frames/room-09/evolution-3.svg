<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <path id="sparkle" d="M0 -14 C2.5 -4 4 -2.5 14 0 C4 2.5 2.5 4 0 14 C-2.5 4 -4 2.5 -14 0 C-4 -2.5 -2.5 -4 0 -14 Z"/>
    <pattern id="stipple" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="6" r="1.6" fill="#22301F" fill-opacity="0.12"/>
      <circle cx="17" cy="14" r="1.3" fill="#22301F" fill-opacity="0.10"/>
      <circle cx="9" cy="21" r="1.5" fill="#22301F" fill-opacity="0.08"/>
    </pattern>
    <pattern id="leafdots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="8" r="2.4" fill="#A9C6A0" fill-opacity="0.55"/>
      <circle cx="20" cy="18" r="2.0" fill="#2F6B4A" fill-opacity="0.35"/>
      <circle cx="12" cy="25" r="1.8" fill="#7CC98F" fill-opacity="0.30"/>
    </pattern>
  </defs>

  <!-- year five: an enclosed green room -->
  <rect width="1280" height="720" fill="#F5EFE2"/>
  <rect y="320" width="1280" height="130" fill="#E7DCC3" fill-opacity="0.5"/>

  <!-- berm fully vegetated -->
  <path d="M-20 480 C180 400 440 378 640 380 C880 382 1120 410 1300 480 L1300 720 L-20 720 Z" fill="#CFC0A0"/>
  <path d="M-20 480 C200 400 480 378 720 384 C960 390 1160 420 1300 480 L1300 560 L-20 560 Z" fill="#A9C6A0" fill-opacity="0.85"/>
  <path d="M-20 495 C240 424 560 404 840 412 C1020 420 1180 448 1300 495 L1300 560 L-20 560 Z" fill="#2F6B4A" fill-opacity="0.6"/>
  <path d="M-20 480 C180 400 440 378 640 380 C880 382 1120 410 1300 480 L1300 560 L-20 560 Z" fill="url(#leafdots)"/>

  <!-- ground -->
  <rect y="548" width="1280" height="172" fill="#E7DCC3"/>
  <rect y="548" width="1280" height="172" fill="url(#stipple)"/>
  <path d="M-20 720 L1300 720 L1300 668 C1000 644 300 644 -20 668 Z" fill="#CFC0A0"/>

  <!-- side enclosure planting: full green walls -->
  <g>
    <ellipse cx="50" cy="480" rx="130" ry="120" fill="#2F6B4A"/>
    <ellipse cx="20" cy="430" rx="70" ry="56" fill="#2F6B4A"/>
    <ellipse cx="60" cy="450" rx="60" ry="44" fill="#A9C6A0" fill-opacity="0.7"/>
    <ellipse cx="50" cy="480" rx="130" ry="120" fill="url(#leafdots)"/>
  </g>
  <g>
    <ellipse cx="1230" cy="476" rx="134" ry="124" fill="#2F6B4A"/>
    <ellipse cx="1262" cy="424" rx="72" ry="58" fill="#2F6B4A"/>
    <ellipse cx="1218" cy="446" rx="62" ry="46" fill="#A9C6A0" fill-opacity="0.7"/>
    <ellipse cx="1230" cy="476" rx="134" ry="124" fill="url(#leafdots)"/>
  </g>

  <!-- the ghaf: mature, sculptural, canopy roofing the room -->
  <g>
    <path d="M640 560 C635 500 626 448 604 400 C590 368 566 340 532 320 M640 560 C647 502 660 452 686 408 C702 382 726 358 756 342 M622 460 C596 436 566 422 530 416 M668 436 C700 414 734 402 772 400" stroke="#22301F" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M640 560 C637 506 631 458 616 414" stroke="#C05A32" stroke-opacity="0.3" stroke-width="5" fill="none" stroke-linecap="round"/>
    <ellipse cx="644" cy="300" rx="252" ry="96" fill="#2F6B4A"/>
    <ellipse cx="470" cy="336" rx="110" ry="50" fill="#2F6B4A"/>
    <ellipse cx="820" cy="330" rx="112" ry="50" fill="#2F6B4A"/>
    <ellipse cx="570" cy="280" rx="112" ry="48" fill="#A9C6A0" fill-opacity="0.6"/>
    <ellipse cx="740" cy="308" rx="92" ry="40" fill="#7CC98F" fill-opacity="0.35"/>
    <ellipse cx="644" cy="300" rx="252" ry="96" fill="url(#leafdots)"/>
    <ellipse cx="820" cy="330" rx="112" ry="50" fill="url(#leafdots)"/>
  </g>
  <ellipse cx="672" cy="566" rx="250" ry="24" fill="#22301F" fill-opacity="0.15"/>

