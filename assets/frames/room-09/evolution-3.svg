  <ellipse cx="640" cy="612" rx="336" ry="50" fill="#CFC0A0"/>
  <ellipse cx="640" cy="610" rx="320" ry="42" fill="#4E8FA8"/>
  <ellipse cx="640" cy="610" rx="320" ry="42" fill="#7BC6DD" fill-opacity="0.25"/>
  <g opacity="0.35">
    <ellipse cx="648" cy="624" rx="210" ry="24" fill="#2F6B4A"/>
    <ellipse cx="540" cy="614" rx="70" ry="12" fill="#22301F"/>
    <path d="M640 588 L640 622" stroke="#22301F" stroke-width="7" stroke-linecap="round"/>
  </g>
  <ellipse cx="790" cy="596" rx="100" ry="8" fill="#F5EFE2" fill-opacity="0.4"/>

  <!-- fragrant beds, dense and layered -->
  <g>
    <ellipse cx="220" cy="546" rx="130" ry="34" fill="#2F6B4A" fill-opacity="0.9"/>
    <ellipse cx="220" cy="546" rx="130" ry="34" fill="url(#leafdots)"/>
    <ellipse cx="176" cy="528" rx="52" ry="24" fill="#A9C6A0" fill-opacity="0.85"/>
    <ellipse cx="276" cy="532" rx="44" ry="21" fill="#A9C6A0" fill-opacity="0.7"/>
    <circle cx="212" cy="514" r="4.4" fill="#7CC98F"/>
    <circle cx="254" cy="508" r="3.6" fill="#F5EFE2"/>
    <circle cx="168" cy="506" r="3.2" fill="#7CC98F"/>
