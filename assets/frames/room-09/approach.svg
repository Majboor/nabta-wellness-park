<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <path id="sparkle" d="M0 -14 C2.5 -4 4 -2.5 14 0 C4 2.5 2.5 4 0 14 C-2.5 4 -4 2.5 -14 0 C-4 -2.5 -2.5 -4 0 -14 Z"/>
    <pattern id="stipple" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="6" r="1.6" fill="#22301F" fill-opacity="0.12"/>
      <circle cx="17" cy="14" r="1.3" fill="#22301F" fill-opacity="0.10"/>
      <circle cx="9" cy="21" r="1.5" fill="#22301F" fill-opacity="0.08"/>
    </pattern>
    <pattern id="leafdots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="8" r="2.4" fill="#A9C6A0" fill-opacity="0.55"/>
      <circle cx="20" cy="18" r="2.0" fill="#2F6B4A" fill-opacity="0.35"/>
      <circle cx="12" cy="25" r="1.8" fill="#7CC98F" fill-opacity="0.30"/>
    </pattern>
  </defs>

  <!-- soft muted sky -->
  <rect width="1280" height="720" fill="#F5EFE2"/>
  <rect y="250" width="1280" height="180" fill="#E7DCC3" fill-opacity="0.6"/>

  <!-- glimpse through the threshold: interior of the quiet room -->
  <g>
    <!-- interior far berm -->
    <path d="M420 400 C520 348 760 344 880 398 L880 470 L420 470 Z" fill="#A9C6A0" fill-opacity="0.7"/>
    <!-- the single ghaf, seen beyond the gap -->
    <path d="M648 420 C646 380 640 340 628 300 M648 420 C654 372 666 336 684 306" stroke="#22301F" stroke-width="7" fill="none" stroke-linecap="round"/>
    <ellipse cx="650" cy="272" rx="118" ry="64" fill="#2F6B4A"/>
    <ellipse cx="600" cy="252" rx="54" ry="34" fill="#2F6B4A"/>
    <ellipse cx="706" cy="256" rx="50" ry="30" fill="#A9C6A0" fill-opacity="0.6"/>
    <ellipse cx="650" cy="272" rx="118" ry="64" fill="url(#leafdots)"/>
    <!-- sliver of the still basin -->
    <ellipse cx="650" cy="440" rx="150" ry="20" fill="#4E8FA8"/>
    <ellipse cx="650" cy="440" rx="150" ry="20" fill="#7BC6DD" fill-opacity="0.3"/>
    <ellipse cx="650" cy="446" rx="90" ry="10" fill="#2F6B4A" fill-opacity="0.35"/>
  </g>

  <!-- ground plane -->
  <rect y="452" width="1280" height="268" fill="#E7DCC3"/>
  <rect y="452" width="1280" height="268" fill="url(#stipple)"/>

  <!-- entry path narrowing toward the threshold -->
  <path d="M400 720 L880 720 L710 470 L580 470 Z" fill="#CFC0A0"/>
  <path d="M400 720 L880 720 L710 470 L580 470 Z" fill="url(#stipple)"/>
  <path d="M560 700 L700 700 L668 560 L610 560 Z" fill="#F5EFE2" fill-opacity="0.3"/>

  <!-- sound-buffering earth berms, left and right, layered depth -->
  <g>
    <path d="M-40 720 C40 500 180 380 420 340 C520 326 560 360 585 470 L640 720 Z" fill="#CFC0A0"/>
    <path d="M-40 720 C40 520 170 410 400 372 C300 420 200 540 140 720 Z" fill="#A9C6A0" fill-opacity="0.75"/>
    <path d="M-40 720 C30 560 130 460 320 410 C230 470 130 580 80 720 Z" fill="#2F6B4A" fill-opacity="0.55"/>
    <path d="M-40 720 C40 500 180 380 420 340 C520 326 560 360 585 470 L640 720 Z" fill="url(#leafdots)"/>
  </g>
  <g>
    <path d="M1320 720 C1250 490 1110 376 880 342 C770 328 730 366 706 470 L650 720 Z" fill="#CFC0A0"/>
    <path d="M1320 720 C1250 520 1130 410 900 374 C1010 424 1110 540 1170 720 Z" fill="#A9C6A0" fill-opacity="0.75"/>
    <path d="M1320 720 C1260 560 1160 460 970 412 C1070 472 1170 580 1210 720 Z" fill="#2F6B4A" fill-opacity="0.55"/>
    <path d="M1320 720 C1250 490 1110 376 880 342 C770 328 730 366 706 470 L650 720 Z" fill="url(#leafdots)"/>
  </g>

  <!-- fragrant native planting flanking the threshold -->
  <g>
    <ellipse cx="500" cy="500" rx="90" ry="46" fill="#2F6B4A"/>
    <ellipse cx="470" cy="486" rx="46" ry="26" fill="#A9C6A0" fill-opacity="0.8"/>
    <ellipse cx="500" cy="500" rx="90" ry="46" fill="url(#leafdots)"/>
    <circle cx="452" cy="470" r="4" fill="#7CC98F"/>
    <circle cx="520" cy="462" r="3.4" fill="#F5EFE2"/>
    <circle cx="486" cy="454" r="3" fill="#7CC98F"/>
  </g>
  <g>
    <ellipse cx="790" cy="506" rx="96" ry="48" fill="#2F6B4A"/>
    <ellipse cx="822" cy="490" rx="48" ry="28" fill="#A9C6A0" fill-opacity="0.8"/>
    <ellipse cx="790" cy="506" rx="96" ry="48" fill="url(#leafdots)"/>
    <circle cx="838" cy="472" r="4" fill="#F5EFE2"/>
    <circle cx="768" cy="464" r="3.4" fill="#7CC98F"/>
  </g>
  <!-- foreground grasses -->
  <g stroke="#2F6B4A" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M180 720 C186 660 178 630 160 600"/>
    <path d="M220 720 C222 656 232 626 250 604"/>
    <path d="M1080 720 C1074 656 1082 626 1100 602"/>
    <path d="M1120 720 C1124 660 1114 632 1096 608"/>
  </g>
  <g stroke="#A9C6A0" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M200 720 C204 664 198 640 186 616"/>
    <path d="M1100 720 C1102 664 1096 640 1086 618"/>
  </g>

  <!-- deep shade cast across the threshold -->
  <path d="M420 470 C560 440 740 440 880 470 L840 590 L470 590 Z" fill="#22301F" fill-opacity="0.12"/>
  <ellipse cx="640" cy="640" rx="240" ry="34" fill="#22301F" fill-opacity="0.08"/>

  <!-- one still figure seated on a low bench just inside -->
  <g fill="#22301F">
    <rect x="742" y="428" width="40" height="6" rx="3"/>
    <rect x="746" y="434" width="4" height="16"/>
    <rect x="774" y="434" width="4" height="16"/>
    <path d="M756 428 L756 404 C756 398 762 394 766 398 L766 428 Z"/>
    <circle cx="761" cy="392" r="6"/>
  </g>

  <!-- nabta sparkles, sparing -->
  <use href="#sparkle" transform="translate(300 170) scale(1.0)" fill="#7CC98F"/>
  <use href="#sparkle" transform="translate(1010 220) scale(0.8)" fill="#7BC6DD"/>
</svg>
