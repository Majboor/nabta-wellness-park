<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <path id="sparkle" d="M0 -14 C2.5 -4 4 -2.5 14 0 C4 2.5 2.5 4 0 14 C-2.5 4 -4 2.5 -14 0 C-4 -2.5 -2.5 -4 0 -14 Z"/>
    <pattern id="stipple" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="6" r="1.6" fill="#22301F" fill-opacity="0.12"/>
      <circle cx="17" cy="14" r="1.3" fill="#22301F" fill-opacity="0.10"/>
      <circle cx="9" cy="21" r="1.5" fill="#22301F" fill-opacity="0.08"/>
    </pattern>
    <pattern id="leafdots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="8" r="2.4" fill="#A9C6A0" fill-opacity="0.55"/>
      <circle cx="20" cy="18" r="2.0" fill="#2F6B4A" fill-opacity="0.35"/>
      <circle cx="12" cy="25" r="1.8" fill="#7CC98F" fill-opacity="0.30"/>
    </pattern>
  </defs>

  <!-- year two: the garden knitting together -->
  <rect width="1280" height="720" fill="#F5EFE2"/>
  <rect y="320" width="1280" height="130" fill="#E7DCC3" fill-opacity="0.5"/>

  <!-- berm greening over -->
  <path d="M-20 480 C180 400 440 378 640 380 C880 382 1120 410 1300 480 L1300 720 L-20 720 Z" fill="#CFC0A0"/>
  <path d="M-20 480 C200 406 480 384 720 390 C960 396 1160 428 1300 480 L1300 560 L-20 560 Z" fill="#A9C6A0" fill-opacity="0.6"/>
  <path d="M-20 495 C240 432 560 412 840 420 C1020 428 1180 452 1300 495 L1300 560 L-20 560 Z" fill="#2F6B4A" fill-opacity="0.3"/>
  <path d="M-20 480 C180 400 440 378 640 380 C880 382 1120 410 1300 480 L1300 560 L-20 560 Z" fill="url(#leafdots)"/>

  <!-- ground -->
  <rect y="548" width="1280" height="172" fill="#E7DCC3"/>
  <rect y="548" width="1280" height="172" fill="url(#stipple)"/>
  <path d="M-20 720 L1300 720 L1300 668 C1000 644 300 644 -20 668 Z" fill="#CFC0A0"/>

  <!-- side enclosure planting: filling in -->
  <g>
    <ellipse cx="60" cy="530" rx="86" ry="42" fill="#2F6B4A" fill-opacity="0.85"/>
    <ellipse cx="42" cy="510" rx="44" ry="26" fill="#A9C6A0" fill-opacity="0.8"/>
    <ellipse cx="60" cy="530" rx="86" ry="42" fill="url(#leafdots)"/>
  </g>
  <g>
    <ellipse cx="1220" cy="528" rx="90" ry="44" fill="#2F6B4A" fill-opacity="0.85"/>
    <ellipse cx="1240" cy="506" rx="46" ry="27" fill="#A9C6A0" fill-opacity="0.8"/>
    <ellipse cx="1220" cy="528" rx="90" ry="44" fill="url(#leafdots)"/>
  </g>

  <!-- the ghaf: adolescent, stakes gone, character emerging -->
  <g>
    <path d="M640 560 C637 510 632 470 620 432 C612 408 598 388 578 374 M640 560 C645 512 654 474 672 440 C682 420 698 402 718 390" stroke="#22301F" stroke-width="9" fill="none" stroke-linecap="round"/>
    <ellipse cx="646" cy="376" rx="132" ry="58" fill="#2F6B4A"/>
    <ellipse cx="574" cy="360" rx="58" ry="32" fill="#2F6B4A"/>
    <ellipse cx="710" cy="362" rx="54" ry="30" fill="#A9C6A0" fill-opacity="0.65"/>
    <ellipse cx="630" cy="366" rx="60" ry="30" fill="#7CC98F" fill-opacity="0.3"/>
    <ellipse cx="646" cy="376" rx="132" ry="58" fill="url(#leafdots)"/>
  </g>
  <ellipse cx="668" cy="564" rx="130" ry="16" fill="#22301F" fill-opacity="0.13"/>

  <!-- still basin, reflection deepening -->
  <ellipse cx="640" cy="612" rx="336" ry="50" fill="#CFC0A0"/>
  <ellipse cx="640" cy="610" rx="320" ry="42" fill="#4E8FA8"/>
  <ellipse cx="640" cy="610" rx="320" ry="42" fill="#7BC6DD" fill-opacity="0.28"/>
  <g opacity="0.32">
    <ellipse cx="644" cy="622" rx="110" ry="18" fill="#2F6B4A"/>
    <path d="M640 590 L640 620" stroke="#22301F" stroke-width="6" stroke-linecap="round"/>
  </g>
  <ellipse cx="770" cy="598" rx="110" ry="9" fill="#F5EFE2" fill-opacity="0.45"/>

  <!-- fragrant beds knitting closed -->
  <g>
    <ellipse cx="220" cy="546" rx="130" ry="34" fill="#A9C6A0" fill-opacity="0.7"/>
    <ellipse cx="220" cy="546" rx="130" ry="34" fill="url(#leafdots)"/>
    <ellipse cx="180" cy="534" rx="42" ry="20" fill="#2F6B4A" fill-opacity="0.8"/>
    <ellipse cx="272" cy="540" rx="36" ry="17" fill="#2F6B4A" fill-opacity="0.8"/>
    <circle cx="216" cy="522" r="4" fill="#7CC98F"/>
    <circle cx="252" cy="518" r="3.4" fill="#F5EFE2"/>
  </g>
  <g>
    <ellipse cx="1060" cy="546" rx="130" ry="34" fill="#A9C6A0" fill-opacity="0.7"/>
    <ellipse cx="1060" cy="546" rx="130" ry="34" fill="url(#leafdots)"/>
    <ellipse cx="1022" cy="534" rx="40" ry="19" fill="#2F6B4A" fill-opacity="0.8"/>
    <ellipse cx="1112" cy="540" rx="36" ry="17" fill="#2F6B4A" fill-opacity="0.8"/>
    <circle cx="1056" cy="522" r="4" fill="#7CC98F"/>
    <circle cx="1094" cy="518" r="3.2" fill="#F5EFE2"/>
  </g>

  <!-- bench with back and arm rests, one seated figure -->
  <g>
    <rect x="252" y="486" width="132" height="10" rx="4" fill="#22301F"/>
    <rect x="252" y="438" width="8" height="54" rx="3" fill="#22301F"/>
    <rect x="376" y="438" width="8" height="54" rx="3" fill="#22301F"/>
    <rect x="255" y="438" width="126" height="7" rx="3" fill="#22301F" fill-opacity="0.85"/>
    <rect x="258" y="496" width="7" height="34" fill="#22301F"/>
    <rect x="371" y="496" width="7" height="34" fill="#22301F"/>
    <rect x="252" y="457" width="132" height="6" rx="3" fill="#C05A32" fill-opacity="0.8"/>
  </g>
  <g fill="#22301F">
    <path d="M306 486 L306 436 C306 425 322 422 327 431 L330 486 Z"/>
    <circle cx="316" cy="415" r="11"/>
    <path d="M308 486 L308 514 L315 514 L316 490 L323 490 L325 514 L332 514 L331 486 Z"/>
  </g>

  <!-- shade beginning to pool -->
  <ellipse cx="420" cy="686" rx="240" ry="20" fill="#22301F" fill-opacity="0.08"/>
  <ellipse cx="760" cy="694" rx="180" ry="16" fill="#22301F" fill-opacity="0.06"/>

  <!-- nabta sparkles, sparing -->
  <use href="#sparkle" transform="translate(170 140) scale(1.0)" fill="#7CC98F"/>
  <use href="#sparkle" transform="translate(1090 200) scale(0.8)" fill="#7BC6DD"/>
</svg>
