<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <!-- Fitness Grove, year 2: same composition, adolescent ghaf crowns knitting together, lawns filling in -->
  <defs>
    <linearGradient id="e2-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5EFE2"/>
      <stop offset="1" stop-color="#E7DCC3"/>
    </linearGradient>
    <pattern id="e2-stipple" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="7" r="1.3" fill="#22301F" opacity="0.10"/>
      <circle cx="17" cy="18" r="1.1" fill="#22301F" opacity="0.08"/>
    </pattern>
    <pattern id="e2-grass" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="6" r="1.4" fill="#2F6B4A" opacity="0.17"/>
      <circle cx="15" cy="16" r="1.2" fill="#7CC98F" opacity="0.15"/>
    </pattern>
    <g id="e2-sparkle">
      <path d="M0,-11 L2.6,-2.6 L11,0 L2.6,2.6 L0,11 L-2.6,2.6 L-11,0 L-2.6,-2.6 Z" fill="#F5EFE2"/>
    </g>
  </defs>

  <rect width="1280" height="470" fill="url(#e2-sky)"/>
  <circle cx="1060" cy="120" r="55" fill="#F5EFE2" opacity="0.85"/>

  <!-- distant loop treeline, thickening -->
  <path d="M0,430 C200,404 440,422 680,402 C920,386 1120,414 1280,396 L1280,470 L0,470 Z" fill="#A9C6A0" opacity="0.48"/>
  <path d="M0,448 C260,432 560,444 860,428 C1020,420 1160,436 1280,424 L1280,475 L0,475 Z" fill="#2F6B4A" opacity="0.28"/>

  <!-- ground -->
  <rect y="450" width="1280" height="270" fill="#E7DCC3"/>
  <rect y="450" width="1280" height="270" fill="url(#e2-stipple)"/>

  <!-- loop path band -->
  <path d="M-20,478 C320,460 720,470 1300,452 L1300,500 C760,520 320,508 -20,526 Z" fill="#CFC0A0"/>
  <path d="M-20,500 C400,482 820,492 1300,474" fill="none" stroke="#F5EFE2" stroke-width="3.5" stroke-dasharray="14 20" opacity="0.75"/>

  <!-- lawns filling in -->
  <path d="M0,540 C160,518 340,530 470,562 C330,606 140,618 0,602 Z" fill="#A9C6A0" opacity="0.7"/>
  <path d="M0,540 C160,518 340,530 470,562 C330,606 140,618 0,602 Z" fill="url(#e2-grass)"/>
  <path d="M900,528 C1050,510 1190,520 1280,512 L1280,610 C1120,618 970,586 900,556 Z" fill="#A9C6A0" opacity="0.65"/>
  <path d="M900,528 C1050,510 1190,520 1280,512 L1280,610 C1120,618 970,586 900,556 Z" fill="url(#e2-grass)"/>

  <!-- first real shade patches -->
  <g fill="#22301F" opacity="0.09">
    <ellipse cx="230" cy="620" rx="110" ry="20"/>
    <ellipse cx="1090" cy="630" rx="105" ry="18"/>
    <ellipse cx="560" cy="590" rx="80" ry="15"/>
  </g>

  <!-- four adolescent ghaf trees, stakes removed -->
  <g stroke="#22301F" fill="none" stroke-linecap="round">
    <path d="M170,470 C164,392 152,330 140,282 M170,470 C177,404 192,352 204,318" stroke-width="12"/>
    <path d="M520,462 C516,394 508,338 500,296 M520,462 C525,406 536,360 545,328" stroke-width="9"/>
    <path d="M760,458 C763,398 770,348 776,310" stroke-width="8"/>
    <path d="M1080,468 C1086,388 1098,324 1110,276 M1080,468 C1074,402 1060,348 1048,312" stroke-width="13"/>
  </g>
  <g>
    <circle cx="150" cy="252" r="56" fill="#2F6B4A" opacity="0.86"/>
    <circle cx="200" cy="280" r="40" fill="#A9C6A0" opacity="0.68"/>
    <circle cx="120" cy="292" r="30" fill="#A9C6A0" opacity="0.5"/>
    <circle cx="170" cy="222" r="26" fill="#7CC98F" opacity="0.3"/>
    <circle cx="506" cy="272" r="46" fill="#2F6B4A" opacity="0.84"/>
    <circle cx="548" cy="300" r="32" fill="#A9C6A0" opacity="0.62"/>
    <circle cx="778" cy="288" r="38" fill="#2F6B4A" opacity="0.82"/>
    <circle cx="808" cy="310" r="26" fill="#A9C6A0" opacity="0.58"/>
    <circle cx="1116" cy="246" r="58" fill="#2F6B4A" opacity="0.86"/>
    <circle cx="1066" cy="278" r="40" fill="#A9C6A0" opacity="0.66"/>
    <circle cx="1160" cy="288" r="30" fill="#A9C6A0" opacity="0.5"/>
  </g>

  <!-- pull-up rig -->
  <g>
    <rect x="330" y="300" width="14" height="290" rx="4" fill="#22301F"/>
    <rect x="470" y="300" width="14" height="290" rx="4" fill="#22301F"/>
    <rect x="322" y="292" width="170" height="12" rx="5" fill="#22301F"/>
    <rect x="342" y="304" width="130" height="9" rx="4" fill="#C05A32"/>
    <ellipse cx="405" cy="596" rx="90" ry="11" fill="#22301F" opacity="0.16"/>
    <g fill="#22301F">
      <circle cx="404" cy="348" r="12"/>
      <path d="M394,358 c-2,22 0,44 6,62 l-10,58 10,3 12,-54 7,54 10,-2 -6,-62 c5,-20 6,-42 3,-59 z"/>
      <path d="M392,312 l4,38 7,3 2,-36 z"/>
      <path d="M420,312 l-2,38 -7,3 -3,-36 z"/>
    </g>
  </g>

  <!-- parallel bars with athlete -->
  <g>
    <rect x="790" y="480" width="11" height="112" rx="4" fill="#22301F"/>
    <rect x="920" y="480" width="11" height="112" rx="4" fill="#22301F"/>
    <rect x="782" y="472" width="72" height="9" rx="4" fill="#C05A32"/>
    <rect x="868" y="472" width="72" height="9" rx="4" fill="#C05A32"/>
    <ellipse cx="860" cy="596" rx="85" ry="10" fill="#22301F" opacity="0.14"/>
    <g fill="#22301F">
      <circle cx="861" cy="440" r="11"/>
      <path d="M852,449 c-3,16 -1,32 3,45 l-8,44 9,2 9,-40 7,40 9,-2 -6,-46 c3,-13 4,-28 1,-43 z"/>
      <path d="M849,453 l-22,16 3,7 23,-13 z"/>
      <path d="M874,453 l24,14 -3,7 -25,-11 z"/>
    </g>
  </g>

  <!-- fountain -->
  <g>
    <rect x="626" y="472" width="28" height="54" rx="7" fill="#22301F"/>
    <ellipse cx="640" cy="472" rx="20" ry="8" fill="#4E8FA8"/>
    <path d="M640,467 C637,458 643,453 640,446" stroke="#7BC6DD" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- pergola gateway at far right -->
  <g>
    <rect x="1196" y="330" width="12" height="180" fill="#22301F"/>
    <rect x="1268" y="330" width="12" height="180" fill="#22301F"/>
    <g fill="#C05A32">
      <rect x="1186" y="324" width="104" height="8" rx="3"/>
      <rect x="1190" y="342" width="96" height="7" rx="3"/>
      <rect x="1194" y="359" width="88" height="7" rx="3"/>
    </g>
  </g>

  <!-- regulars: stretcher, jogger, walker -->
  <g fill="#22301F">
    <circle cx="200" cy="560" r="9"/>
    <path d="M192,567 c-14,8 -26,13 -44,15 l2,9 c20,-1 36,-6 50,-15 l28,13 22,-4 -2,-8 -20,2 -22,-11 z"/>
    <circle cx="1010" cy="466" r="8"/>
    <path d="M1003,473 c-2,12 0,22 6,30 l-14,20 7,5 14,-19 8,20 8,-3 -8,-24 c4,-9 4,-19 1,-29 z"/>
    <circle cx="580" cy="470" r="7"/>
    <path d="M574,476 c-2,11 0,21 4,28 l-4,32 8,1 4,-28 6,28 8,-1 -5,-33 c3,-9 3,-18 1,-27 z"/>
  </g>

  <use href="#e2-sparkle" transform="translate(640,442) scale(0.5)" opacity="0.95"/>
  <use href="#e2-sparkle" transform="translate(940,90) scale(0.7)" opacity="0.75"/>
  <use href="#e2-sparkle" transform="translate(320,70) scale(0.55)" opacity="0.7"/>
</svg>
