<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <!-- Fitness Grove, pre-dawn: ink night thinning to a terracotta horizon, warm low path lights, first joggers -->
  <defs>
    <linearGradient id="n-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22301F"/>
      <stop offset="0.62" stop-color="#22301F"/>
      <stop offset="0.88" stop-color="#2F6B4A" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#C05A32" stop-opacity="0.75"/>
    </linearGradient>
    <radialGradient id="n-lamp" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E7DCC3" stop-opacity="0.85"/>
      <stop offset="0.45" stop-color="#C05A32" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#C05A32" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="n-dawn" cx="0.5" cy="1" r="1">
      <stop offset="0" stop-color="#C05A32" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#C05A32" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#C05A32" stop-opacity="0"/>
    </radialGradient>
    <pattern id="n-stipple" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="8" r="1.3" fill="#F5EFE2" opacity="0.05"/>
      <circle cx="18" cy="20" r="1.1" fill="#F5EFE2" opacity="0.04"/>
    </pattern>
    <g id="n-sparkle">
      <path d="M0,-11 L2.6,-2.6 L11,0 L2.6,2.6 L0,11 L-2.6,2.6 L-11,0 L-2.6,-2.6 Z" fill="#F5EFE2"/>
    </g>
  </defs>

  <!-- night sky warming at the horizon -->
  <rect width="1280" height="480" fill="url(#n-sky)"/>
  <ellipse cx="760" cy="480" rx="620" ry="260" fill="url(#n-dawn)"/>
  <!-- star sparkles -->
  <use href="#n-sparkle" transform="translate(180,90) scale(0.5)" opacity="0.8"/>
  <use href="#n-sparkle" transform="translate(520,60) scale(0.35)" opacity="0.7"/>
  <use href="#n-sparkle" transform="translate(940,110) scale(0.45)" opacity="0.75"/>
  <use href="#n-sparkle" transform="translate(1180,70) scale(0.3)" opacity="0.6"/>
  <use href="#n-sparkle" transform="translate(760,160) scale(0.28)" opacity="0.55"/>

  <!-- canopy masses as dark silhouettes against the dawn -->
  <path d="M-40,60 C200,150 480,80 720,140 C960,200 1160,110 1320,160 L1320,-40 L-40,-40 Z" fill="#22301F"/>
  <circle cx="180" cy="150" r="95" fill="#22301F"/>
  <circle cx="1120" cy="170" r="105" fill="#22301F"/>
  <circle cx="640" cy="120" r="80" fill="#22301F" opacity="0.9"/>
  <circle cx="420" cy="180" r="60" fill="#2F6B4A" opacity="0.35"/>
  <circle cx="880" cy="200" r="65" fill="#2F6B4A" opacity="0.3"/>

  <!-- ground, cool and dim -->
  <rect y="440" width="1280" height="280" fill="#22301F"/>
  <rect y="450" width="1280" height="270" fill="#E7DCC3" opacity="0.14"/>
  <rect y="440" width="1280" height="280" fill="url(#n-stipple)"/>

  <!-- loop path catching the lamp light -->
  <path d="M-20,470 C300,445 700,460 1300,442 L1300,486 C760,505 300,492 -20,514 Z" fill="#CFC0A0" opacity="0.5"/>
  <path d="M-20,492 C400,472 800,482 1300,464" fill="none" stroke="#F5EFE2" stroke-width="3.5" stroke-dasharray="14 20" opacity="0.35"/>

  <!-- lawn pockets, deep green in the dark -->
  <path d="M0,480 C140,462 300,475 400,505 C280,545 120,558 0,545 Z" fill="#2F6B4A" opacity="0.55"/>
  <path d="M950,470 C1080,455 1200,465 1280,458 L1280,540 C1140,548 1010,520 950,498 Z" fill="#2F6B4A" opacity="0.5"/>

  <!-- warm bollard lights along the loop -->
  <g>
    <ellipse cx="240" cy="480" rx="120" ry="55" fill="url(#n-lamp)"/>
    <rect x="236" y="440" width="8" height="46" rx="3" fill="#22301F"/>
    <circle cx="240" cy="438" r="7" fill="#E7DCC3"/>
    <ellipse cx="640" cy="472" rx="130" ry="60" fill="url(#n-lamp)"/>
    <rect x="636" y="430" width="8" height="48" rx="3" fill="#22301F"/>
    <circle cx="640" cy="428" r="7" fill="#E7DCC3"/>
    <ellipse cx="1040" cy="466" rx="120" ry="55" fill="url(#n-lamp)"/>
    <rect x="1036" y="426" width="8" height="46" rx="3" fill="#22301F"/>
    <circle cx="1040" cy="424" r="7" fill="#E7DCC3"/>
  </g>

  <!-- ghaf trunks, dark verticals -->
  <g stroke="#22301F" fill="none" stroke-linecap="round">
    <path d="M150,470 C142,340 120,220 96,120 M150,470 C160,360 185,260 205,190" stroke-width="20"/>
    <path d="M1130,470 C1140,330 1160,210 1180,110 M1130,470 C1120,360 1096,260 1076,180" stroke-width="22"/>
    <path d="M880,458 C884,380 892,300 900,240" stroke-width="10"/>
  </g>
  <!-- warm rim light on the near trunk edges -->
  <path d="M158,466 C151,350 132,240 110,140" stroke="#C05A32" stroke-width="3.5" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M1122,466 C1131,340 1150,220 1168,124" stroke="#C05A32" stroke-width="3.5" fill="none" opacity="0.55" stroke-linecap="round"/>

  <!-- pull-up rig silhouette with lamplit grips -->
  <g>
    <rect x="250" y="250" width="16" height="370" rx="4" fill="#22301F"/>
    <rect x="430" y="250" width="16" height="370" rx="4" fill="#22301F"/>
    <rect x="242" y="242" width="212" height="14" rx="6" fill="#22301F"/>
    <rect x="266" y="256" width="164" height="10" rx="5" fill="#C05A32" opacity="0.95"/>
    <ellipse cx="345" cy="622" rx="110" ry="13" fill="#22301F" opacity="0.5"/>
  </g>

  <!-- parallel bars silhouette -->
  <g>
    <rect x="730" y="440" width="12" height="135" rx="4" fill="#22301F"/>
    <rect x="890" y="440" width="12" height="135" rx="4" fill="#22301F"/>
    <rect x="720" y="432" width="90" height="9" rx="4" fill="#C05A32" opacity="0.95"/>
    <rect x="822" y="432" width="90" height="9" rx="4" fill="#C05A32" opacity="0.95"/>
  </g>

  <!-- fountain glinting -->
  <g>
    <rect x="588" y="470" width="30" height="58" rx="7" fill="#22301F"/>
    <ellipse cx="603" cy="470" rx="21" ry="8" fill="#4E8FA8" opacity="0.9"/>
    <path d="M603,465 C600,455 606,450 603,442" stroke="#7BC6DD" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- pre-dawn joggers, warm-lit silhouettes -->
  <g>
    <g fill="#22301F">
      <circle cx="500" cy="440" r="10"/>
      <path d="M491,449 c-3,15 -1,28 7,38 l-18,26 9,6 18,-24 10,26 10,-4 -10,-31 c5,-11 5,-24 1,-37 z"/>
      <path d="M488,455 l-20,13 4,7 20,-10 z"/>
      <path d="M512,452 l18,-15 6,6 -16,16 z"/>
    </g>
    <path d="M494,446 c-3,14 -1,26 6,36" stroke="#C05A32" stroke-width="2.5" fill="none" opacity="0.7"/>
    <g fill="#22301F">
      <circle cx="1000" cy="446" r="9"/>
      <path d="M992,454 c-2,13 0,24 6,33 l-15,22 8,5 15,-21 9,22 9,-3 -9,-27 c4,-10 4,-21 1,-31 z"/>
      <path d="M990,459 l-17,11 3,6 17,-9 z"/>
      <path d="M1011,456 l15,-13 5,5 -14,14 z"/>
    </g>
    <path d="M995,451 c-2,12 0,22 5,31" stroke="#C05A32" stroke-width="2.2" fill="none" opacity="0.65"/>
  </g>

  <!-- athlete already at the bars, rim lit -->
  <g fill="#22301F">
    <circle cx="816" cy="398" r="12"/>
    <path d="M806,408 c-3,18 -1,36 4,50 l-8,48 9,2 9,-44 7,44 9,-2 -6,-50 c4,-14 5,-31 2,-48 z"/>
    <path d="M802,412 l-24,16 3,8 25,-12 z"/>
    <path d="M830,412 l26,14 -3,8 -27,-10 z"/>
  </g>
  <path d="M812,388 a12,12 0 0 1 10,-2" stroke="#E7DCC3" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- nabta sparkle over the fountain -->
  <use href="#n-sparkle" transform="translate(603,436) scale(0.5)" opacity="0.95"/>
</svg>
