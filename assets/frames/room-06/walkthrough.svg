<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <linearGradient id="w-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5EFE2"/>
      <stop offset="1" stop-color="#E7DCC3"/>
    </linearGradient>
    <pattern id="w-stipple" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="7" r="1.3" fill="#22301F" opacity="0.10"/>
      <circle cx="17" cy="18" r="1.1" fill="#22301F" opacity="0.08"/>
    </pattern>
    <pattern id="w-leafdot" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="6" r="1.5" fill="#7CC98F" opacity="0.25"/>
      <circle cx="14" cy="15" r="1.2" fill="#2F6B4A" opacity="0.2"/>
    </pattern>
    <g id="w-sparkle">
      <path d="M0,-11 L2.6,-2.6 L11,0 L2.6,2.6 L0,11 L-2.6,2.6 L-11,0 L-2.6,-2.6 Z" fill="#F5EFE2"/>
    </g>
  </defs>

  <!-- sky through canopy -->
  <rect width="1280" height="480" fill="url(#w-sky)"/>
  <circle cx="330" cy="110" r="70" fill="#F5EFE2" opacity="0.8"/>

  <!-- overhead ghaf canopy layers -->
  <path d="M-40,-20 C200,90 480,20 720,80 C960,140 1160,40 1320,90 L1320,-40 L-40,-40 Z" fill="#2F6B4A" opacity="0.85"/>
  <path d="M-40,40 C180,140 420,60 660,120 C900,180 1140,90 1320,150 L1320,-40 L-40,-40 Z" fill="#A9C6A0" opacity="0.5"/>
  <circle cx="180" cy="90" r="90" fill="#2F6B4A" opacity="0.5"/>
  <circle cx="1120" cy="110" r="100" fill="#2F6B4A" opacity="0.55"/>
  <circle cx="640" cy="60" r="80" fill="#7CC98F" opacity="0.25"/>

  <!-- ground -->
  <rect y="440" width="1280" height="280" fill="#E7DCC3"/>
  <rect y="440" width="1280" height="280" fill="url(#w-stipple)"/>
  <!-- stretching lawn pocket left -->
  <path d="M0,480 C140,462 300,475 400,505 C280,545 120,558 0,545 Z" fill="#A9C6A0" opacity="0.85"/>
  <path d="M0,480 C140,462 300,475 400,505 C280,545 120,558 0,545 Z" fill="url(#w-leafdot)"/>
  <!-- lawn pocket right -->
  <path d="M950,470 C1080,455 1200,465 1280,458 L1280,540 C1140,548 1010,520 950,498 Z" fill="#A9C6A0" opacity="0.8"/>
  <path d="M950,470 C1080,455 1200,465 1280,458 L1280,540 C1140,548 1010,520 950,498 Z" fill="url(#w-leafdot)"/>

  <!-- loop path passing behind the stations -->
  <path d="M-20,470 C300,445 700,460 1300,442 L1300,486 C760,505 300,492 -20,514 Z" fill="#CFC0A0"/>
  <path d="M-20,492 C400,472 800,482 1300,464" fill="none" stroke="#F5EFE2" stroke-width="3.5" stroke-dasharray="14 20" opacity="0.7"/>
  <!-- dappled canopy shade on the ground -->
  <g fill="#22301F" opacity="0.10">
    <ellipse cx="420" cy="590" rx="130" ry="26"/>
    <ellipse cx="760" cy="640" rx="160" ry="30"/>
    <ellipse cx="1050" cy="565" rx="110" ry="22"/>
    <ellipse cx="160" cy="640" rx="120" ry="24"/>
  </g>

  <!-- ghaf trunks weaving through the room -->
  <g stroke="#22301F" fill="none" stroke-linecap="round">
    <path d="M150,470 C142,340 120,220 96,120 M150,470 C160,360 185,260 205,190" stroke-width="20"/>
    <path d="M1130,470 C1140,330 1160,210 1180,110 M1130,470 C1120,360 1096,260 1076,180" stroke-width="22"/>
    <path d="M660,462 C656,360 648,270 640,200" stroke-width="13"/>
    <path d="M880,458 C884,380 892,300 900,240" stroke-width="10" opacity="0.8"/>
  </g>

  <!-- pull-up rig, ink steel with terracotta grips (foreground left) -->
  <g>
    <ellipse cx="345" cy="620" rx="110" ry="14" fill="#22301F" opacity="0.14"/>
    <rect x="250" y="250" width="16" height="370" rx="4" fill="#22301F"/>
    <rect x="430" y="250" width="16" height="370" rx="4" fill="#22301F"/>
    <rect x="242" y="242" width="212" height="14" rx="6" fill="#22301F"/>
    <rect x="266" y="256" width="164" height="10" rx="5" fill="#C05A32"/>
    <rect x="258" y="330" width="20" height="9" rx="4" fill="#C05A32"/>
    <rect x="420" y="330" width="20" height="9" rx="4" fill="#C05A32"/>
    <!-- athlete mid pull-up -->
    <g fill="#22301F">
      <circle cx="348" cy="306" r="15"/>
      <path d="M334,318 c-2,26 0,52 8,74 l-14,70 12,4 16,-64 8,64 13,-3 -9,-74 c6,-24 8,-50 4,-71 z"/>
      <path d="M330,266 l6,42 8,3 3,-40 z"/>
      <path d="M366,266 l-4,42 -8,3 -1,-40 z"/>
    </g>
  </g>

  <!-- parallel dip bars (mid right) -->
  <g>
    <ellipse cx="815" cy="580" rx="95" ry="11" fill="#22301F" opacity="0.13"/>
    <rect x="730" y="440" width="12" height="135" rx="4" fill="#22301F"/>
    <rect x="890" y="440" width="12" height="135" rx="4" fill="#22301F"/>
    <rect x="720" y="432" width="90" height="9" rx="4" fill="#C05A32"/>
    <rect x="822" y="432" width="90" height="9" rx="4" fill="#C05A32"/>
    <!-- athlete on dips, legs tucked -->
    <g fill="#22301F">
      <circle cx="816" cy="398" r="12"/>
      <path d="M806,408 c-3,18 -1,36 4,50 c-8,10 -14,22 -14,34 l10,2 c3,-11 8,-20 14,-26 c7,6 11,15 13,27 l10,-2 c-1,-14 -7,-27 -15,-36 c4,-14 5,-31 2,-49 z"/>
      <path d="M802,412 l-24,16 3,8 25,-12 z"/>
      <path d="M830,412 l26,14 -3,8 -27,-10 z"/>
    </g>
  </g>

  <!-- low balance / step beams -->
  <rect x="540" y="548" width="150" height="14" rx="6" fill="#22301F"/>
  <rect x="556" y="540" width="26" height="8" rx="4" fill="#C05A32"/>
  <rect x="648" y="540" width="26" height="8" rx="4" fill="#C05A32"/>

  <!-- person stretching on the lawn -->
  <g fill="#22301F">
    <circle cx="180" cy="497" r="9"/>
    <path d="M172,504 c-14,8 -26,14 -44,16 l2,9 c20,-1 36,-7 50,-16 l28,14 22,-4 -2,-8 -20,2 -22,-12 z"/>
  </g>

  <!-- jogger passing on the loop behind -->
  <g fill="#22301F">
    <circle cx="1005" cy="430" r="8"/>
    <path d="M998,437 c-2,12 0,22 6,30 l-14,20 7,5 14,-19 8,20 8,-3 -8,-24 c4,-9 4,-19 1,-29 z"/>
    <path d="M996,442 l-16,10 3,6 16,-8 z"/>
    <path d="M1014,440 l14,-12 5,5 -13,13 z"/>
  </g>

  <!-- shaded water fountain -->
  <g>
    <rect x="588" y="470" width="30" height="58" rx="7" fill="#22301F"/>
    <ellipse cx="603" cy="470" rx="21" ry="8" fill="#4E8FA8"/>
    <path d="M603,465 C600,455 606,450 603,442" stroke="#7BC6DD" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- hanging leaf clusters -->
  <g fill="#A9C6A0" opacity="0.8">
    <ellipse cx="560" cy="150" rx="46" ry="20"/>
    <ellipse cx="900" cy="180" rx="52" ry="22"/>
    <ellipse cx="90" cy="200" rx="40" ry="18"/>
  </g>

  <!-- sparkles -->
  <use href="#w-sparkle" transform="translate(603,438) scale(0.5)" opacity="0.95"/>
  <use href="#w-sparkle" transform="translate(480,120) scale(0.8)" opacity="0.8"/>
  <use href="#w-sparkle" transform="translate(1230,320) scale(0.6)" opacity="0.7"/>
</svg>
