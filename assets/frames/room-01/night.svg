<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <path id="sp" d="M0 -12 C1.6 -3.2 3.2 -1.6 12 0 C3.2 1.6 1.6 3.2 0 12 C-1.6 3.2 -3.2 1.6 -12 0 C-3.2 -1.6 -1.6 -3.2 0 -12 Z"/>
    <radialGradient id="lamp" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F5EFE2" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#E7DCC3" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#E7DCC3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pool" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E7DCC3" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#E7DCC3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- deep ink night sky -->
  <rect width="1280" height="720" fill="#22301F"/>
  <rect x="0" y="0" width="1280" height="320" fill="#22301F"/>
  <rect x="0" y="250" width="1280" height="70" fill="#4E8FA8" fill-opacity="0.12"/>
  <!-- moon -->
  <circle cx="985" cy="96" r="34" fill="#F5EFE2"/>
  <circle cx="972" cy="88" r="30" fill="#22301F" fill-opacity="0.14"/>
  <circle cx="985" cy="96" r="52" fill="#F5EFE2" fill-opacity="0.1"/>
  <!-- star sparkles -->
  <g fill="#F5EFE2">
    <use href="#sp" transform="translate(180 80) scale(0.55)"/>
    <use href="#sp" transform="translate(420 46) scale(0.4)"/>
    <use href="#sp" transform="translate(700 100) scale(0.5)"/>
    <use href="#sp" transform="translate(1180 60) scale(0.45)"/>
    <circle cx="300" cy="140" r="2"/><circle cx="560" cy="70" r="2"/><circle cx="840" cy="46" r="2"/>
    <circle cx="1100" cy="150" r="2"/><circle cx="80" cy="180" r="2"/>
  </g>

  <!-- distant planting band, silhouetted -->
  <ellipse cx="180" cy="312" rx="170" ry="58" fill="#2F6B4A" fill-opacity="0.5"/>
  <ellipse cx="460" cy="300" rx="140" ry="62" fill="#2F6B4A" fill-opacity="0.6"/>
  <ellipse cx="1060" cy="305" rx="180" ry="60" fill="#2F6B4A" fill-opacity="0.5"/>
  <ellipse cx="790" cy="315" rx="120" ry="48" fill="#2F6B4A" fill-opacity="0.45"/>

  <!-- ground: night-dimmed sand and paving -->
  <rect x="0" y="320" width="1280" height="400" fill="#E7DCC3" fill-opacity="0.2"/>
  <path d="M0 720 L0 500 Q640 470 1280 500 L1280 720 Z" fill="#CFC0A0" fill-opacity="0.28"/>
  <path d="M300 720 Q560 480 830 330 L900 330 Q700 480 620 720 Z" fill="#CFC0A0" fill-opacity="0.4"/>
  <g stroke="#F5EFE2" stroke-opacity="0.06" stroke-width="2" fill="none">
    <path d="M420 720 Q620 500 862 330"/>
    <path d="M160 420 H520"/><path d="M900 430 H1240"/>
  </g>

  <!-- warm lamp pools on the paving -->
  <ellipse cx="360" cy="560" rx="220" ry="70" fill="url(#pool)"/>
  <ellipse cx="900" cy="520" rx="210" ry="66" fill="url(#pool)"/>
  <ellipse cx="640" cy="660" rx="260" ry="70" fill="url(#pool)" opacity="0.7"/>

  <!-- pergola columns -->
  <rect x="88" y="90" width="40" height="420" fill="#C05A32" fill-opacity="0.75"/>
  <rect x="1152" y="90" width="40" height="420" fill="#C05A32" fill-opacity="0.75"/>
  <rect x="620" y="160" width="22" height="180" fill="#C05A32" fill-opacity="0.45"/>

  <!-- overhead slats, uplit warm on lower faces -->
  <g fill="#C05A32">
    <path d="M0 0 H1280 V26 H0 Z" fill-opacity="0.55"/>
    <path d="M0 44 H1280 V78 H0 Z" fill-opacity="0.6"/>
    <path d="M20 96 H1260 V124 H20 Z" fill-opacity="0.65"/>
    <path d="M60 142 H1220 V166 H60 Z" fill-opacity="0.7"/>
    <path d="M110 182 H1170 V202 H110 Z" fill-opacity="0.75"/>
    <path d="M170 216 H1110 V232 H170 Z" fill-opacity="0.7"/>
    <path d="M240 244 H1040 V256 H240 Z" fill-opacity="0.6"/>
    <path d="M320 266 H960 V275 H320 Z" fill-opacity="0.5"/>
  </g>
  <g fill="#E7DCC3" fill-opacity="0.35">
    <path d="M110 198 H1170 V202 H110 Z"/><path d="M60 162 H1220 V166 H60 Z"/>
    <path d="M170 228 H1110 V232 H170 Z"/><path d="M240 252 H1040 V256 H240 Z"/>
  </g>

  <!-- lamp posts with 2700K glows -->
  <g>
    <rect x="356" y="418" width="8" height="150" fill="#22301F"/>
    <circle cx="360" cy="410" r="14" fill="#F5EFE2"/>
    <circle cx="360" cy="410" r="90" fill="url(#lamp)"/>
    <circle cx="360" cy="410" r="7" fill="#C05A32" fill-opacity="0.5"/>
  </g>
  <g>
    <rect x="896" y="392" width="8" height="140" fill="#22301F"/>
    <circle cx="900" cy="384" r="13" fill="#F5EFE2"/>
    <circle cx="900" cy="384" r="84" fill="url(#lamp)"/>
    <circle cx="900" cy="384" r="6" fill="#C05A32" fill-opacity="0.5"/>
  </g>
  <!-- festoon line under pergola -->
  <path d="M128 150 Q640 240 1152 150" stroke="#22301F" stroke-width="2.5" fill="none"/>
  <g fill="#F5EFE2">
    <circle cx="260" cy="176" r="5"/><circle cx="400" cy="198" r="5"/><circle cx="540" cy="212" r="5"/>
    <circle cx="680" cy="216" r="5"/><circle cx="820" cy="210" r="5"/><circle cx="960" cy="194" r="5"/>
    <circle cx="1090" cy="170" r="5"/>
  </g>
  <g fill="#E7DCC3" fill-opacity="0.3">
    <circle cx="260" cy="176" r="12"/><circle cx="540" cy="212" r="12"/><circle cx="820" cy="210" r="12"/>
    <circle cx="1090" cy="170" r="12"/>
  </g>

  <!-- cafe terrace glowing, left -->
  <path d="M0 340 H300 V500 H0 Z" fill="#22301F"/>
  <rect x="0" y="332" width="300" height="14" fill="#C05A32" fill-opacity="0.8"/>
  <rect x="18" y="366" width="70" height="58" fill="#F5EFE2" fill-opacity="0.85"/>
  <rect x="120" y="366" width="70" height="58" fill="#F5EFE2" fill-opacity="0.85"/>
  <rect x="222" y="366" width="60" height="90" fill="#E7DCC3" fill-opacity="0.5"/>
  <ellipse cx="150" cy="480" rx="190" ry="50" fill="url(#pool)" opacity="0.8"/>
  <g stroke="#22301F" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M120 542 h64 M152 542 v46"/>
  </g>
  <g fill="#22301F">
    <circle cx="102" cy="502" r="10"/>
    <path d="M92 514 q10 -6 20 0 l4 34 l-8 2 l-6 -22 l-6 22 l-8 -2 Z"/>
    <circle cx="204" cy="506" r="10"/>
    <path d="M194 518 q10 -6 20 0 l4 32 l-8 2 l-6 -20 l-6 20 l-8 -2 Z"/>
  </g>
  <rect x="0" y="500" width="310" height="26" fill="#22301F" fill-opacity="0.6"/>
  <g fill="#2F6B4A" fill-opacity="0.7">
    <circle cx="30" cy="496" r="14"/><circle cx="76" cy="490" r="17"/><circle cx="128" cy="496" r="13"/>
    <circle cx="180" cy="490" r="16"/><circle cx="232" cy="494" r="13"/><circle cx="282" cy="490" r="15"/>
  </g>

  <!-- midground ghaf silhouettes -->
  <g>
    <path d="M962 470 L955 336 M956 380 L924 338 M958 366 L992 330" stroke="#22301F" stroke-width="7" fill="none" stroke-linecap="round"/>
    <ellipse cx="954" cy="296" rx="108" ry="62" fill="#2F6B4A" fill-opacity="0.85"/>
    <ellipse cx="1006" cy="276" rx="58" ry="40" fill="#2F6B4A" fill-opacity="0.6"/>
  </g>
  <g>
    <path d="M418 428 L414 336 M415 366 L392 340 M416 358 L440 334" stroke="#22301F" stroke-width="5" fill="none" stroke-linecap="round"/>
    <ellipse cx="414" cy="308" rx="72" ry="44" fill="#2F6B4A" fill-opacity="0.8"/>
  </g>
  <!-- uplights at tree bases -->
  <ellipse cx="954" cy="450" rx="60" ry="16" fill="url(#pool)" opacity="0.7"/>
  <ellipse cx="416" cy="420" rx="46" ry="12" fill="url(#pool)" opacity="0.6"/>

  <!-- bike racks, right -->
  <g stroke="#22301F" stroke-width="5" fill="none" stroke-linecap="round" stroke-opacity="0.9">
    <path d="M1010 470 a24 24 0 0 1 48 0 v24 M1010 494 v-24"/>
    <path d="M1080 476 a24 24 0 0 1 48 0 v24 M1080 500 v-24"/>
  </g>

  <!-- sparkle inlay catching lamplight -->
  <use href="#sp" transform="translate(560 600) scale(4.6)" fill="#C05A32"/>
  <use href="#sp" transform="translate(560 600) scale(4.6)" fill="#F5EFE2" fill-opacity="0.25"/>
  <use href="#sp" transform="translate(452 648) scale(1.7)" fill="#7CC98F"/>
  <use href="#sp" transform="translate(676 656) scale(1.5)" fill="#7BC6DD"/>

  <!-- evening strollers -->
  <g fill="#22301F">
    <path d="M690 402 q7 -16 0 -30 q-3 -8 4 -10 a9 9 0 1 1 6 1 q8 3 6 14 l-2 26 l7 34 h-8 l-7 -30 l-5 30 h-8 Z"/>
    <path d="M726 406 q-5 -18 1 -32 q-2 -8 5 -9 a8 8 0 1 1 6 1 q7 4 5 15 l1 25 l8 30 h-8 l-8 -26 l-3 26 h-8 Z"/>
    <path d="M1062 420 q6 -14 1 -26 q-3 -7 4 -9 a8 8 0 1 1 5 1 q7 3 5 13 l-1 22 l6 28 h-7 l-6 -24 l-4 24 h-7 Z"/>
  </g>

  <!-- cool night stipple -->
  <g fill="#4E8FA8" fill-opacity="0.2">
    <circle cx="240" cy="640" r="3"/><circle cx="760" cy="700" r="2.5"/><circle cx="1120" cy="600" r="3"/>
    <circle cx="500" cy="690" r="2.5"/><circle cx="1020" cy="680" r="2.5"/>
  </g>
  <g fill="#E7DCC3" fill-opacity="0.18">
    <circle cx="420" cy="600" r="2.5"/><circle cx="640" cy="560" r="2.5"/><circle cx="860" cy="600" r="2.5"/>
    <circle cx="320" cy="520" r="2"/><circle cx="950" cy="560" r="2"/>
  </g>
</svg>
