    <path d="M622 436 q-5 -18 1 -32 q-2 -8 5 -9 a8 8 0 1 1 6 1 q7 4 5 15 l1 25 l8 28 h-8 l-8 -24 l-3 24 h-8 Z"/>
    <path d="M636 418 q4 -10 1 -18 q-2 -5 3 -6 a6 6 0 1 1 4 1 q5 2 4 10 l0 14 l5 18 h-6 l-5 -14 l-3 14 h-6 Z" transform="translate(22 26)"/>
    <path d="M905 448 q6 -14 1 -26 q-3 -7 4 -9 a8 8 0 1 1 5 1 q7 3 5 13 l-1 22 l6 27 h-7 l-6 -23 l-4 23 h-7 Z"/>
