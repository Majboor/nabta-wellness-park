<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5EFE2"/>
      <stop offset="1" stop-color="#E7DCC3"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4E8FA8" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#4E8FA8"/>
    </linearGradient>
    <pattern id="stip" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="1.2" fill="#22301F" opacity="0.10"/>
      <circle cx="12" cy="12" r="1" fill="#22301F" opacity="0.08"/>
    </pattern>
    <g id="spark">
      <path d="M0,-10 C1.5,-3 3,-1.5 10,0 C3,1.5 1.5,3 0,10 C-1.5,3 -3,1.5 -10,0 C-3,-1.5 -1.5,-3 0,-10 Z"/>
    </g>
    <g id="reed">
      <path d="M0,0 C-2,-20 -6,-34 -10,-46 M2,0 C3,-24 6,-40 12,-52 M-4,0 C-6,-18 -12,-28 -18,-36 M6,0 C9,-20 14,-30 20,-40"
            stroke="#2F6B4A" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M-1,0 C0,-22 2,-38 4,-50 M4,0 C6,-16 10,-24 16,-32"
            stroke="#A9C6A0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="-10" cy="-48" rx="2.5" ry="6" fill="#22301F" opacity="0.7"/>
      <ellipse cx="12" cy="-54" rx="2.5" ry="6" fill="#22301F" opacity="0.7"/>
    </g>
    <g id="dfly">
      <line x1="0" y1="0" x2="14" y2="-3" stroke="#22301F" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="4" cy="-6" rx="8" ry="3" fill="#7BC6DD" opacity="0.75" transform="rotate(-28 4 -6)"/>
      <ellipse cx="6" cy="2" rx="8" ry="3" fill="#7BC6DD" opacity="0.55" transform="rotate(24 6 2)"/>
    </g>
  </defs>

  <!-- sky -->
  <rect width="1280" height="720" fill="url(#sky)"/>
  <circle cx="330" cy="120" r="64" fill="#F5EFE2" opacity="0.9"/>
  <circle cx="330" cy="120" r="100" fill="#F5EFE2" opacity="0.3"/>

  <!-- far bank tree line -->
  <ellipse cx="180" cy="330" rx="300" ry="56" fill="#A9C6A0" opacity="0.5"/>
  <ellipse cx="620" cy="338" rx="320" ry="46" fill="#A9C6A0" opacity="0.4"/>
  <g stroke="#22301F" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M150,440 C145,392 132,358 115,326 M150,440 C158,395 175,362 196,336"/>
    <path d="M520,430 C516,392 506,364 492,338 M520,430 C526,394 538,368 554,346"/>
  </g>
  <g fill="#2F6B4A">
    <ellipse cx="140" cy="308" rx="105" ry="30"/>
    <ellipse cx="200" cy="332" rx="76" ry="23" fill="#A9C6A0" opacity="0.9"/>
    <ellipse cx="95" cy="338" rx="60" ry="18" opacity="0.85"/>
    <ellipse cx="515" cy="322" rx="88" ry="26"/>
    <ellipse cx="565" cy="342" rx="62" ry="19" fill="#A9C6A0" opacity="0.9"/>
  </g>

  <!-- ground -->
  <rect x="0" y="392" width="1280" height="328" fill="#E7DCC3"/>
  <rect x="0" y="392" width="1280" height="328" fill="url(#stip)"/>

  <!-- far bank strip -->
  <path d="M0,392 L1280,392 L1280,430 C960,420 520,438 0,428 Z" fill="#CFC0A0" opacity="0.6"/>

  <!-- wadi water alongside, sweeping from left foreground -->
  <path d="M0,720 L0,470 C240,448 470,462 640,452 C830,441 900,430 1010,424 L1010,442 C880,452 800,466 640,478 C460,492 260,520 130,600 C60,644 20,684 0,720 Z"
        fill="url(#water)"/>
  <g stroke="#7BC6DD" stroke-width="5" stroke-linecap="round" opacity="0.6">
    <path d="M60,620 C130,570 210,540 300,520"/>
    <path d="M420,498 h130 M700,462 h110"/>
  </g>
  <g stroke="#F5EFE2" stroke-width="3" stroke-linecap="round" opacity="0.55">
    <path d="M150,600 C210,566 260,548 330,532 M520,486 h80 M840,448 h70"/>
  </g>
  <!-- water ripple rings -->
  <g fill="none" stroke="#7BC6DD" stroke-width="2.5" opacity="0.5">
    <ellipse cx="250" cy="560" rx="30" ry="8"/>
    <ellipse cx="250" cy="560" rx="52" ry="14"/>
  </g>

  <!-- bank path on the right, running along the water -->
  <path d="M360,720 L580,470 C600,448 640,444 700,442 L860,436 C880,435 890,438 880,444 L740,470 C700,478 660,500 620,548 C560,620 500,676 460,720 Z"
        fill="#CFC0A0"/>
  <path d="M360,720 L580,470 C600,448 640,444 700,442 L860,436 C880,435 890,438 880,444 L740,470 C700,478 660,500 620,548 C560,620 500,676 460,720 Z"
        fill="url(#stip)"/>

  <!-- pergola overhead: terracotta slats casting striped shade -->
  <g stroke="#C05A32" stroke-width="26" stroke-linecap="round">
    <line x1="1150" y1="-30" x2="700" y2="-30"/>
  </g>
  <g stroke="#C05A32" stroke-linecap="round">
    <line x1="1240" y1="720" x2="1240" y2="180" stroke-width="26"/>
    <line x1="960" y1="330" x2="960" y2="180" stroke-width="14"/>
    <line x1="1240" y1="190" x2="820" y2="60" stroke-width="16"/>
  </g>
  <g stroke="#C05A32" stroke-width="12" stroke-linecap="round" opacity="0.9">
    <line x1="1280" y1="60" x2="1030" y2="-10"/>
    <line x1="1280" y1="150" x2="950" y2="30"/>
    <line x1="1280" y1="245" x2="880" y2="80"/>
    <line x1="1225" y1="330" x2="830" y2="130"/>
    <line x1="1120" y1="380" x2="800" y2="180"/>
  </g>
  <!-- slat shadows raking across the path -->
  <g fill="#22301F" opacity="0.10">
    <path d="M540,720 L700,520 L740,520 L600,720 Z"/>
    <path d="M660,720 L790,540 L826,540 L720,720 Z"/>
    <path d="M790,700 L880,560 L910,560 L840,700 Z" opacity="0.8"/>
    <path d="M620,560 L700,460 L730,460 L660,556 Z"/>
  </g>

  <!-- bench with elder at the path edge -->
  <g>
    <rect x="905" y="470" width="128" height="10" rx="5" fill="#C05A32"/>
    <line x1="922" y1="480" x2="922" y2="516" stroke="#C05A32" stroke-width="7"/>
    <line x1="1016" y1="480" x2="1016" y2="516" stroke="#C05A32" stroke-width="7"/>
    <path d="M948,470 C946,448 948,434 958,426 C970,418 981,420 986,430 C991,440 989,456 987,470" fill="#22301F"/>
    <circle cx="965" cy="414" r="11" fill="#22301F"/>
    <line x1="990" y1="440" x2="1002" y2="472" stroke="#22301F" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- child crouched at the water edge, pointing -->
  <g stroke="#22301F" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M492,596 C494,576 500,564 512,558 M512,558 L544,566 M544,566 L572,584 M506,562 L484,546 M492,596 L470,614 M492,596 L508,622"/>
  </g>
  <circle cx="516" cy="548" r="11" fill="#22301F"/>

  <!-- boulders at the water edge -->
  <g fill="#E7DCC3" stroke="#22301F" stroke-opacity="0.25" stroke-width="3">
    <ellipse cx="300" cy="618" rx="78" ry="40"/>
    <ellipse cx="200" cy="656" rx="52" ry="30"/>
    <ellipse cx="668" cy="470" rx="36" ry="16"/>
  </g>
  <ellipse cx="300" cy="618" rx="78" ry="40" fill="url(#stip)"/>

  <!-- reeds and desert grasses -->
  <g transform="translate(120,700) scale(1.9)"><use href="#reed"/></g>
  <g transform="translate(390,660) scale(1.4)"><use href="#reed"/></g>
  <g transform="translate(620,510) scale(1.0)"><use href="#reed"/></g>
  <g transform="translate(760,468) scale(0.8)"><use href="#reed"/></g>
  <g transform="translate(880,700) scale(2.2)"><use href="#reed"/></g>
  <g transform="translate(1080,690) scale(1.9)"><use href="#reed"/></g>
  <g stroke="#A9C6A0" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M700,600 c2,-20 -3,-34 -10,-46 M714,600 c3,-22 9,-36 18,-48 M728,602 c1,-18 -3,-28 -7,-40"/>
    <path d="M1180,600 c2,-18 -2,-30 -8,-42 M1194,600 c3,-20 8,-32 16,-44"/>
  </g>

  <!-- dragonflies over the water -->
  <g transform="translate(360,520)"><use href="#dfly"/></g>
  <g transform="translate(560,470) scale(0.85) rotate(-10)"><use href="#dfly"/></g>
  <g transform="translate(180,590) scale(1.1) rotate(8)"><use href="#dfly"/></g>

  <!-- nabta sparkles -->
  <g fill="#7CC98F">
    <g transform="translate(450,300) scale(0.8)"><use href="#spark"/></g>
    <g transform="translate(1090,420) scale(0.6)"><use href="#spark"/></g>
  </g>
  <g fill="#7BC6DD">
    <g transform="translate(310,545) scale(0.6)"><use href="#spark"/></g>
    <g transform="translate(690,430) scale(0.5)"><use href="#spark"/></g>
  </g>
</svg>
