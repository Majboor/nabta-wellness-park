<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5EFE2"/>
      <stop offset="1" stop-color="#E7DCC3"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4E8FA8" stop-opacity="0.7"/>
      <stop offset="0.5" stop-color="#4E8FA8"/>
      <stop offset="1" stop-color="#4E8FA8"/>
    </linearGradient>
    <pattern id="stip" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="1.2" fill="#22301F" opacity="0.10"/>
      <circle cx="12" cy="12" r="1" fill="#22301F" opacity="0.08"/>
    </pattern>
    <g id="spark">
      <path d="M0,-10 C1.5,-3 3,-1.5 10,0 C3,1.5 1.5,3 0,10 C-1.5,3 -3,1.5 -10,0 C-3,-1.5 -1.5,-3 0,-10 Z"/>
    </g>
    <g id="reed">
      <path d="M0,0 C-2,-20 -6,-34 -10,-46 M2,0 C3,-24 6,-40 12,-52 M-4,0 C-6,-18 -12,-28 -18,-36 M6,0 C9,-20 14,-30 20,-40"
            stroke="#2F6B4A" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M-1,0 C0,-22 2,-38 4,-50 M4,0 C6,-16 10,-24 16,-32"
            stroke="#A9C6A0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="-10" cy="-48" rx="2.5" ry="6" fill="#22301F" opacity="0.7"/>
      <ellipse cx="12" cy="-54" rx="2.5" ry="6" fill="#22301F" opacity="0.7"/>
    </g>
    <g id="dfly">
      <line x1="0" y1="0" x2="14" y2="-3" stroke="#22301F" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="4" cy="-6" rx="8" ry="3" fill="#7BC6DD" opacity="0.75" transform="rotate(-28 4 -6)"/>
      <ellipse cx="6" cy="2" rx="8" ry="3" fill="#7BC6DD" opacity="0.55" transform="rotate(24 6 2)"/>
    </g>
  </defs>

  <!-- sky -->
  <rect width="1280" height="720" fill="url(#sky)"/>
  <circle cx="640" cy="180" r="56" fill="#F5EFE2" opacity="0.85"/>
  <circle cx="640" cy="180" r="92" fill="#F5EFE2" opacity="0.3"/>

  <!-- distant canopy horizon around the vanishing point -->
  <ellipse cx="330" cy="320" rx="300" ry="46" fill="#A9C6A0" opacity="0.5"/>
  <ellipse cx="950" cy="322" rx="310" ry="48" fill="#A9C6A0" opacity="0.5"/>
  <g fill="#2F6B4A" opacity="0.9">
    <ellipse cx="360" cy="306" rx="120" ry="26"/>
    <ellipse cx="520" cy="318" rx="80" ry="18" fill="#A9C6A0"/>
    <ellipse cx="900" cy="308" rx="115" ry="25"/>
    <ellipse cx="770" cy="318" rx="76" ry="17" fill="#A9C6A0"/>
    <ellipse cx="1090" cy="318" rx="90" ry="20"/>
    <ellipse cx="180" cy="316" rx="90" ry="20"/>
  </g>

  <!-- banks -->
  <rect x="0" y="330" width="1280" height="390" fill="#E7DCC3"/>
  <rect x="0" y="330" width="1280" height="390" fill="url(#stip)"/>
  <!-- loop path on the right bank, converging -->
  <path d="M1280,720 L1030,720 L740,368 L800,362 L1280,560 Z" fill="#CFC0A0" opacity="0.9"/>
  <path d="M1280,720 L1030,720 L740,368 L800,362 L1280,560 Z" fill="url(#stip)"/>

  <!-- wadi channel rushing to the vanishing point, meandering -->
  <path d="M300,720 C420,600 380,480 500,410 C580,362 610,352 632,338 L668,338 C700,356 740,380 760,430 C790,500 840,600 980,720 Z"
        fill="url(#water)"/>
  <!-- inner channel bank shadows -->
  <path d="M300,720 C420,600 380,480 500,410 C580,362 610,352 632,338" fill="none" stroke="#22301F" stroke-width="6" opacity="0.25"/>
  <path d="M980,720 C840,600 790,500 760,430 C740,380 700,356 668,338" fill="none" stroke="#22301F" stroke-width="6" opacity="0.25"/>
  <!-- speed streaks on the water -->
  <g stroke="#7BC6DD" stroke-linecap="round" opacity="0.65">
    <path d="M560,700 C600,600 590,520 620,450" stroke-width="7" fill="none"/>
    <path d="M700,690 C690,600 680,500 660,430" stroke-width="6" fill="none"/>
    <path d="M470,650 C520,560 520,500 560,440" stroke-width="4" fill="none"/>
  </g>
  <g stroke="#F5EFE2" stroke-linecap="round" opacity="0.6">
    <path d="M620,720 C640,620 636,520 640,420" stroke-width="4" fill="none"/>
    <path d="M540,560 C570,500 590,460 610,410" stroke-width="2.5" fill="none"/>
    <path d="M760,600 C740,520 720,470 700,420" stroke-width="2.5" fill="none"/>
  </g>

  <!-- terracotta bridge arcing over the channel ahead -->
  <path d="M520,392 C580,352 720,352 780,392 L780,414 C720,378 580,378 520,414 Z" fill="#C05A32"/>
  <path d="M520,392 C580,352 720,352 780,392" fill="none" stroke="#22301F" stroke-width="3" opacity="0.35"/>
  <g stroke="#C05A32" stroke-width="3.5" stroke-linecap="round">
    <line x1="545" y1="384" x2="545" y2="366"/><line x1="580" y1="374" x2="580" y2="356"/>
    <line x1="618" y1="368" x2="618" y2="350"/><line x1="656" y1="366" x2="656" y2="348"/>
    <line x1="694" y1="368" x2="694" y2="350"/><line x1="732" y1="374" x2="732" y2="356"/>
    <line x1="758" y1="382" x2="758" y2="364"/>
  </g>
  <path d="M534,362 C600,330 700,330 766,362" fill="none" stroke="#C05A32" stroke-width="5" stroke-linecap="round"/>
  <!-- tiny figures on the bridge: child pointing down at the water -->
  <g stroke="#22301F" stroke-width="3.5" stroke-linecap="round" fill="none">
    <path d="M600,356 C600,346 600,340 600,334 M600,338 L611,346 M600,340 L590,346 M600,356 L595,364 M600,356 L606,364"/>
  </g>
  <circle cx="600" cy="328" r="6" fill="#22301F"/>
  <g stroke="#22301F" stroke-width="3.5" stroke-linecap="round" fill="none">
    <path d="M646,354 C646,344 646,338 646,330 M646,336 L637,344 M646,336 L655,342"/>
  </g>
  <circle cx="646" cy="324" r="6.5" fill="#22301F"/>

  <!-- pergola slats sweeping past on the right -->
  <g stroke="#C05A32" stroke-linecap="round">
    <line x1="1245" y1="720" x2="1245" y2="120" stroke-width="24"/>
    <line x1="1080" y1="560" x2="1080" y2="230" stroke-width="14"/>
    <line x1="965" y1="470" x2="965" y2="270" stroke-width="9"/>
    <line x1="890" y1="420" x2="890" y2="292" stroke-width="6"/>
  </g>
  <g stroke="#C05A32" stroke-width="8" stroke-linecap="round" opacity="0.85">
    <line x1="1280" y1="100" x2="870" y2="290"/>
    <line x1="1280" y1="210" x2="880" y2="310"/>
    <line x1="1280" y1="330" x2="905" y2="335"/>
  </g>
  <!-- slat shade on the right bank -->
  <g fill="#22301F" opacity="0.10">
    <path d="M1080,720 L940,420 L975,415 L1140,720 Z"/>
    <path d="M1220,700 L1040,400 L1072,396 L1270,690 Z"/>
  </g>

  <!-- ghaf trees whipping past left -->
  <g stroke="#22301F" stroke-width="9" fill="none" stroke-linecap="round">
    <path d="M120,640 C112,540 92,470 60,400 M120,640 C132,545 160,478 200,420"/>
  </g>
  <g fill="#2F6B4A">
    <ellipse cx="95" cy="392" rx="140" ry="42"/>
    <ellipse cx="185" cy="424" rx="95" ry="30" fill="#A9C6A0" opacity="0.9"/>
    <ellipse cx="30" cy="430" rx="80" ry="26" opacity="0.85"/>
  </g>
  <g stroke="#22301F" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M330,470 C326,428 316,398 302,372 M330,470 C336,430 348,404 364,382"/>
  </g>
  <g fill="#2F6B4A">
    <ellipse cx="322" cy="360" rx="78" ry="22"/>
    <ellipse cx="368" cy="378" rx="52" ry="16" fill="#A9C6A0" opacity="0.9"/>
  </g>

  <!-- boulders and reeds along the banks -->
  <g fill="#E7DCC3" stroke="#22301F" stroke-opacity="0.25" stroke-width="3">
    <ellipse cx="390" cy="620" rx="70" ry="36"/>
    <ellipse cx="880" cy="560" rx="48" ry="24"/>
    <ellipse cx="540" cy="450" rx="26" ry="12"/>
  </g>
  <ellipse cx="390" cy="620" rx="70" ry="36" fill="url(#stip)"/>
  <g transform="translate(230,700) scale(2.0)"><use href="#reed"/></g>
  <g transform="translate(460,560) scale(1.3)"><use href="#reed"/></g>
  <g transform="translate(560,430) scale(0.8)"><use href="#reed"/></g>
  <g transform="translate(720,430) scale(0.7)"><use href="#reed"/></g>
  <g transform="translate(830,520) scale(1.1)"><use href="#reed"/></g>
  <g transform="translate(1000,660) scale(1.9)"><use href="#reed"/></g>
  <g transform="translate(90,690) scale(1.6)"><use href="#reed"/></g>

  <!-- dragonflies scattering ahead of the drone -->
  <g transform="translate(430,480) rotate(-15)"><use href="#dfly"/></g>
  <g transform="translate(700,470) scale(0.8) rotate(20)"><use href="#dfly"/></g>
  <g transform="translate(590,540) scale(1.2)"><use href="#dfly"/></g>

  <!-- nabta sparkles -->
  <g fill="#7CC98F">
    <g transform="translate(500,300) scale(0.7)"><use href="#spark"/></g>
    <g transform="translate(820,260) scale(0.55)"><use href="#spark"/></g>
  </g>
  <g fill="#7BC6DD">
    <g transform="translate(640,470) scale(0.6)"><use href="#spark"/></g>
    <g transform="translate(360,560) scale(0.5)"><use href="#spark"/></g>
  </g>

  <!-- translucent motion vignette -->
  <path d="M0,0 L120,0 L40,720 L0,720 Z" fill="#F5EFE2" opacity="0.25"/>
  <path d="M1280,0 L1160,0 L1240,720 L1280,720 Z" fill="#F5EFE2" opacity="0.25"/>
</svg>
