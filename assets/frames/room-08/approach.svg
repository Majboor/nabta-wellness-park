<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5EFE2"/>
      <stop offset="1" stop-color="#E7DCC3"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7BC6DD" stop-opacity="0.6"/>
      <stop offset="0.25" stop-color="#4E8FA8"/>
      <stop offset="1" stop-color="#4E8FA8"/>
    </linearGradient>
    <pattern id="stip" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="1.2" fill="#22301F" opacity="0.10"/>
      <circle cx="12" cy="12" r="1" fill="#22301F" opacity="0.08"/>
    </pattern>
    <g id="spark">
      <path d="M0,-10 C1.5,-3 3,-1.5 10,0 C3,1.5 1.5,3 0,10 C-1.5,3 -3,1.5 -10,0 C-3,-1.5 -1.5,-3 0,-10 Z"/>
    </g>
    <g id="reed">
      <path d="M0,0 C-2,-20 -6,-34 -10,-46 M2,0 C3,-24 6,-40 12,-52 M-4,0 C-6,-18 -12,-28 -18,-36 M6,0 C9,-20 14,-30 20,-40"
            stroke="#2F6B4A" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M-1,0 C0,-22 2,-38 4,-50 M4,0 C6,-16 10,-24 16,-32"
            stroke="#A9C6A0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="-10" cy="-48" rx="2.5" ry="6" fill="#22301F" opacity="0.7"/>
      <ellipse cx="12" cy="-54" rx="2.5" ry="6" fill="#22301F" opacity="0.7"/>
    </g>
    <g id="dfly">
      <line x1="0" y1="0" x2="14" y2="-3" stroke="#22301F" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="4" cy="-6" rx="8" ry="3" fill="#7BC6DD" opacity="0.75" transform="rotate(-28 4 -6)"/>
      <ellipse cx="6" cy="2" rx="8" ry="3" fill="#7BC6DD" opacity="0.55" transform="rotate(24 6 2)"/>
    </g>
  </defs>

  <!-- sky -->
  <rect width="1280" height="720" fill="url(#sky)"/>
  <circle cx="1030" cy="130" r="70" fill="#F5EFE2" opacity="0.9"/>
  <circle cx="1030" cy="130" r="110" fill="#F5EFE2" opacity="0.35"/>

  <!-- distant tree band -->
  <ellipse cx="180" cy="322" rx="260" ry="52" fill="#A9C6A0" opacity="0.55"/>
  <ellipse cx="560" cy="330" rx="300" ry="44" fill="#A9C6A0" opacity="0.45"/>
  <ellipse cx="1120" cy="326" rx="280" ry="50" fill="#A9C6A0" opacity="0.55"/>
  <!-- ghaf trees flanking the bridge -->
  <g stroke="#22301F" stroke-width="7" fill="none" stroke-linecap="round">
    <path d="M215,470 C210,410 195,370 175,330 M215,470 C222,415 240,375 262,345"/>
    <path d="M1070,470 C1075,415 1090,375 1112,340 M1070,470 C1063,418 1048,382 1026,352"/>
  </g>
  <g fill="#2F6B4A">
    <ellipse cx="185" cy="312" rx="120" ry="34"/>
    <ellipse cx="255" cy="336" rx="86" ry="26" fill="#A9C6A0" opacity="0.9"/>
    <ellipse cx="150" cy="345" rx="70" ry="20" opacity="0.85"/>
    <ellipse cx="1095" cy="318" rx="115" ry="33"/>
    <ellipse cx="1030" cy="342" rx="80" ry="24" fill="#A9C6A0" opacity="0.9"/>
    <ellipse cx="1160" cy="348" rx="66" ry="19" opacity="0.85"/>
  </g>

  <!-- mid ground -->
  <rect x="0" y="380" width="1280" height="340" fill="#E7DCC3"/>
  <rect x="0" y="380" width="1280" height="340" fill="url(#stip)"/>

  <!-- pergola run on the right, along the far bank -->
  <g stroke="#C05A32" stroke-width="8" stroke-linecap="round">
    <line x1="905" y1="415" x2="905" y2="330"/>
    <line x1="985" y1="418" x2="985" y2="326"/>
    <line x1="1070" y1="422" x2="1070" y2="322"/>
    <line x1="1160" y1="428" x2="1160" y2="318"/>
  </g>
  <g stroke="#C05A32" stroke-width="5" stroke-linecap="round" opacity="0.9">
    <line x1="880" y1="332" x2="1200" y2="318"/>
    <line x1="892" y1="344" x2="1212" y2="330"/>
  </g>
  <g stroke="#C05A32" stroke-width="4" stroke-linecap="round" opacity="0.65">
    <line x1="900" y1="322" x2="912" y2="352"/><line x1="936" y1="320" x2="948" y2="350"/>
    <line x1="972" y1="319" x2="984" y2="349"/><line x1="1008" y1="318" x2="1020" y2="347"/>
    <line x1="1044" y1="316" x2="1056" y2="346"/><line x1="1080" y1="315" x2="1092" y2="345"/>
    <line x1="1116" y1="314" x2="1128" y2="343"/><line x1="1152" y1="312" x2="1164" y2="342"/>
  </g>

  <!-- wadi water band -->
  <path d="M0,470 C220,450 420,466 640,462 C880,458 1080,446 1280,458 L1280,560 C1040,548 820,566 600,562 C380,558 180,572 0,560 Z"
        fill="url(#water)"/>
  <g stroke="#7BC6DD" stroke-width="4" stroke-linecap="round" opacity="0.6">
    <path d="M140,505 h90 M320,520 h70 M760,505 h100 M1010,516 h80"/>
  </g>
  <g stroke="#F5EFE2" stroke-width="2.5" stroke-linecap="round" opacity="0.55">
    <path d="M220,532 h60 M540,498 h70 M900,534 h56"/>
  </g>

  <!-- terracotta bridge arcing over the wadi -->
  <path d="M400,470 C520,388 760,388 880,470 L880,520 C760,436 520,436 400,520 Z" fill="#C05A32"/>
  <path d="M400,470 C520,388 760,388 880,470" fill="none" stroke="#22301F" stroke-width="5" opacity="0.35"/>
  <path d="M412,500 C524,420 756,420 868,500" fill="none" stroke="#F5EFE2" stroke-width="3" opacity="0.35"/>
  <!-- bridge slat parapet -->
  <g stroke="#C05A32" stroke-width="5" stroke-linecap="round">
    <line x1="440" y1="452" x2="440" y2="418"/><line x1="490" y1="436" x2="490" y2="402"/>
    <line x1="545" y1="424" x2="545" y2="391"/><line x1="600" y1="417" x2="600" y2="384"/>
    <line x1="655" y1="415" x2="655" y2="382"/><line x1="710" y1="418" x2="710" y2="385"/>
    <line x1="765" y1="426" x2="765" y2="393"/><line x1="820" y1="438" x2="820" y2="404"/>
  </g>
  <path d="M428,414 C540,352 740,352 852,414" fill="none" stroke="#C05A32" stroke-width="7" stroke-linecap="round"/>
  <!-- bridge reflection -->
  <path d="M420,545 C540,600 740,600 860,545" fill="none" stroke="#C05A32" stroke-width="10" opacity="0.25"/>

  <!-- foreground path arriving at the bridge -->
  <path d="M520,720 L620,538 C630,522 650,522 660,538 L780,720 Z" fill="#CFC0A0"/>
  <path d="M520,720 L620,538 C630,522 650,522 660,538 L780,720 Z" fill="url(#stip)"/>
  <g fill="#22301F" opacity="0.12">
    <ellipse cx="640" cy="690" rx="90" ry="8"/>
    <ellipse cx="642" cy="620" rx="60" ry="6"/>
    <ellipse cx="641" cy="570" rx="38" ry="5"/>
  </g>

  <!-- near banks: boulders, reeds, grasses -->
  <g fill="#E7DCC3" stroke="#22301F" stroke-opacity="0.25" stroke-width="3">
    <ellipse cx="330" cy="596" rx="66" ry="34"/>
    <ellipse cx="255" cy="622" rx="42" ry="24"/>
    <ellipse cx="960" cy="608" rx="72" ry="36"/>
  </g>
  <ellipse cx="330" cy="596" rx="66" ry="34" fill="url(#stip)"/>
  <ellipse cx="960" cy="608" rx="72" ry="36" fill="url(#stip)"/>
  <g transform="translate(150,660) scale(1.6)"><use href="#reed"/></g>
  <g transform="translate(420,640) scale(1.3)"><use href="#reed"/></g>
  <g transform="translate(860,650) scale(1.5)"><use href="#reed"/></g>
  <g transform="translate(1120,668) scale(1.8)"><use href="#reed"/></g>
  <g transform="translate(1010,560) scale(1.0)"><use href="#reed"/></g>
  <g stroke="#A9C6A0" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M470,700 c2,-18 -2,-30 -8,-42 M482,700 c3,-20 8,-32 16,-44 M494,702 c1,-16 -3,-26 -6,-36"/>
    <path d="M790,690 c2,-18 -2,-30 -8,-42 M802,690 c3,-20 8,-32 16,-44"/>
  </g>

  <!-- child on the near bank pointing at the water -->
  <g stroke="#22301F" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M470,610 C468,586 468,570 470,556 M470,556 L444,540 M470,562 L488,578 M470,610 L458,644 M470,610 L482,644"/>
  </g>
  <circle cx="471" cy="544" r="11" fill="#22301F"/>

  <!-- elder resting on a bench under the pergola -->
  <g>
    <rect x="1000" y="428" width="96" height="8" rx="4" fill="#C05A32"/>
    <line x1="1012" y1="436" x2="1012" y2="462" stroke="#C05A32" stroke-width="6"/>
    <line x1="1084" y1="436" x2="1084" y2="462" stroke="#C05A32" stroke-width="6"/>
    <path d="M1032,428 C1030,412 1032,400 1040,392 C1050,386 1058,388 1062,396 C1066,404 1064,416 1062,428"
          fill="#22301F"/>
    <circle cx="1046" cy="382" r="9" fill="#22301F"/>
    <line x1="1066" y1="404" x2="1076" y2="430" stroke="#22301F" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- dragonflies -->
  <g transform="translate(560,470)"><use href="#dfly"/></g>
  <g transform="translate(830,500) scale(0.8)"><use href="#dfly"/></g>
  <g transform="translate(300,520) scale(0.9) rotate(12)"><use href="#dfly"/></g>

  <!-- nabta sparkles -->
  <g fill="#7CC98F">
    <g transform="translate(700,300) scale(0.9)"><use href="#spark"/></g>
    <g transform="translate(380,250) scale(0.6)"><use href="#spark"/></g>
  </g>
  <g fill="#7BC6DD">
    <g transform="translate(590,505) scale(0.6)"><use href="#spark"/></g>
    <g transform="translate(1160,480) scale(0.5)"><use href="#spark"/></g>
  </g>
</svg>
