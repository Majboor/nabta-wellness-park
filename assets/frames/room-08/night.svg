<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <linearGradient id="nsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22301F"/>
      <stop offset="0.75" stop-color="#22301F"/>
      <stop offset="1" stop-color="#2F6B4A" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="nwater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4E8FA8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4E8FA8" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F5EFE2" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#F5EFE2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E7DCC3" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#E7DCC3" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#E7DCC3" stop-opacity="0"/>
    </radialGradient>
    <pattern id="stip" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="1.2" fill="#22301F" opacity="0.22"/>
      <circle cx="12" cy="12" r="1" fill="#22301F" opacity="0.16"/>
    </pattern>
    <g id="spark">
      <path d="M0,-10 C1.5,-3 3,-1.5 10,0 C3,1.5 1.5,3 0,10 C-1.5,3 -3,1.5 -10,0 C-3,-1.5 -1.5,-3 0,-10 Z"/>
    </g>
    <g id="reedN">
      <path d="M0,0 C-2,-20 -6,-34 -10,-46 M2,0 C3,-24 6,-40 12,-52 M-4,0 C-6,-18 -12,-28 -18,-36 M6,0 C9,-20 14,-30 20,-40"
            stroke="#22301F" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M-1,0 C0,-22 2,-38 4,-50 M4,0 C6,-16 10,-24 16,-32"
            stroke="#2F6B4A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="-10" cy="-48" rx="2.5" ry="6" fill="#22301F"/>
      <ellipse cx="12" cy="-54" rx="2.5" ry="6" fill="#22301F"/>
    </g>
  </defs>

  <!-- night sky -->
  <rect width="1280" height="720" fill="url(#nsky)"/>
  <!-- stars -->
  <g fill="#F5EFE2">
    <circle cx="150" cy="70" r="2"/><circle cx="420" cy="40" r="1.6"/><circle cx="620" cy="110" r="1.4"/>
    <circle cx="820" cy="60" r="1.8"/><circle cx="980" cy="150" r="1.4"/><circle cx="1180" cy="80" r="2"/>
    <circle cx="720" cy="200" r="1.2"/><circle cx="240" cy="180" r="1.3"/><circle cx="1080" cy="230" r="1.2"/>
  </g>
  <!-- moon -->
  <circle cx="330" cy="120" r="130" fill="url(#moonGlow)"/>
  <circle cx="330" cy="120" r="46" fill="#F5EFE2"/>
  <circle cx="316" cy="112" r="8" fill="#E7DCC3" opacity="0.7"/>
  <circle cx="344" cy="134" r="6" fill="#E7DCC3" opacity="0.6"/>

  <!-- far bank tree line, dark masses -->
  <ellipse cx="180" cy="330" rx="300" ry="56" fill="#2F6B4A" opacity="0.45"/>
  <ellipse cx="620" cy="338" rx="320" ry="46" fill="#2F6B4A" opacity="0.4"/>
  <g stroke="#22301F" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M150,440 C145,392 132,358 115,326 M150,440 C158,395 175,362 196,336"/>
    <path d="M520,430 C516,392 506,364 492,338 M520,430 C526,394 538,368 554,346"/>
  </g>
  <g fill="#2F6B4A" opacity="0.85">
    <ellipse cx="140" cy="308" rx="105" ry="30"/>
    <ellipse cx="200" cy="332" rx="76" ry="23" fill="#A9C6A0" opacity="0.25"/>
    <ellipse cx="95" cy="338" rx="60" ry="18"/>
    <ellipse cx="515" cy="322" rx="88" ry="26"/>
    <ellipse cx="565" cy="342" rx="62" ry="19" fill="#A9C6A0" opacity="0.25"/>
  </g>

  <!-- ground, dimmed -->
  <rect x="0" y="392" width="1280" height="328" fill="#E7DCC3" opacity="0.45"/>
  <rect x="0" y="392" width="1280" height="328" fill="url(#stip)"/>

  <!-- far bank strip -->
  <path d="M0,392 L1280,392 L1280,430 C960,420 520,438 0,428 Z" fill="#CFC0A0" opacity="0.3"/>

  <!-- moonlit wadi water -->
  <path d="M0,720 L0,470 C240,448 470,462 640,452 C830,441 900,430 1010,424 L1010,442 C880,452 800,466 640,478 C460,492 260,520 130,600 C60,644 20,684 0,720 Z"
        fill="url(#nwater)"/>
  <!-- moon glints -->
  <g stroke="#7BC6DD" stroke-width="4" stroke-linecap="round" opacity="0.8">
    <path d="M60,620 C130,570 210,540 300,520"/>
    <path d="M420,498 h130 M700,462 h110"/>
  </g>
  <g stroke="#F5EFE2" stroke-width="2.5" stroke-linecap="round" opacity="0.8">
    <path d="M150,600 C210,566 260,548 330,532 M520,486 h80 M840,448 h70"/>
  </g>
  <!-- moon path on the water -->
  <g stroke="#F5EFE2" stroke-linecap="round" opacity="0.5">
    <path d="M230,640 h120" stroke-width="6"/>
    <path d="M270,610 h90" stroke-width="4"/>
    <path d="M300,580 h64" stroke-width="3"/>
  </g>
  <g fill="none" stroke="#7BC6DD" stroke-width="2.5" opacity="0.6">
    <ellipse cx="250" cy="560" rx="30" ry="8"/>
    <ellipse cx="250" cy="560" rx="52" ry="14"/>
  </g>

  <!-- bank path, washed by warm light -->
  <path d="M360,720 L580,470 C600,448 640,444 700,442 L860,436 C880,435 890,438 880,444 L740,470 C700,478 660,500 620,548 C560,620 500,676 460,720 Z"
        fill="#CFC0A0" opacity="0.75"/>
  <path d="M360,720 L580,470 C600,448 640,444 700,442 L860,436 C880,435 890,438 880,444 L740,470 C700,478 660,500 620,548 C560,620 500,676 460,720 Z"
        fill="url(#stip)"/>

  <!-- pergola overhead, dark terracotta against the night -->
  <g stroke="#C05A32" stroke-linecap="round" opacity="0.9">
    <line x1="1240" y1="720" x2="1240" y2="180" stroke-width="26"/>
    <line x1="960" y1="330" x2="960" y2="180" stroke-width="14"/>
    <line x1="1240" y1="190" x2="820" y2="60" stroke-width="16"/>
  </g>
  <g stroke="#C05A32" stroke-width="12" stroke-linecap="round" opacity="0.75">
    <line x1="1280" y1="60" x2="1030" y2="-10"/>
    <line x1="1280" y1="150" x2="950" y2="30"/>
    <line x1="1280" y1="245" x2="880" y2="80"/>
    <line x1="1225" y1="330" x2="830" y2="130"/>
    <line x1="1120" y1="380" x2="800" y2="180"/>
  </g>
  <g stroke="#22301F" stroke-width="12" stroke-linecap="round" opacity="0.35">
    <line x1="1280" y1="60" x2="1030" y2="-10"/>
    <line x1="1280" y1="150" x2="950" y2="30"/>
    <line x1="1280" y1="245" x2="880" y2="80"/>
  </g>

  <!-- warm path lights: low bollards along the bank path -->
  <g>
    <ellipse cx="596" cy="520" rx="90" ry="42" fill="url(#lampGlow)"/>
    <line x1="596" y1="520" x2="596" y2="488" stroke="#22301F" stroke-width="5"/>
    <circle cx="596" cy="484" r="6" fill="#F5EFE2"/>
    <ellipse cx="596" cy="524" rx="40" ry="8" fill="#E7DCC3" opacity="0.5"/>
  </g>
  <g>
    <ellipse cx="760" cy="466" rx="66" ry="30" fill="url(#lampGlow)"/>
    <line x1="760" y1="466" x2="760" y2="442" stroke="#22301F" stroke-width="4"/>
    <circle cx="760" cy="438" r="5" fill="#F5EFE2"/>
    <ellipse cx="760" cy="469" rx="30" ry="6" fill="#E7DCC3" opacity="0.5"/>
  </g>
  <g>
    <ellipse cx="470" cy="640" rx="110" ry="52" fill="url(#lampGlow)"/>
    <line x1="470" y1="640" x2="470" y2="600" stroke="#22301F" stroke-width="6"/>
    <circle cx="470" cy="594" r="7" fill="#F5EFE2"/>
    <ellipse cx="470" cy="646" rx="50" ry="10" fill="#E7DCC3" opacity="0.5"/>
  </g>

  <!-- bench with elder, silhouetted in lamp light -->
  <g>
    <ellipse cx="965" cy="480" rx="120" ry="46" fill="url(#lampGlow)" opacity="0.8"/>
    <rect x="905" y="470" width="128" height="10" rx="5" fill="#C05A32"/>
    <line x1="922" y1="480" x2="922" y2="516" stroke="#C05A32" stroke-width="7"/>
    <line x1="1016" y1="480" x2="1016" y2="516" stroke="#C05A32" stroke-width="7"/>
    <path d="M948,470 C946,448 948,434 958,426 C970,418 981,420 986,430 C991,440 989,456 987,470" fill="#22301F"/>
    <circle cx="965" cy="414" r="11" fill="#22301F"/>
    <line x1="990" y1="440" x2="1002" y2="472" stroke="#22301F" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- child at the water edge pointing at the moon path -->
  <g stroke="#22301F" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M492,596 C494,576 500,564 512,558 M512,558 L544,566 M544,566 L572,584 M506,562 L484,546 M492,596 L470,614 M492,596 L508,622"/>
  </g>
  <circle cx="516" cy="548" r="11" fill="#22301F"/>

  <!-- boulders, moon-edged -->
  <g fill="#22301F" opacity="0.75" stroke="#F5EFE2" stroke-opacity="0.3" stroke-width="2.5">
    <ellipse cx="300" cy="618" rx="78" ry="40"/>
    <ellipse cx="200" cy="656" rx="52" ry="30"/>
    <ellipse cx="668" cy="470" rx="36" ry="16"/>
  </g>

  <!-- reeds as silhouettes -->
  <g transform="translate(120,700) scale(1.9)"><use href="#reedN"/></g>
  <g transform="translate(390,660) scale(1.4)"><use href="#reedN"/></g>
  <g transform="translate(620,510) scale(1.0)"><use href="#reedN"/></g>
  <g transform="translate(760,468) scale(0.8)"><use href="#reedN"/></g>
  <g transform="translate(880,700) scale(2.2)"><use href="#reedN"/></g>
  <g transform="translate(1080,690) scale(1.9)"><use href="#reedN"/></g>

  <!-- night insects: pale wings over the water -->
  <g stroke="#7BC6DD" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <path d="M360,516 h12 M366,510 v12"/>
    <path d="M560,466 h10 M565,461 v10"/>
  </g>

  <!-- nabta sparkles: brighter at night -->
  <g fill="#7BC6DD">
    <g transform="translate(310,545) scale(0.7)"><use href="#spark"/></g>
    <g transform="translate(690,430) scale(0.55)"><use href="#spark"/></g>
    <g transform="translate(180,590) scale(0.5)"><use href="#spark"/></g>
  </g>
  <g fill="#7CC98F">
    <g transform="translate(450,300) scale(0.8)"><use href="#spark"/></g>
    <g transform="translate(1090,420) scale(0.6)"><use href="#spark"/></g>
  </g>
</svg>
