    <ellipse cx="800" cy="300" rx="230" ry="100" fill="#2F6B4A" fill-opacity="0.85"/>
    <ellipse cx="700" cy="330" rx="160" ry="74" fill="#2F6B4A" fill-opacity="0.7"/>
    <ellipse cx="890" cy="330" rx="170" ry="78" fill="#2F6B4A" fill-opacity="0.75"/>
    <ellipse cx="760" cy="280" rx="110" ry="50" fill="#A9C6A0" fill-opacity="0.6"/>
    <ellipse cx="870" cy="300" rx="90" ry="40" fill="#A9C6A0" fill-opacity="0.5"/>
    <ellipse cx="820" cy="256" rx="70" ry="30" fill="#7CC98F" fill-opacity="0.35"/>
    <!-- canopy shadow on plaza -->
    <ellipse cx="780" cy="520" rx="240" ry="52" fill="#22301F" fill-opacity="0.1"/>
  </g>

  <!-- understory planting, lush -->
  <ellipse cx="180" cy="560" rx="130" ry="34" fill="#A9C6A0" fill-opacity="0.65"/>
  <ellipse cx="1100" cy="580" rx="150" ry="38" fill="#A9C6A0" fill-opacity="0.65"/>
  <ellipse cx="420" cy="620" rx="100" ry="24" fill="#2F6B4A" fill-opacity="0.35"/>
  <ellipse cx="920" cy="630" rx="110" ry="26" fill="#2F6B4A" fill-opacity="0.35"/>
  <g stroke="#2F6B4A" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M150,586 q8,-40 22,-54 M186,584 q0,-34 -8,-48 M214,582 q10,-30 24,-38"/>
    <path d="M1070,606 q-8,-38 -20,-52 M1106,604 q4,-34 12,-46 M1140,600 q-2,-28 -10,-40"/>
  </g>

  <!-- people: same three figures across evolution frames -->
  <g fill="#22301F">
    <g>
      <circle cx="500" cy="470" r="10"/>
      <path d="M500,480 C 490,487 488,516 492,544 L 497,544 L 500,512 L 503,544 L 508,544 C 512,516 510,487 500,480 Z"/>
    </g>
    <g>
      <circle cx="540" cy="478" r="8"/>
      <path d="M540,486 C 532,492 531,514 534,534 L 538,534 L 540,514 L 542,534 L 546,534 C 549,514 548,492 540,486 Z"/>
    </g>
    <g>
      <circle cx="880" cy="424" r="9"/>
      <path d="M870,433 h20 l-2,30 h-16 Z"/>
    </g>
  </g>

  <!-- stipple -->
  <g fill="#22301F" fill-opacity="0.12">
    <circle cx="300" cy="660" r="3"/><circle cx="420" cy="690" r="3"/><circle cx="640" cy="668" r="3"/>
    <circle cx="860" cy="690" r="3"/><circle cx="1000" cy="656" r="3"/><circle cx="180" cy="620" r="2.5"/>
    <circle cx="740" cy="640" r="2.5"/><circle cx="540" cy="640" r="2.5"/>
  </g>
  <g fill="#F5EFE2" fill-opacity="0.55">
    <circle cx="700" cy="300" r="3"/><circle cx="860" cy="260" r="2.5"/><circle cx="760" cy="340" r="2.5"/>
  </g>

  <!-- nabta sparkles -->
  <use href="#sparkle" x="1000" y="170" fill="#7CC98F"/>
  <use href="#sparkle" x="450" y="200" fill="#7BC6DD" opacity="0.85"/>
</svg>
