<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <path id="sparkle" d="M0,-12 L2.8,-2.8 L12,0 L2.8,2.8 L0,12 L-2.8,2.8 L-12,0 L-2.8,-2.8 Z"/>
    <g id="ghaf-top">
      <ellipse cx="0" cy="0" rx="34" ry="26" fill="#2F6B4A" fill-opacity="0.85"/>
      <ellipse cx="-14" cy="-8" rx="18" ry="13" fill="#A9C6A0" fill-opacity="0.7"/>
      <ellipse cx="15" cy="6" rx="14" ry="10" fill="#A9C6A0" fill-opacity="0.5"/>
    </g>
  </defs>

  <!-- ground base -->
  <rect width="1280" height="720" fill="#E7DCC3"/>

  <!-- horizon haze band + distant city -->
  <rect width="1280" height="118" fill="#F5EFE2"/>
  <rect y="96" width="1280" height="30" fill="#F5EFE2" fill-opacity="0.55"/>
  <g fill="#22301F" fill-opacity="0.12">
    <rect x="52" y="46" width="26" height="66"/>
    <rect x="92" y="66" width="40" height="46"/>
    <rect x="176" y="34" width="20" height="78"/>
    <rect x="230" y="60" width="34" height="52"/>
    <rect x="948" y="42" width="24" height="70"/>
    <rect x="996" y="64" width="46" height="48"/>
    <rect x="1090" y="30" width="18" height="82"/>
    <rect x="1132" y="56" width="36" height="56"/>
    <rect x="1196" y="72" width="52" height="40"/>
  </g>
  <rect y="112" width="1280" height="10" fill="#22301F" fill-opacity="0.08"/>

  <!-- park lawn and planting masses -->
  <ellipse cx="330" cy="430" rx="360" ry="230" fill="#A9C6A0" fill-opacity="0.35"/>
  <ellipse cx="930" cy="430" rx="360" ry="240" fill="#A9C6A0" fill-opacity="0.35"/>
  <ellipse cx="640" cy="600" rx="520" ry="150" fill="#A9C6A0" fill-opacity="0.25"/>
  <ellipse cx="220" cy="250" rx="220" ry="90" fill="#2F6B4A" fill-opacity="0.18"/>
  <ellipse cx="1080" cy="240" rx="200" ry="80" fill="#2F6B4A" fill-opacity="0.18"/>

  <!-- wadi bioswale winding through the park -->
  <path d="M-30,640 C 180,560 340,660 520,610 C 700,562 800,660 980,616 C 1120,582 1220,630 1310,596"
        fill="none" stroke="#4E8FA8" stroke-width="30" stroke-linecap="round" stroke-opacity="0.75"/>
  <path d="M-30,640 C 180,560 340,660 520,610 C 700,562 800,660 980,616 C 1120,582 1220,630 1310,596"
        fill="none" stroke="#7BC6DD" stroke-width="9" stroke-linecap="round" stroke-opacity="0.7"/>
  <g fill="#2F6B4A" fill-opacity="0.5">
    <ellipse cx="240" cy="600" rx="26" ry="9"/>
    <ellipse cx="470" cy="628" rx="30" ry="10"/>
    <ellipse cx="760" cy="612" rx="26" ry="9"/>
    <ellipse cx="1060" cy="600" rx="28" ry="9"/>
  </g>

  <!-- the living shade loop: figure-eight path -->
  <ellipse cx="380" cy="420" rx="290" ry="180" fill="none" stroke="#CFC0A0" stroke-width="34"/>
  <ellipse cx="900" cy="400" rx="270" ry="170" fill="none" stroke="#CFC0A0" stroke-width="34"/>
  <ellipse cx="380" cy="420" rx="290" ry="180" fill="none" stroke="#F5EFE2" stroke-width="6" stroke-opacity="0.6"/>
  <ellipse cx="900" cy="400" rx="270" ry="170" fill="none" stroke="#F5EFE2" stroke-width="6" stroke-opacity="0.6"/>

  <!-- pergola shade segments along the loop (terracotta slats seen from above) -->
  <g stroke="#C05A32" stroke-width="8" stroke-linecap="round" stroke-opacity="0.85">
    <path d="M120,340 l-8,26 M148,320 l-8,26 M176,303 l-8,26 M206,288 l-8,26"/>
    <path d="M300,596 l6,-26 M334,604 l6,-26 M368,610 l6,-26 M402,614 l6,-26"/>
    <path d="M1050,540 l10,-24 M1082,522 l10,-24 M1112,502 l10,-24"/>
    <path d="M980,236 l4,26 M1014,240 l4,26 M1048,248 l4,26"/>
    <path d="M560,300 l-6,26 M590,290 l-6,26"/>
  </g>

  <!-- other garden rooms along the loop -->
  <g>
    <circle cx="160" cy="420" r="42" fill="#CFC0A0"/><circle cx="160" cy="420" r="42" fill="#A9C6A0" fill-opacity="0.35"/>
    <circle cx="380" cy="245" r="36" fill="#CFC0A0"/><use href="#ghaf-top" x="380" y="240"/>
    <circle cx="380" cy="596" r="38" fill="#CFC0A0"/><circle cx="380" cy="596" r="20" fill="#4E8FA8" fill-opacity="0.55"/>
    <circle cx="620" cy="330" r="30" fill="#CFC0A0"/><circle cx="620" cy="330" r="14" fill="#A9C6A0" fill-opacity="0.6"/>
    <circle cx="1140" cy="360" r="38" fill="#CFC0A0"/><use href="#ghaf-top" x="1140" y="356"/>
    <circle cx="1020" cy="556" r="34" fill="#CFC0A0"/><circle cx="1020" cy="556" r="16" fill="#7CC98F" fill-opacity="0.45"/>
  </g>

  <!-- ROOM 02: Community Majlis Plaza (hero, right lobe) -->
  <g>
    <circle cx="900" cy="380" r="128" fill="#CFC0A0"/>
    <circle cx="900" cy="380" r="128" fill="#F5EFE2" fill-opacity="0.35"/>
    <!-- ring seat wall -->
    <circle cx="900" cy="380" r="96" fill="none" stroke="#E7DCC3" stroke-width="16"/>
    <circle cx="900" cy="380" r="96" fill="none" stroke="#C05A32" stroke-width="16" stroke-opacity="0.35" stroke-dasharray="30 18"/>
    <!-- hearing-loop inlay ring -->
    <circle cx="900" cy="380" r="64" fill="none" stroke="#7BC6DD" stroke-width="3" stroke-opacity="0.7"/>
    <!-- central water element -->
    <circle cx="900" cy="380" r="30" fill="#4E8FA8"/>
    <circle cx="894" cy="374" r="12" fill="#7BC6DD" fill-opacity="0.7"/>
    <!-- pergola halo -->
    <circle cx="900" cy="380" r="118" fill="none" stroke="#C05A32" stroke-width="7" stroke-dasharray="16 14"/>
    <!-- people gathered -->
    <g fill="#22301F">
      <circle cx="852" cy="352" r="5"/><circle cx="944" cy="348" r="5"/><circle cx="958" cy="404" r="5"/>
      <circle cx="866" cy="428" r="5"/><circle cx="906" cy="322" r="5"/><circle cx="838" cy="392" r="5"/>
      <circle cx="930" cy="440" r="4"/><circle cx="884" cy="446" r="4"/>
    </g>
    <!-- grand ghaf canopy dappled over the plaza -->
    <g>
      <ellipse cx="872" cy="330" rx="86" ry="58" fill="#2F6B4A" fill-opacity="0.8"/>
      <ellipse cx="930" cy="368" rx="70" ry="46" fill="#2F6B4A" fill-opacity="0.65"/>
      <ellipse cx="846" cy="376" rx="52" ry="36" fill="#A9C6A0" fill-opacity="0.6"/>
      <ellipse cx="912" cy="318" rx="44" ry="28" fill="#A9C6A0" fill-opacity="0.65"/>
      <ellipse cx="958" cy="330" rx="34" ry="22" fill="#7CC98F" fill-opacity="0.4"/>
    </g>
  </g>

  <!-- ghaf groves dotted in park -->
  <use href="#ghaf-top" x="250" y="320"/>
  <use href="#ghaf-top" x="520" y="480"/>
  <use href="#ghaf-top" x="200" y="540"/>
  <use href="#ghaf-top" x="700" y="250"/>
  <use href="#ghaf-top" x="1180" y="480"/>
  <use href="#ghaf-top" x="760" y="500"/>
  <use href="#ghaf-top" x="470" y="330"/>

  <!-- walkers on the loop -->
  <g fill="#22301F">
    <circle cx="380" cy="240" r="4"/><circle cx="150" cy="470" r="4"/><circle cx="640" cy="420" r="4"/>
    <circle cx="560" cy="560" r="4"/><circle cx="1120" cy="300" r="4"/><circle cx="812" cy="548" r="4"/>
  </g>

  <!-- stipple texture -->
  <g fill="#22301F" fill-opacity="0.1">
    <circle cx="120" cy="620" r="3"/><circle cx="170" cy="660" r="2.5"/><circle cx="260" cy="690" r="3"/>
    <circle cx="420" cy="670" r="2.5"/><circle cx="580" cy="700" r="3"/><circle cx="720" cy="680" r="2.5"/>
    <circle cx="880" cy="700" r="3"/><circle cx="1040" cy="670" r="2.5"/><circle cx="1180" cy="690" r="3"/>
    <circle cx="90" cy="200" r="2.5"/><circle cx="1230" cy="220" r="2.5"/><circle cx="640" cy="180" r="2.5"/>
  </g>
  <g fill="#F5EFE2" fill-opacity="0.5">
    <circle cx="330" cy="430" r="3"/><circle cx="480" cy="390" r="2.5"/><circle cx="1010" cy="470" r="3"/>
    <circle cx="840" cy="270" r="2.5"/><circle cx="230" cy="470" r="2.5"/>
  </g>

  <!-- nabta sparkles -->
  <use href="#sparkle" x="1064" y="292" fill="#7CC98F"/>
  <use href="#sparkle" x="740" y="430" fill="#7BC6DD" transform="scale(1)" opacity="0.9"/>
  <use href="#sparkle" x="212" y="170" fill="#C05A32" opacity="0.8"/>
</svg>
