<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%">
  <defs>
    <path id="sparkle" d="M0,-12 L2.8,-2.8 L12,0 L2.8,2.8 L0,12 L-2.8,2.8 L-12,0 L-2.8,-2.8 Z"/>
    <g id="ghaf-ob">
      <path d="M0,0 C -2,-18 -4,-32 -8,-44" fill="none" stroke="#22301F" stroke-width="5" stroke-linecap="round"/>
      <ellipse cx="-10" cy="-56" rx="42" ry="20" fill="#2F6B4A" fill-opacity="0.85"/>
      <ellipse cx="-26" cy="-64" rx="22" ry="11" fill="#A9C6A0" fill-opacity="0.7"/>
      <ellipse cx="6" cy="-50" rx="18" ry="9" fill="#A9C6A0" fill-opacity="0.5"/>
    </g>
  </defs>

  <!-- sky sliver at top, oblique drone tilt -->
  <rect width="1280" height="720" fill="#E7DCC3"/>
  <rect width="1280" height="130" fill="#F5EFE2"/>
  <rect y="104" width="1280" height="30" fill="#F5EFE2" fill-opacity="0.5"/>
  <circle cx="180" cy="70" r="46" fill="#F5EFE2"/>
  <g fill="#22301F" fill-opacity="0.1">
    <rect x="840" y="60" width="22" height="60"/><rect x="880" y="78" width="34" height="42"/>
    <rect x="1030" y="48" width="18" height="72"/><rect x="1070" y="70" width="40" height="50"/>
    <rect x="1180" y="84" width="46" height="36"/>
  </g>

  <!-- tilted park plane: planting masses receding -->
  <ellipse cx="240" cy="300" rx="300" ry="110" fill="#A9C6A0" fill-opacity="0.4"/>
  <ellipse cx="1020" cy="260" rx="320" ry="100" fill="#A9C6A0" fill-opacity="0.4"/>
  <ellipse cx="640" cy="560" rx="560" ry="180" fill="#A9C6A0" fill-opacity="0.3"/>
  <ellipse cx="960" cy="180" rx="220" ry="60" fill="#2F6B4A" fill-opacity="0.2"/>

  <!-- wadi bioswale sweeping under the loop -->
  <path d="M-30,480 C 220,420 420,500 640,450 C 860,402 1000,470 1310,400"
        fill="none" stroke="#4E8FA8" stroke-width="34" stroke-linecap="round" stroke-opacity="0.7"/>
  <path d="M-30,480 C 220,420 420,500 640,450 C 860,402 1000,470 1310,400"
        fill="none" stroke="#7BC6DD" stroke-width="10" stroke-linecap="round" stroke-opacity="0.65"/>
  <g fill="#2F6B4A" fill-opacity="0.5">
    <ellipse cx="220" cy="446" rx="34" ry="11"/><ellipse cx="520" cy="478" rx="38" ry="12"/>
    <ellipse cx="900" cy="428" rx="34" ry="11"/><ellipse cx="1160" cy="416" rx="30" ry="10"/>
  </g>

  <!-- the loop, foreshortened figure-eight rushing through frame -->
  <path d="M-60,660 C 200,560 340,610 480,540 C 620,470 600,380 700,330 C 800,280 980,300 1130,240 C 1230,200 1290,170 1340,150"
        fill="none" stroke="#CFC0A0" stroke-width="58" stroke-linecap="round"/>
  <path d="M-60,660 C 200,560 340,610 480,540 C 620,470 600,380 700,330 C 800,280 980,300 1130,240 C 1230,200 1290,170 1340,150"
        fill="none" stroke="#F5EFE2" stroke-width="8" stroke-opacity="0.55"/>
  <!-- crossing arm of the eight, receding left -->
  <path d="M700,330 C 560,300 380,320 220,270 C 120,240 40,210 -40,190"
        fill="none" stroke="#CFC0A0" stroke-width="34" stroke-linecap="round"/>

  <!-- pergola slat ribs vaulting the path (terracotta) -->
  <g stroke="#C05A32" stroke-linecap="round" fill="none">
    <path d="M60,560 q120,-90 250,-60" stroke-width="12"/>
    <path d="M180,530 q110,-80 230,-56" stroke-width="11"/>
    <path d="M300,500 q100,-74 210,-52" stroke-width="10"/>
    <path d="M700,300 q90,-56 180,-40" stroke-width="9"/>
    <path d="M800,272 q84,-50 168,-36" stroke-width="8"/>
    <path d="M1060,222 q70,-40 140,-30" stroke-width="7"/>
  </g>
  <g stroke="#22301F" stroke-opacity="0.14" stroke-linecap="round" fill="none">
    <path d="M100,600 q120,-80 240,-56" stroke-width="10"/>
    <path d="M740,330 q90,-52 176,-38" stroke-width="8"/>
  </g>

  <!-- MAJLIS PLAZA: foreshortened ellipse room on the loop -->
  <g>
    <ellipse cx="620" cy="400" rx="200" ry="86" fill="#CFC0A0"/>
    <ellipse cx="620" cy="400" rx="200" ry="86" fill="#F5EFE2" fill-opacity="0.35"/>
    <!-- seat wall ring -->
    <ellipse cx="620" cy="400" rx="150" ry="62" fill="none" stroke="#E7DCC3" stroke-width="16"/>
    <ellipse cx="620" cy="400" rx="150" ry="62" fill="none" stroke="#C05A32" stroke-width="16" stroke-opacity="0.3" stroke-dasharray="34 20"/>
    <!-- hearing-loop inlay -->
    <ellipse cx="620" cy="400" rx="100" ry="40" fill="none" stroke="#7BC6DD" stroke-width="3" stroke-opacity="0.7"/>
    <!-- central water -->
    <ellipse cx="620" cy="400" rx="46" ry="18" fill="#4E8FA8"/>
    <ellipse cx="606" cy="396" rx="16" ry="6" fill="#7BC6DD" fill-opacity="0.8"/>
    <!-- pergola halo -->
    <ellipse cx="620" cy="400" rx="184" ry="78" fill="none" stroke="#C05A32" stroke-width="8" stroke-dasharray="20 16"/>
    <!-- people in the room -->
    <g fill="#22301F">
      <circle cx="540" cy="380" r="6"/><circle cx="700" cy="372" r="6"/><circle cx="676" cy="432" r="6"/>
      <circle cx="566" cy="430" r="6"/><circle cx="628" cy="352" r="5"/><circle cx="512" cy="408" r="5"/>
    </g>
    <!-- grand ghaf canopy dappling the plaza -->
    <path d="M700,392 C 710,352 718,320 734,292" fill="none" stroke="#22301F" stroke-width="9" stroke-linecap="round"/>
    <ellipse cx="700" cy="270" rx="150" ry="58" fill="#2F6B4A" fill-opacity="0.85"/>
    <ellipse cx="620" cy="300" rx="110" ry="44" fill="#2F6B4A" fill-opacity="0.6"/>
    <ellipse cx="760" cy="240" rx="80" ry="32" fill="#A9C6A0" fill-opacity="0.65"/>
    <ellipse cx="580" cy="270" rx="66" ry="26" fill="#A9C6A0" fill-opacity="0.5"/>
    <ellipse cx="690" cy="220" rx="50" ry="20" fill="#7CC98F" fill-opacity="0.35"/>
    <!-- canopy shadow on plaza floor -->
    <ellipse cx="650" cy="386" rx="120" ry="40" fill="#22301F" fill-opacity="0.1"/>
  </g>

  <!-- ghaf trees flanking the loop -->
  <use href="#ghaf-ob" x="150" y="620" transform="scale(1)"/>
  <use href="#ghaf-ob" x="340" y="580"/>
  <use href="#ghaf-ob" x="940" y="330"/>
  <use href="#ghaf-ob" x="1090" y="290"/>
  <use href="#ghaf-ob" x="240" y="300"/>
  <use href="#ghaf-ob" x="1180" y="380"/>
  <use href="#ghaf-ob" x="460" y="290"/>

  <!-- walkers and joggers on the loop -->
  <g fill="#22301F">
    <g>
      <circle cx="260" cy="596" r="8"/>
      <path d="M260,604 C 253,610 252,630 255,648 L 259,648 L 260,628 L 262,648 L 266,648 C 268,630 267,610 260,604 Z"/>
    </g>
    <g fill-opacity="0.9">
      <circle cx="870" cy="290" r="6"/>
      <path d="M870,296 C 865,301 864,316 866,330 L 869,330 L 870,314 L 872,330 L 875,330 C 877,316 876,301 870,296 Z"/>
    </g>
    <circle cx="1120" cy="238" r="5"/><circle cx="420" cy="548" r="6"/>
  </g>

  <!-- foreground canopy edge, top-left, drone brushing past leaves -->
  <ellipse cx="80" cy="10" rx="260" ry="90" fill="#2F6B4A" fill-opacity="0.9"/>
  <ellipse cx="220" cy="-20" rx="180" ry="70" fill="#A9C6A0" fill-opacity="0.6"/>

  <!-- stipple -->
  <g fill="#22301F" fill-opacity="0.11">
    <circle cx="160" cy="680" r="3.5"/><circle cx="300" cy="700" r="3"/><circle cx="520" cy="660" r="3.5"/>
    <circle cx="760" cy="620" r="3"/><circle cx="980" cy="560" r="3"/><circle cx="1150" cy="500" r="3"/>
    <circle cx="90" cy="420" r="2.5"/><circle cx="1220" cy="330" r="2.5"/>
  </g>
  <g fill="#F5EFE2" fill-opacity="0.55">
    <circle cx="430" cy="380" r="3"/><circle cx="820" cy="360" r="2.5"/><circle cx="1010" cy="300" r="2.5"/>
    <circle cx="360" cy="470" r="3"/>
  </g>

  <!-- nabta sparkles -->
  <use href="#sparkle" x="980" y="160" fill="#7CC98F"/>
  <use href="#sparkle" x="420" y="220" fill="#7BC6DD" opacity="0.85"/>
  <use href="#sparkle" x="1180" y="440" fill="#C05A32" opacity="0.7"/>
</svg>
